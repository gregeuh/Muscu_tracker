<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Muscu Pro Elite V66</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2964/2964514.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --bg-color: #f8f9fc;
            --panel-bg: rgba(255, 255, 255, 0.9);
            --card-bg: #ffffff;
            --text-main: #1c1c1e;
            --text-muted: #8e8e93;
            --accent-color: #007aff;
            --border-color: #f2f2f7;
            --danger-color: #ff3b30;
            --pr-color: #34c759;
            --shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            --font-impact: 'Bebas Neue', sans-serif;
            --font-main: 'Inter', sans-serif;
        }

        [data-theme="dark"] {
            --bg-color: #000000;
            --panel-bg: rgba(20, 20, 22, 0.9);
            --card-bg: #121212;
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --accent-color: #0a84ff;
            --border-color: #2c2c2e;
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
        }

        /* Animations */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Base */
        html, body { height: 100%; margin: 0; padding: 0; background-color: var(--bg-color); overflow: hidden; font-family: var(--font-main); color: var(--text-main); transition: 0.3s; }
        body { display: flex; flex-direction: column; padding-top: calc(70px + env(safe-area-inset-top, 0px)); padding-bottom: calc(85px + env(safe-area-inset-bottom, 20px)); box-sizing: border-box; overflow-y: auto; }
        
        /* Header */
        header { position: fixed; top: 0; left: 0; right: 0; height: 64px; background-color: var(--panel-bg); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; z-index: 1500; padding-top: env(safe-area-inset-top); }
        .logo { font-family: var(--font-impact); font-size: 26px; letter-spacing: 1px; }
        .logo span { color: var(--accent-color); }
        
        .header-right { display: flex; align-items: center; gap: 15px; position: relative; }
        .user-photo { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--accent-color); cursor: pointer; background: var(--border-color); object-fit: cover; }
        #logout-btn { position: absolute; top: 50px; right: 0; background: var(--card-bg); border: 1px solid var(--border-color); color: var(--danger-color); font-size: 13px; font-weight: 800; padding: 12px 20px; border-radius: 16px; display: none; box-shadow: var(--shadow); z-index: 2000; white-space: nowrap; }

        /* Auth Screen */
        #auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; padding: 20px; text-align: center; }
        .google-btn { background: white; color: #1c1c1e; border: 1px solid #dcdcdc; padding: 14px 24px; border-radius: 14px; font-weight: 700; width: 100%; max-width: 320px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 14px; box-shadow: var(--shadow); }

        /* App Layout */
        #app-screen { display: none; width: 100%; max-width: 500px; margin: 0 auto; padding: 0 16px; box-sizing: border-box; }
        .tab-content { display: none; width: 100%; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        
        /* Elements Graphiques */
        .card { background-color: var(--card-bg); padding: 22px; border-radius: 28px; margin-bottom: 20px; border: 1px solid var(--border-color); box-shadow: var(--shadow); animation: fadeInUp 0.4s ease-out both; }
        h2 { font-family: var(--font-impact); font-size: 38px; margin: 10px 0 20px 0; letter-spacing: 1px; text-transform: uppercase; }
        h3.session-title { font-family: var(--font-impact); font-size: 20px; margin: 25px 0 15px 5px; color: var(--accent-color); text-transform: uppercase; }

        input, select { width: 100%; padding: 16px; background-color: var(--bg-color); border: 1px solid var(--border-color); color: var(--text-main); border-radius: 16px; font-size: 16px; font-weight: 600; box-sizing: border-box; margin-bottom: 12px; font-family: var(--font-main); outline: none; }
        .btn-primary { background-color: var(--accent-color); color: white; border: none; padding: 16px; font-family: var(--font-impact); font-size: 20px; border-radius: 18px; width: 100%; cursor: pointer; transition: transform 0.1s; }
        .btn-primary:active { transform: scale(0.96); }
        .btn-outline { background: var(--card-bg); color: var(--accent-color); border: 2px solid var(--accent-color); padding: 10px; font-family: var(--font-impact); font-size: 16px; border-radius: 14px; width: 100%; cursor: pointer; margin-bottom: 10px; }

        /* Calendrier Grid */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; width: 100%; }
        .day-label { font-size: 11px; font-weight: 800; color: var(--text-muted); padding: 5px 0; }
        .day-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; border-radius: 12px; cursor: pointer; border: 1px solid transparent; }
        .day-cell.has-data { background: rgba(0, 122, 255, 0.1); color: var(--accent-color); }
        .day-cell.selected { background: var(--accent-color) !important; color: white !important; }

        /* List Containers (Machines & Routines) */
        .list-container { background: var(--card-bg); border-radius: 24px; border: 1px solid var(--border-color); overflow: hidden; margin-bottom: 20px; box-shadow: var(--shadow); }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--border-color); cursor: pointer; width: 100%; box-sizing: border-box; }
        .item-row:last-child { border-bottom: none; }
        .item-name { flex: 1; font-weight: 700; font-size: 16px; color: var(--text-main); text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .item-actions { display: flex; gap: 8px; flex-shrink: 0; }

        /* Workout History Styles */
        .history-group { margin-bottom: 25px; animation: fadeInUp 0.4s ease-out both; }
        .group-header-title { font-family: var(--font-impact); font-size: 18px; color: var(--accent-color); margin: 0 0 10px 5px; display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .set-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 18px; background: var(--card-bg); border-radius: 20px; margin-bottom: 10px; border: 1px solid var(--border-color); box-shadow: var(--shadow); }
        .set-info { font-weight: 700; }
        .set-info strong { font-family: var(--font-impact); font-size: 20px; }

        /* Icon Buttons */
        .icon-btn { width: 38px; height: 38px; border-radius: 12px; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .btn-launch { background: rgba(52, 199, 89, 0.15); color: #34c759; font-family: var(--font-impact); width: auto; padding: 0 15px; font-size: 13px; }
        .btn-del { background: rgba(255, 59, 48, 0.1); color: var(--danger-color); }
        .btn-copy { background: rgba(0, 122, 255, 0.1); color: var(--accent-color); }

        /* Cardio Styles */
        .cardio-table { width: 100%; border-collapse: collapse; }
        .cardio-table th { text-align: left; padding: 12px 8px; color: var(--text-muted); font-family: var(--font-impact); border-bottom: 1px solid var(--border-color); font-size: 13px; }
        .cardio-table td { padding: 15px 8px; border-bottom: 1px solid var(--border-color); font-weight: 700; font-size: 14px; }
        .cardio-val { color: var(--accent-color); font-family: var(--font-impact); font-size: 18px; }

        /* Routines Modal XXL */
        .routine-cat-sub { font-family: var(--font-impact); color: var(--accent-color); font-size: 22px; margin: 22px 0 12px 5px; border-bottom: 2px solid var(--accent-color); padding-bottom: 6px; }
        .exo-check-item { display: block; background: var(--bg-color); padding: 18px; border-radius: 18px; font-weight: 700; margin-bottom: 10px; border: 1px solid var(--border-color); cursor: pointer; text-align: left; transition: 0.2s; }
        .exo-check-item input { display: none; }
        .exo-check-item:has(input:checked) { background: var(--accent-color) !important; color: white !important; }

        /* Misc */
        #last-workout-ghost { font-size: 11px; color: var(--text-muted); text-align: center; margin: 10px 0; min-height: 32px; font-weight: 600; line-height: 1.4; }
        #one-rm-live { font-family: var(--font-impact); font-size: 18px; color: var(--accent-color); text-align: center; margin-bottom: 15px; }
        #floating-timer { display: none; position: fixed; bottom: 85px; left: 16px; right: 16px; background: var(--accent-color); color: white; padding: 15px 20px; border-radius: 20px; z-index: 4000; font-family: var(--font-impact); font-size: 20px; box-shadow: 0 10px 30px rgba(0,122,255,0.4); }

        /* Navigation */
        nav { position: fixed; bottom: 0; left: 0; right: 0; height: 75px; background-color: var(--panel-bg); backdrop-filter: blur(25px); border-top: 1px solid var(--border-color); display: flex; justify-content: space-around; padding-bottom: env(safe-area-inset-bottom); z-index: 1500; }
        .nav-btn { background: none; border: none; color: var(--text-muted); font-size: 10px; font-weight: 800; flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 10px 0; }
        .nav-btn.active { color: var(--accent-color); }

        /* Modals Generic */
        .modal-overlay { position: fixed !important; top: 0 !important; left: 0 !important; width: 100% !important; height: 100% !important; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 5000 !important; padding: 20px; box-sizing: border-box; }
        .modal-card { width: 100%; max-width: 420px; background: var(--card-bg); border-radius: 32px; padding: 28px; border: 1px solid var(--border-color); max-height: 85vh; overflow-y: auto; }
        .stat-badge { background: var(--bg-color); padding: 12px; border-radius: 16px; text-align: center; border: 1px solid var(--border-color); }
    </style>
</head>
<body>

    <header>
        <div class="logo">MUSCU<span>PRO</span></div>
        <div class="header-right">
            <button onclick="toggleTheme()" id="theme-btn" style="background:none; border:none; font-size:22px; cursor:pointer;">🌙</button>
            <img id="user-photo" class="user-photo" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
            <button id="logout-btn">CIAO ! 👋</button>
        </div>
    </header>

    <div id="auth-screen">
        <h1 style="font-family: var(--font-impact); font-size: 55px; letter-spacing: 2px;">MUSCU<span>PRO</span></h1>
        <button id="google-login-btn" class="google-btn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> CONTINUER AVEC GOOGLE
        </button>
        <div style="width:100%; max-width:320px; border-top:1px solid var(--border-color); padding-top:20px;">
            <input type="email" id="auth-email" placeholder="Email">
            <input type="password" id="auth-password" placeholder="Mot de passe">
            <button id="auth-submit-btn" class="btn-primary" style="margin-top:10px;">CONNEXION / CRÉER COMPTE</button>
        </div>
    </div>

    <div id="app-screen">
        <div id="floating-timer"><div style="display:flex; justify-content:space-between; align-items:center;"><span>REPOS : <span id="timer-display">00:00</span></span><div style="display:flex; gap:10px;"><button onclick="addTime()" style="background:rgba(255,255,255,0.2); border:none; color:white; padding:6px 12px; border-radius:10px;">+30S</button><button onclick="resetTimerState()" style="background:white; border:none; color:var(--accent-color); padding:6px 12px; border-radius:10px;">✕</button></div></div></div>

        <section id="workout" class="tab-content active">
            <h2>MA SÉANCE</h2>
            <div class="card">
                <form id="workout-form">
                    <input type="date" id="workout-date" required>
                    <div style="display:flex; gap:10px;"><select id="machine" required></select><button type="button" onclick="openModal()" style="width:56px; border-radius:16px; background:var(--accent-color); color:white; border:none; font-size:24px;">+</button></div>
                    <div id="last-workout-ghost"></div>
                    <div style="display:flex; gap:10px;"><input type="number" id="weight" placeholder="Kg" required step="any"><input type="number" id="reps" placeholder="Reps" required></div>
                    <div id="one-rm-live">1RM ESTIMÉ : -</div>
                    <label style="display:flex; align-items:center; gap:10px; justify-content:center; margin-bottom:15px; font-size:14px; font-weight:700;"><input type="checkbox" id="is-warmup" style="width:20px; height:20px;"> 🔥 ÉCHAUFFEMENT</label>
                    <button type="submit" class="btn-primary">ENREGISTRER LA SÉRIE</button>
                </form>
            </div>
            <h3 class="session-title">SÉANCE DU JOUR</h3>
            <div id="history-list"></div>
        </section>

        <section id="exercises-tab" class="tab-content">
            <h2>MES MACHINES</h2>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px;"><button class="btn-primary" onclick="openModal()">+ AJOUTER</button><button class="btn-outline" onclick="importDefaults()">📚 CATALOGUE</button></div>
            
            <h3 class="session-title">MES ROUTINES</h3>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:15px;"><button class="btn-outline" onclick="openRoutineModal()">+ CRÉER</button><button class="btn-outline" onclick="importRoutineDefaults()">📚 CATALOGUE</button></div>
            <div id="routines-list"></div>
            
            <h3 class="session-title" style="margin-top:30px;">LISTE PAR MUSCLE</h3>
            <div id="machine-grouped-list"></div>
        </section>

        <section id="calendar-tab" class="tab-content">
            <h2>CALENDRIER</h2>
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; font-family:var(--font-impact); font-size:24px;">
                    <div id="month-display">Mois</div>
                    <div style="display:flex; gap:10px;"><button class="btn-outline" onclick="changeMonth(-1)">‹</button><button class="btn-outline" onclick="changeMonth(1)">›</button></div>
                </div>
                <div class="calendar-grid" id="calendar-container"></div>
            </div>
            <div id="day-details"></div>
        </section>

        <section id="stats" class="tab-content">
            <h2>MES STATS</h2>
            <select id="stats-time-filter" style="margin-bottom: 20px;">
                <option value="day">AUJOURD'HUI</option><option value="week">CETTE SEMAINE</option><option value="month" selected>CE MOIS</option><option value="year">CETTE ANNÉE</option><option value="all">TOUT</option>
            </select>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-bottom:20px;">
                <div class="card" style="text-align:center; padding:15px;"><h4 style="font-family:var(--font-impact); margin:0;">SÉRIES</h4><p id="stat-series" style="font-family:var(--font-impact); font-size:32px; margin:0; color:var(--accent-color);">0</p></div>
                <div class="card" style="text-align:center; padding:15px;"><h4 style="font-family:var(--font-impact); margin:0;">VOLUME</h4><p id="stat-volume" style="font-family:var(--font-impact); font-size:32px; margin:0; color:var(--pr-color);">0</p></div>
            </div>
            <div class="card"><h4 style="font-family:var(--font-impact); margin-top:0; text-align:center;">TOP RECORDS (KG)</h4><canvas id="statsChart"></canvas></div>
            <div class="card"><h4 style="font-family:var(--font-impact); margin-top:0; text-align:center;">POIDS MOYEN (KG)</h4><canvas id="avgStatsChart"></canvas></div>
            <div class="card" id="cardio-stats-container"><h4 style="font-family:var(--font-impact); margin-top:0; text-align:center;">🏃 RÉSUMÉ CARDIO</h4><div id="cardio-summary-list"></div></div>
        </section>
    </div>

    <div id="modal-routine" class="modal-overlay"><div class="modal-card">
        <h2>CRÉER ROUTINE</h2><input type="text" id="routine-name-input" placeholder="Nom (ex: PUSH)"><div id="routine-exo-selection" style="max-height:350px; overflow-y:auto; margin:15px 0;"></div><div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:15px;"><button class="btn-primary" style="background:#3a3a3c;" onclick="document.getElementById('modal-routine').style.display='none'">ANNULER</button><button class="btn-primary" onclick="saveRoutine()">ENREGISTRER</button></div>
    </div></div>

    <div id="modal-machine-history" class="modal-overlay" onclick="this.style.display='none'"><div class="modal-card" onclick="event.stopPropagation()">
        <h2 id="history-machine-name">DÉTAILS</h2><div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:20px;"><div class="stat-badge"><label id="hist-label">RECORD</label><br><span id="hist-max-rm" style="font-weight:800; font-size:18px;">-</span></div><div class="stat-badge"><label>SÉRIES</label><br><span id="hist-total-sets" style="font-weight:800; font-size:18px;">-</span></div></div><div style="height:220px;"><canvas id="historyChart"></canvas></div><button class="btn-primary" style="margin-top:20px; background:#3a3a3c;" onclick="document.getElementById('modal-machine-history').style.display='none'">FERMER</button></div></div>

    <div id="modal-add-machine" class="modal-overlay"><div class="modal-card"><h2>MACHINE</h2><input type="text" id="new-machine-name" placeholder="Nom"><select id="new-machine-category"><option value="Pectoraux">Pectoraux</option><option value="Dos">Dos</option><option value="Jambes">Jambes</option><option value="Épaules">Épaules</option><option value="Bras">Bras</option><option value="Abdos">Abdos</option><option value="Cardio">Cardio</option></select><div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;"><button class="btn-primary" style="background:#3a3a3c;" onclick="closeModal()">ANNULER</button><button class="btn-primary" id="save-machine-btn">VALIDER</button></div></div></div>
    
    <div id="modal-timer-prompt" class="modal-overlay"><div class="modal-card" style="text-align:center;"><h2>REPOS ? ⏳</h2><div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px; margin-bottom:20px;"><button class="btn-primary timer-btn" data-time="60">1:00</button><button class="btn-primary timer-btn" data-time="90">1:30</button><button class="btn-primary timer-btn" data-time="120">2:00</button></div><button class="btn-outline" onclick="closeModalTimer()">PASSER</button></div></div>

    <nav id="bottom-nav">
        <button class="nav-btn active" onclick="showTab('workout', this)"><span>🏋️</span>SÉANCE</button>
        <button class="nav-btn" onclick="showTab('exercises-tab', this)"><span>⚙️</span>MACHINES</button>
        <button class="nav-btn" onclick="showTab('calendar-tab', this)"><span>📅</span>CALENDRIER</button>
        <button class="nav-btn" onclick="showTab('stats', this)"><span>📊</span>STATS</button>
    </nav><script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, where, deleteDoc, doc, updateDoc, enableMultiTabIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyDqD_BnYDL6GwQPIsn3W8ffnoo9BwoKr1Q", authDomain: "suivi-muscu-8dd6d.firebaseapp.com", projectId: "suivi-muscu-8dd6d", storageBucket: "suivi-muscu-8dd6d.firebasestorage.app", messagingSenderId: "1011748268882", appId: "G-P9TLE42VZ1" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app); const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        enableMultiTabIndexedDbPersistence(db).catch(() => {});
        setPersistence(auth, browserLocalPersistence);

        let currentViewDate = new Date(); let personalRecords = {}; let timerInterval = null; let timerSeconds = 0; let historyChartInstance = null; let activeCalendarDay = null; let exerciseCategories = {};

        // Profile & Header Actions
        const userPhoto = document.getElementById('user-photo');
        const logoutBtn = document.getElementById('logout-btn');
        userPhoto.onclick = (e) => { e.stopPropagation(); logoutBtn.style.display = (logoutBtn.style.display === 'block') ? 'none' : 'block'; };
        window.onclick = () => { logoutBtn.style.display = 'none'; };
        logoutBtn.onclick = () => signOut(auth);
        document.getElementById('google-login-btn').onclick = () => signInWithPopup(auth, provider);

        window.toggleTheme = () => {
            const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', t); localStorage.setItem('theme', t);
            document.getElementById('theme-btn').innerText = t === 'dark' ? '☀️' : '🌙';
        };
        document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');

        // Auth Observer
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-screen').style.display = 'none'; 
                document.getElementById('app-screen').style.display = 'block'; 
                document.getElementById('bottom-nav').style.display = 'flex';
                if(user.photoURL) userPhoto.src = user.photoURL;
                resetTimerState(); initApp();
            } else {
                document.getElementById('auth-screen').style.display = 'flex'; 
                document.getElementById('app-screen').style.display = 'none'; 
                document.getElementById('bottom-nav').style.display = 'none';
            }
        });

        function initApp() {
            document.getElementById('workout-date').value = new Date().toISOString().split('T')[0];
            loadExercises(); loadWorkouts(); loadPRs(); loadRoutines();
            document.getElementById('weight').oninput = updateLive1RM;
            document.getElementById('reps').oninput = updateLive1RM;
            document.getElementById('machine').onchange = () => { adaptInputsForCardio(); updateGhost(); };
        }

        // --- CORE LOGIC (1RM & CARDIO) ---
        const calc1RM = (w, r) => { const weight = Number(w); const reps = Number(r); if (!weight || !reps || reps <= 0) return 0; return reps === 1 ? weight : Math.round(weight / (1.0278 - (0.0278 * reps))); };
        const formatDate = (d) => new Intl.DateTimeFormat('fr-FR', { day: '2-digit', month: '2-digit' }).format(d);
        
        function updateLive1RM() { 
            const m = document.getElementById('machine').value;
            if (exerciseCategories[m] === "Cardio") return;
            const rm = calc1RM(document.getElementById('weight').value, document.getElementById('reps').value); 
            document.getElementById('one-rm-live').innerText = rm > 0 ? `1RM ESTIMÉ : ${rm} KG` : `1RM ESTIMÉ : -`; 
        }

        function adaptInputsForCardio() {
            const m = document.getElementById('machine').value; const cat = exerciseCategories[m];
            const wi = document.getElementById('weight'), ri = document.getElementById('reps'), orm = document.getElementById('one-rm-live');
            if (cat === "Cardio") { wi.placeholder = "Min"; ri.placeholder = "Km / Niv"; orm.style.display = "none"; }
            else { wi.placeholder = "Kg"; ri.placeholder = "Reps"; orm.style.display = "block"; updateLive1RM(); }
        }

        // --- DATA LOADING ---
        async function loadExercises() {
            const snap = await getDocs(query(collection(db, "exercises"), where("userId", "==", auth.currentUser.uid)));
            let grouped = {}; exerciseCategories = {};
            snap.forEach(d => { 
                const da = d.data(); const cat = da.category || "Autre"; 
                if(!grouped[cat]) grouped[cat] = []; 
                grouped[cat].push(da.name); exerciseCategories[da.name] = cat; 
            });
            let opts = "";
            Object.keys(grouped).sort().forEach(cat => {
                opts += `<optgroup label="${cat.toUpperCase()}">`;
                grouped[cat].sort().forEach(name => { opts += `<option value="${name}">${name}</option>`; });
                opts += `</optgroup>`;
            });
            document.getElementById('machine').innerHTML = opts; 
            document.getElementById('machine').dispatchEvent(new Event('change'));
        }

        async function loadWorkouts() {
            const dateStr = document.getElementById('workout-date').value;
            const snap = await getDocs(query(collection(db, "workouts"), where("userId", "==", auth.currentUser.uid)));
            let filtered = []; snap.forEach(d => { if(d.data().timestamp.toDate().toISOString().split('T')[0] === dateStr) filtered.push({id: d.id, data: d.data()}); });
            filtered.sort((a,b) => a.data.timestamp.toDate() - b.data.timestamp.toDate());
            
            let cont = document.getElementById('history-list'); cont.innerHTML = ''; let cur = null; let groups = [];
            filtered.forEach(x => { if(!cur || cur.machine !== x.data.machine) { cur = { machine: x.data.machine, sets: [] }; groups.push(cur); } cur.sets.push(x); });
            
            groups.forEach(g => {
                const sn = g.machine.replace(/'/g, "\\'");
                let html = `<div class="history-group"><div class="group-header-title" onclick="window.openMachineHistory('${sn}')">🏋️ ${g.machine.toUpperCase()}</div>`;
                g.sets.forEach(s => {
                    const isC = exerciseCategories[s.data.machine] === "Cardio";
                    const val = isC ? `<strong>${s.data.weight}MIN | ${s.data.reps}KM</strong>` : `<strong>${s.data.weight}KG X ${s.data.reps}</strong> <span style="font-size:12px; color:var(--text-muted);">(${calc1RM(s.data.weight, s.data.reps)}kg)</span>`;
                    html += `<div class="set-item"><div>${val}</div><div class="item-actions"><button class="icon-btn btn-copy" onclick="copySet('${sn}',${s.data.weight},${s.data.reps})">👯</button><button class="icon-btn btn-del" onclick="deleteSeries('${s.id}')">🗑️</button></div></div>`;
                });
                cont.innerHTML += html + '</div>';
            });
        }

        window.openMachineHistory = async (name) => {
            document.getElementById('history-machine-name').innerText = name.toUpperCase();
            document.getElementById('modal-machine-history').style.display = 'flex';
            const isCardio = exerciseCategories[name] === "Cardio";
            document.getElementById('hist-label').innerText = isCardio ? "MAX KM" : "RECORD 1RM";
            const q = query(collection(db, "workouts"), where("userId", "==", auth.currentUser.uid), where("machine", "==", name));
            const snap = await getDocs(q);
            let allData = []; snap.forEach(d => allData.push(d.data()));
            allData.sort((a,b) => a.timestamp.toDate() - b.timestamp.toDate());
            let dailyBest = {}; let totalSets = 0; let absoluteMax = 0;
            allData.forEach(data => { if(data.isWarmup) return; totalSets++; const dk = data.timestamp.toDate().toISOString().split('T')[0]; let val = isCardio ? Number(data.reps) : calc1RM(data.weight, data.reps); if(!dailyBest[dk] || val > dailyBest[dk]) dailyBest[dk] = val; if(val > absoluteMax) absoluteMax = val; });
            document.getElementById('hist-max-rm').innerText = absoluteMax + (isCardio ? " KM" : " KG");
            document.getElementById('hist-total-sets').innerText = totalSets;
            if(historyChartInstance) historyChartInstance.destroy();
            historyChartInstance = new Chart(document.getElementById('historyChart').getContext('2d'), { type: 'line', data: { labels: Object.keys(dailyBest).map(d => formatDate(new Date(d))), datasets: [{ label: isCardio ? 'KM' : 'KG', data: Object.values(dailyBest), borderColor: '#0a84ff', tension: 0.4, fill: true, backgroundColor: 'rgba(10, 132, 255, 0.1)' }] }, options: { responsive: true, maintainAspectRatio: false } });
        };

        // --- UI RENDER (CALENDAR & LISTS) ---
        async function renderCalendar() {
            const container = document.getElementById('calendar-container'); container.innerHTML = '';
            const y = currentViewDate.getFullYear(), m = currentViewDate.getMonth();
            document.getElementById('month-display').innerText = new Intl.DateTimeFormat('fr-FR', { month: 'long', year: 'numeric' }).format(currentViewDate).toUpperCase();
            ['L','M','M','J','V','S','D'].forEach(d => container.innerHTML += `<div class="day-label">${d}</div>`);
            const fd = new Date(y, m, 1).getDay(); const offset = fd === 0 ? 6 : fd - 1;
            const snap = await getDocs(query(collection(db, "workouts"), where("userId", "==", auth.currentUser.uid)));
            const activeDays = new Set(); snap.forEach(d => { const dt = d.data().timestamp.toDate(); if(dt.getMonth() === m && dt.getFullYear() === y) activeDays.add(dt.getDate()); });
            for(let i=0; i<offset; i++) container.appendChild(document.createElement('div'));
            for(let i=1; i<=new Date(y, m+1, 0).getDate(); i++) {
                const cell = document.createElement('div'); cell.className = 'day-cell' + (activeDays.has(i)?' has-data':''); if(i === activeCalendarDay) cell.classList.add('selected');
                cell.innerText = i; cell.onclick = () => { activeCalendarDay = i; renderCalendar(); loadDayDetails(i); }; container.appendChild(cell);
            }
        }

        async function loadDayDetails(day) {
            const dObj = new Date(currentViewDate.getFullYear(), currentViewDate.getMonth(), day).toDateString();
            const snap = await getDocs(query(collection(db, "workouts"), where("userId", "==", auth.currentUser.uid)));
            let cont = document.getElementById('day-details'); cont.innerHTML = '';
            snap.forEach(d => { if(d.data().timestamp.toDate().toDateString() === dObj) { const x = d.data(); const val = exerciseCategories[x.machine] === "Cardio" ? `${x.weight}min | ${x.reps}km` : `${x.weight}kg x ${x.reps}`; cont.innerHTML += `<div class="set-item"><div><strong>${x.machine}</strong>: ${val}</div><button class="icon-btn btn-del" onclick="deleteSeries('${d.id}')">🗑️</button></div>`; } });
        }

        async function loadRoutines() {
            const container = document.getElementById('routines-list'); container.innerHTML = '<div class="list-container" id="rout-inner"></div>';
            const inner = document.getElementById('rout-inner');
            const snap = await getDocs(query(collection(db, "routines"), where("userId", "==", auth.currentUser.uid)));
            snap.forEach(d => { const r = d.data(); inner.innerHTML += `<div class="item-row"><span class="item-name">${r.name}</span><div class="item-actions"><button class="icon-btn btn-launch" onclick="applyRoutine('${d.id}')">▶️ LANCER</button><button class="icon-btn btn-del" onclick="deleteRoutine('${d.id}')">🗑️</button></div></div>`; });
        }

        async function loadExercisesManageList() {
            const container = document.getElementById('machine-grouped-list'); container.innerHTML = "";
            const snap = await getDocs(query(collection(db, "exercises"), where("userId", "==", auth.currentUser.uid)));
            let grouped = {}; snap.forEach(d => { const da = d.data(); if(!grouped[da.category]) grouped[da.category] = []; grouped[da.category].push({id: d.id, name: da.name}); });
            for(const cat in grouped) { container.innerHTML += `<h4 class="session-title" style="font-size:14px; margin-left:10px;">${cat.toUpperCase()}</h4><div class="list-container">` + grouped[cat].map(m => `<div class="item-row" onclick="window.openMachineHistory('${m.name.replace(/'/g, "\\'")}')"><span class="item-name">${m.name}</span><button class="icon-btn btn-del" onclick="event.stopPropagation(); deleteExo('${m.id}')">🗑️</button></div>`).join('') + `</div>`; }
        }

        // --- STATS LOGIC ---
        async function loadStats() {
            const snap = await getDocs(query(collection(db, "workouts"), where("userId", "==", auth.currentUser.uid)));
            const filter = document.getElementById('stats-time-filter').value;
            let limitDate = new Date(); limitDate.setHours(0,0,0,0);
            if (filter === 'week') limitDate.setDate(limitDate.getDate() - 7);
            else if (filter === 'month') limitDate.setDate(limitDate.getDate() - 30);
            else if (filter === 'year') limitDate.setFullYear(limitDate.getFullYear() - 1);
            else if (filter === 'all') limitDate = new Date(0);

            let muscuMax = {}, muscuSum = {}, muscuCount = {}, cardioStats = {}, volume = 0, total = 0;
            snap.forEach(d => {
                const data = d.data(); if(data.isWarmup || data.timestamp.toDate() < limitDate) return;
                total++;
                if (exerciseCategories[data.machine] === "Cardio") {
                    if (!cardioStats[data.machine]) cardioStats[data.machine] = { t:0, k:0, s:0 };
                    cardioStats[data.machine].t = Math.max(cardioStats[data.machine].t, Number(data.weight));
                    cardioStats[data.machine].k = Math.max(cardioStats[data.machine].k, Number(data.reps));
                    cardioStats[data.machine].s++;
                } else {
                    const w = Number(data.weight); volume += (w * Number(data.reps));
                    if (!muscuMax[data.machine] || w > muscuMax[data.machine]) muscuMax[data.machine] = w;
                    muscuSum[data.machine] = (muscuSum[data.machine] || 0) + w; muscuCount[data.machine] = (muscuCount[data.machine] || 0) + 1;
                }
            });

            document.getElementById('stat-series').innerText = total; document.getElementById('stat-volume').innerText = volume + 'KG';
            const tr = Object.entries(muscuMax).sort((a,b) => b[1]-a[1]).slice(0,5);
            if(window.statChartInstance) window.statChartInstance.destroy();
            window.statChartInstance = new Chart(document.getElementById('statsChart'), { type: 'bar', data: { labels: tr.map(m => m[0].toUpperCase()), datasets: [{ label: 'KG', data: tr.map(m => m[1]), backgroundColor: '#34c759', borderRadius: 8 }] } });
            
            let avgW = {}; Object.keys(muscuSum).forEach(m => { avgW[m] = Math.round(muscuSum[m] / muscuCount[m]); });
            const ta = Object.entries(avgW).sort((a,b) => b[1]-a[1]).slice(0,5);
            if(window.avgStatsChartInstance) window.avgStatsChartInstance.destroy();
            window.avgStatsChartInstance = new Chart(document.getElementById('avgStatsChart'), { type: 'bar', data: { labels: ta.map(m => m[0].toUpperCase()), datasets: [{ label: 'MOYENNE', data: ta.map(m => m[1]), backgroundColor: '#0a84ff', borderRadius: 8 }] } });
            
            let html = '<table class="cardio-table"><tr><th>MACHINE</th><th>⏱ MAX</th><th>🏃 MAX</th><th>🔥 SES.</th></tr>';
            Object.keys(cardioStats).forEach(m => { 
                const s = cardioStats[m]; const sn = m.replace(/'/g, "\\'");
                html += `<tr onclick="window.openMachineHistory('${sn}')"><td>${m}</td><td class="cardio-val">${s.t}m</td><td class="cardio-val">${s.k}km</td><td>${s.s}</td></tr>`; 
            });
            document.getElementById('cardio-summary-list').innerHTML = html + '</table>';
        }

        // --- SHARED HELPERS ---
        window.showTab = (id, btn) => { 
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active')); 
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active'); btn.classList.add('active');
            if(id === 'calendar-tab') renderCalendar(); if(id === 'stats') loadStats(); if(id === 'exercises-tab') { loadExercisesManageList(); loadRoutines(); }
        };
        window.openModal = () => document.getElementById('modal-add-machine').style.display='flex';
        window.closeModal = () => document.getElementById('modal-add-machine').style.display='none';
        window.deleteSeries = async (id) => { if(confirm("Supprimer ?")) { await deleteDoc(doc(db, "workouts", id)); loadWorkouts(); renderCalendar(); } };
        window.deleteExo = async (id) => { if(confirm("Supprimer ?")) { await deleteDoc(doc(db, "exercises", id)); loadExercisesManageList(); loadExercises(); } };
        window.deleteRoutine = async (id) => { if(confirm("Supprimer routine ?")) { await deleteDoc(doc(db, "routines", id)); loadRoutines(); } };
        window.copySet = async (m, w, r) => { await addDoc(collection(db, "workouts"), { machine: m, weight: w, reps: r, isWarmup: false, timestamp: new Date(document.getElementById('workout-date').value), userId: auth.currentUser.uid }); loadWorkouts(); };
        window.resetTimerState = () => { clearInterval(timerInterval); timerInterval = null; document.getElementById('floating-timer').style.display = 'none'; };
        function startTimer(sec) { resetTimerState(); timerSeconds = sec; document.getElementById('floating-timer').style.display = 'block'; timerInterval = setInterval(() => { let m = Math.floor(timerSeconds/60), s = timerSeconds%60; document.getElementById('timer-display').innerText = `${m}:${s<10?'0'+s:s}`; if(timerSeconds <= 0) clearInterval(timerInterval); timerSeconds--; }, 1000); }
        document.querySelectorAll('.timer-btn').forEach(btn => btn.onclick = () => { startTimer(parseInt(btn.dataset.time)); document.getElementById('modal-timer-prompt').style.display='none'; });
        window.addTime = () => { timerSeconds += 30; };
        window.closeModalTimer = () => document.getElementById('modal-timer-prompt').style.display='none';
        window.changeMonth = (val) => { currentViewDate.setMonth(currentViewDate.getMonth() + val); activeCalendarDay = null; renderCalendar(); document.getElementById('day-details').innerHTML = ''; };

        window.openRoutineModal = async () => {
            const snap = await getDocs(query(collection(db, "exercises"), where("userId", "==", auth.currentUser.uid)));
            const container = document.getElementById('routine-exo-selection'); container.innerHTML = "";
            let grouped = {}; snap.forEach(d => { const da = d.data(); const cat = da.category || "Autre"; if(!grouped[cat]) grouped[cat] = []; grouped[cat].push(da.name); });
            for(const cat in grouped) { container.innerHTML += `<div class="routine-cat-sub">${cat.toUpperCase()}</div>`; grouped[cat].forEach(n => container.innerHTML += `<label class="exo-check-item"><input type="checkbox" value="${n}" class="routine-check"> <span>${n}</span></label>`); }
            document.getElementById('modal-routine').style.display = 'flex';
        };

        window.saveRoutine = async () => {
            const n = document.getElementById('routine-name-input').value.trim();
            const exos = Array.from(document.querySelectorAll('.routine-check:checked')).map(c => c.value);
            if(!n || exos.length === 0) return alert("Nom + Exercices requis !");
            await addDoc(collection(db, "routines"), { name: n, exercises: exos, userId: auth.currentUser.uid });
            document.getElementById('modal-routine').style.display = 'none'; loadRoutines();
        };

        window.applyRoutine = async (id) => {
            const snap = await getDocs(query(collection(db, "routines"), where("userId", "==", auth.currentUser.uid)));
            let exos = null; snap.forEach(d => { if(d.id === id) exos = d.data().exercises; });
            if (exos) { document.getElementById('machine').innerHTML = exos.map(e => `<option value="${e}">${e}</option>`).join(''); adaptInputsForCardio(); updateGhost(); showTab('workout', document.querySelectorAll('.nav-btn')[0]); }
        };

        window.importDefaults = async () => {
            const ds = [{n: "Développé couché", c: "Pectoraux"}, {n: "Presse à cuisses", c: "Jambes"}, {n: "Tractions", c: "Dos"}, {n: "Tapis de course", c: "Cardio"}, {n: "Vélo d'intérieur", c: "Cardio"}];
            for (const i of ds) await addDoc(collection(db, "exercises"), { name: i.n, category: i.c, userId: auth.currentUser.uid });
            loadExercises(); loadExercisesManageList(); alert("Machines importées !");
        };

        window.importRoutineDefaults = async () => {
            await addDoc(collection(db, "routines"), { name: "PPL PUSH", exercises: ["Développé couché", "Développé militaire", "Dips"], userId: auth.currentUser.uid });
            loadRoutines(); alert("Routines importées !");
        };

        async function updateGhost() {
            const m = document.getElementById('machine').value; const g = document.getElementById('last-workout-ghost');
            const q = query(collection(db, "workouts"), where("userId", "==", auth.currentUser.uid), where("machine", "==", m), orderBy("timestamp", "desc"));
            const s = await getDocs(q); if(s.empty) { g.innerText = "PREMIÈRE FOIS ! 💪"; return; }
            const l = s.docs[0].data(); const isC = exerciseCategories[m] === "Cardio";
            g.innerText = isC ? `DERNIER : ${l.weight}MIN | ${l.reps}KM` : `DERNIER : ${l.weight}KG X ${l.reps} (${calc1RM(l.weight, l.reps)}kg)`;
        }

        async function loadPRs() { const snap = await getDocs(query(collection(db, "workouts"), where("userId", "==", auth.currentUser.uid))); personalRecords = {}; snap.forEach(d => { const da = d.data(); if(!da.isWarmup && (!personalRecords[da.machine] || da.weight > personalRecords[da.machine])) personalRecords[da.machine] = da.weight; }); }
        
        document.getElementById('auth-submit-btn').onclick = async () => { try { await signInWithEmailAndPassword(auth, document.getElementById('auth-email').value, document.getElementById('auth-password').value); } catch { try { await createUserWithEmailAndPassword(auth, document.getElementById('auth-email').value, document.getElementById('auth-password').value); } catch(err) { alert("Erreur d'authentification"); } } };
    </script>
</body>
</html>
