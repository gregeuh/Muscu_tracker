<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Muscu Pro Elite V80 - Liquid Glass</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --bg-gradient: radial-gradient(at 0% 0%, #f8f9fc 0%, #e2e8f0 100%);
            --glass-bg: rgba(255, 255, 255, 0.5);
            --glass-border: rgba(255, 255, 255, 0.7);
            --text-main: #1c1c1e;
            --text-muted: #636366;
            --accent-color: #007aff;
            --accent-glass: rgba(0, 122, 255, 0.1);
            --danger-color: #ff3b30;
            --pr-color: #34c759;
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.08);
            --blur: blur(16px);
            --font-impact: 'Bebas Neue', sans-serif;
            --font-main: 'Inter', sans-serif;
        }

        [data-theme="dark"] {
            --bg-gradient: radial-gradient(at 0% 0%, #1c1c1e 0%, #000000 100%);
            --glass-bg: rgba(28, 28, 30, 0.65);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: #a1a1a6;
            --accent-color: #0a84ff;
            --accent-glass: rgba(10, 132, 255, 0.2);
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.6);
        }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        html, body { 
            height: 100%; margin: 0; padding: 0; 
            background: var(--bg-gradient); background-attachment: fixed;
            font-family: var(--font-main); color: var(--text-main); 
            transition: 0.4s; overflow-x: hidden;
        }

        body { 
            display: flex; flex-direction: column; 
            padding-top: calc(75px + env(safe-area-inset-top, 0px)); 
            padding-bottom: 130px; box-sizing: border-box; overflow-y: auto; 
        }

        header { 
            position: fixed; top: 0; left: 0; right: 0; height: 64px; 
            background: var(--glass-bg); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
            border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; 
            padding: 0 20px; z-index: 2000; padding-top: env(safe-area-inset-top); 
        }

        .logo { font-family: var(--font-impact); font-size: 28px; letter-spacing: 1px; }
        .logo span { color: var(--accent-color); }

        #auth-screen { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: var(--bg-gradient); z-index: 6000; padding: 30px; box-sizing: border-box; text-align: center;
        }

        nav { 
            position: fixed; bottom: calc(25px + env(safe-area-inset-bottom)); 
            left: 50%; transform: translateX(-50%); width: 92%; max-width: 420px; height: 72px; 
            background: var(--glass-bg); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--glass-border); border-radius: 35px; 
            display: flex; justify-content: space-around; align-items: center; 
            z-index: 4500; box-shadow: var(--shadow); padding: 0 10px;
        }
        .nav-btn { background: none; border: none; color: var(--text-muted); font-size: 10px; font-weight: 800; display: flex; flex-direction: column; align-items: center; gap: 5px; flex: 1; transition: 0.3s; }
        .nav-btn span { font-size: 24px; transition: 0.2s; }
        .nav-btn.active { color: var(--accent-color); }
        .nav-btn.active span { transform: scale(1.2) translateY(-4px); }

        .card { 
            background: var(--glass-bg); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
            padding: 25px; border-radius: 32px; margin-bottom: 25px; 
            border: 1px solid var(--glass-border); box-shadow: var(--shadow); 
            animation: fadeInUp 0.6s ease-out both; 
        }

        input, select { 
            width: 100%; padding: 18px; 
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); 
            color: var(--text-main); border-radius: 18px; font-size: 16px; font-weight: 600; 
            box-sizing: border-box; margin-bottom: 12px; outline: none; transition: 0.3s; 
        }

        .btn-primary { 
            background: var(--accent-color); color: white; border: none; padding: 18px; 
            font-family: var(--font-impact); font-size: 22px; border-radius: 22px; 
            width: 100%; cursor: pointer; transition: 0.2s; 
        }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; text-align: center; }
        .day-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; border-radius: 14px; cursor: pointer; transition: 0.2s; }
        .day-cell.has-data { background: var(--accent-glass); color: var(--accent-color); }
        .day-cell.selected { background: var(--accent-color) !important; color: white !important; }

        .modal-overlay { position: fixed !important; top: 0 !important; left: 0 !important; width: 100% !important; height: 100% !important; background: rgba(0,0,0,0.8); backdrop-filter: blur(12px); display: none; align-items: center; justify-content: center; z-index: 6000; padding: 20px; box-sizing: border-box; }
        .modal-card { width: 100%; max-width: 440px; background: var(--glass-bg); backdrop-filter: blur(25px); border-radius: 38px; padding: 35px; border: 1px solid var(--glass-border); box-shadow: var(--shadow); max-height: 85vh; overflow-y: auto; }
    </style>
</head>
<body>
    <header>
        <div class="logo">MUSCU<span>PRO</span></div>
        <div class="header-right">
            <button onclick="toggleTheme()" style="background:none; border:none; font-size:24px; cursor:pointer;">🌙</button>
            <button onclick="openTrash()" style="background:none; border:none; font-size:24px; cursor:pointer;">🗑️</button>
            <img id="user-photo" class="user-photo" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
            <button id="logout-btn" style="position: absolute; top: 65px; right: 20px; background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 10px; border-radius: 12px; display:none;">DÉCONNEXION</button>
        </div>
    </header>

    <div id="auth-screen">
        <h1 style="font-family: var(--font-impact); font-size: 70px; letter-spacing: 4px; margin-bottom: 50px;">MUSCU<span>PRO</span></h1>
        <button id="google-login-btn" class="google-btn"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20"> CONTINUER AVEC GOOGLE</button>
        <div style="width:100%; max-width:340px; border-top:1px solid var(--glass-border); padding-top:35px;">
            <input type="email" id="auth-email" placeholder="Email"><input type="password" id="auth-password" placeholder="Pass">
            <button id="auth-submit-btn" class="btn-primary" style="margin-top:10px; font-size: 18px;">CONNEXION / CRÉATION</button>
        </div>
    </div>

    <div id="app-screen">
        <section id="workout" class="tab-content active">
            <h2>MA SÉANCE</h2>
            <div class="card">
                <form id="workout-form">
                    <input type="date" id="workout-date" required>
                    <div style="display:flex; gap:12px;"><select id="machine" required></select><button type="button" onclick="openModal()" style="width:60px; border-radius:18px; background:var(--accent-color); color:white; border:none; font-size:28px;">+</button></div>
                    <div id="last-workout-ghost">Chargement...</div>
                    <div style="display:flex; gap:12px;"><input type="number" id="weight" placeholder="Kg" required step="any"><input type="number" id="reps" placeholder="Reps" required></div>
                    <div id="one-rm-live">1RM ESTIMÉ : -</div>
                    <label style="display:flex; align-items:center; gap:12px; justify-content:center; margin-bottom:18px; font-size:15px; font-weight:700;"><input type="checkbox" id="is-warmup" style="width:22px; height:22px;"> 🔥 ÉCHAUFFEMENT</label>
                    <button type="submit" class="btn-primary">ENREGISTRER LA SÉRIE</button>
                </form>
            </div>
            <h3 class="session-title">SÉANCE DU JOUR <button style="font-size:12px; opacity:0.6; background:none; border:none; color:var(--danger-color);" onclick="deleteAllSeries()">TOUT SUPPRIMER</button></h3>
            <div id="history-list"></div>
        </section>

        <section id="exercises-tab" class="tab-content">
            <h2>MES MACHINES</h2>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-bottom:30px;"><button class="btn-primary" onclick="openModal()">+ AJOUTER</button><button class="btn-primary" style="background:var(--accent-glass); color:var(--accent-color);" onclick="importDefaults()">📚 CATALOGUE</button></div>
            <h3 class="session-title">LISTE PAR MUSCLE</h3>
            <div id="machine-grouped-list"></div>
        </section>

        <section id="calendar-tab" class="tab-content">
            <h2>CALENDRIER</h2>
            <div class="card">
                <div style="display:flex; justify-content:space-between; margin-bottom:20px;"><div id="month-display" style="font-family:var(--font-impact); font-size:24px;">Mois</div><div><button onclick="changeMonth(-1)" class="nav-btn">‹</button><button onclick="changeMonth(1)" class="nav-btn">›</button></div></div>
                <div class="calendar-grid" id="calendar-container"></div>
            </div>
            <div id="day-details"></div>
        </section>

        <section id="stats" class="tab-content">
            <h2>MES STATS</h2>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-bottom:20px;">
                <div class="card" style="text-align:center;"><h4>SÉRIES</h4><p id="stat-series" style="font-size:32px; color:var(--accent-color); font-family:var(--font-impact);">0</p></div>
                <div class="card" style="text-align:center;"><h4>VOLUME</h4><p id="stat-volume" style="font-size:32px; color:var(--pr-color); font-family:var(--font-impact);">0</p></div>
            </div>
            <div class="card"><canvas id="statsChart"></canvas></div>
        </section>
    </div>

    <nav id="bottom-nav">
        <button class="nav-btn active" onclick="showTab('workout', this)"><span>🏋️</span>SÉANCE</button>
        <button class="nav-btn" onclick="showTab('exercises-tab', this)"><span>⚙️</span>MACHINES</button>
        <button class="nav-btn" onclick="showTab('calendar-tab', this)"><span>📅</span>CALENDRIER</button>
        <button class="nav-btn" onclick="showTab('stats', this)"><span>📊</span>STATS</button>
    </nav>

    <div id="modal-trash" class="modal-overlay" onclick="this.style.display='none'"><div class="modal-card" onclick="event.stopPropagation()"><h2>CORBEILLE</h2><div id="trash-list"></div><button class="btn-primary" style="background:var(--danger-color); margin-top:20px;" onclick="emptyTrash()">VIDER</button></div></div>
    <div id="modal-add-machine" class="modal-overlay"><div class="modal-card"><h2>MACHINE</h2><input type="text" id="new-machine-name" placeholder="Nom"><select id="new-machine-category"><option>Pectoraux</option><option>Dos</option><option>Jambes</option><option>Épaules</option><option>Bras</option><option>Abdos</option><option value="Cardio">Cardio</option></select><button class="btn-primary" id="save-machine-btn">VALIDER</button><button onclick="closeModal()" style="background:none; border:none; width:100%; margin-top:10px; color:var(--text-muted);">ANNULER</button></div></div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, where, limit, deleteDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyDqD_BnYDL6GwQPIsn3W8ffnoo9BwoKr1Q", authDomain: "suivi-muscu-8dd6d.firebaseapp.com", projectId: "suivi-muscu-8dd6d", storageBucket: "suivi-muscu-8dd6d.firebasestorage.app", messagingSenderId: "1011748268882", appId: "G-P9TLE42VZ1" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app); const auth = getAuth(app);
        const provider = new GoogleAuthProvider(); setPersistence(auth, browserLocalPersistence);

        let curDate = new Date(); let exCats = {}; let statChart = null;

        // --- AUTH LOGIC ---
        onAuthStateChanged(auth, (u) => {
            if (u) {
                document.getElementById('auth-screen').style.display = 'none'; document.getElementById('app-screen').style.display = 'block';
                if(u.photoURL) document.getElementById('user-photo').src = u.photoURL;
                initApp();
            } else {
                document.getElementById('auth-screen').style.display = 'flex'; document.getElementById('app-screen').style.display = 'none';
            }
        });

        document.getElementById('google-login-btn').onclick = () => signInWithPopup(auth, provider);
        document.getElementById('auth-submit-btn').onclick = async () => {
            const e = document.getElementById('auth-email').value, p = document.getElementById('auth-password').value;
            try { await signInWithEmailAndPassword(auth, e, p); } catch { try { await createUserWithEmailAndPassword(auth, e, p); } catch(err) { alert("Erreur d'auth"); } }
        };

        const uPhoto = document.getElementById('user-photo'); const outBtn = document.getElementById('logout-btn');
        uPhoto.onclick = (e) => { e.stopPropagation(); outBtn.style.display = (outBtn.style.display === 'block') ? 'none' : 'block'; };
        outBtn.onclick = () => signOut(auth);

        // --- CORE LOGIC ---
        async function initApp() {
            document.getElementById('workout-date').value = new Date().toISOString().split('T')[0];
            await loadExs(); loadWorkouts(); updateGhost();
            document.getElementById('weight').oninput = upCalc;
            document.getElementById('reps').oninput = upCalc;
            document.getElementById('machine').onchange = () => { adaptCardio(); updateGhost(); };
        }

        const calc1RM = (w, r) => { const weight = Number(w); const reps = Number(r); if (!weight || !reps || reps <= 0) return 0; return reps === 1 ? weight : Math.round(weight / (1.0278 - (0.0278 * reps))); };

        async function updateGhost() {
            const m = document.getElementById('machine').value; const ghost = document.getElementById('last-workout-ghost');
            if(!m) return;
            const q = query(collection(db, "workouts"), where("userId", "==", auth.currentUser.uid), where("machine", "==", m));
            const snap = await getDocs(q);
            if(snap.empty) { ghost.innerHTML = "NOUVEAU ! 💪"; return; }
            let all = []; snap.forEach(d => all.push(d.data())); all.sort((a,b) => b.timestamp.toDate() - a.timestamp.toDate());
            const last = all[0]; const isC = exCats[m] === "Cardio";
            ghost.innerHTML = isC ? `DERNIER : <strong>${last.weight}min | ${last.reps}km</strong>` : `DERNIER : <strong>${last.weight}kg x ${last.reps}</strong> (${calc1RM(last.weight, last.reps)}kg)`;
        }

        async function loadExs() {
            const snap = await getDocs(query(collection(db, "exercises"), where("userId", "==", auth.currentUser.uid)));
            let grouped = {}; exCats = {};
            snap.forEach(d => { const da = d.data(); const cat = da.category || "Autre"; if(!grouped[cat]) grouped[cat] = []; grouped[cat].push(da.name); exCats[da.name] = cat; });
            let opts = ""; Object.keys(grouped).sort().forEach(cat => {
                opts += `<optgroup label="${cat.toUpperCase()}">`;
                grouped[cat].sort().forEach(name => opts += `<option value="${name}">${name}</option>`);
                opts += `</optgroup>`;
            });
            document.getElementById('machine').innerHTML = opts; document.getElementById('machine').dispatchEvent(new Event('change'));
            renderExList(grouped);
        }

        function renderExList(grouped) {
            const cont = document.getElementById('machine-grouped-list'); cont.innerHTML = "";
            Object.keys(grouped).sort().forEach(cat => {
                let html = `<h4 class="session-title" style="font-size:14px;">${cat.toUpperCase()}</h4><div style="background:rgba(255,255,255,0.05); border-radius:20px; border:1px solid var(--glass-border); overflow:hidden; margin-bottom:20px;">`;
                grouped[cat].forEach(name => html += `<div style="padding:15px; border-bottom:1px solid var(--glass-border);">${name}</div>`);
                cont.innerHTML += html + "</div>";
            });
        }

        async function loadWorkouts() {
            const ds = document.getElementById('workout-date').value;
            const snap = await getDocs(query(collection(db, "workouts"), where("userId", "==", auth.currentUser.uid)));
            let filtered = []; snap.forEach(d => { if(d.data().timestamp.toDate().toISOString().split('T')[0] === ds) filtered.push({id: d.id, data: d.data()}); });
            filtered.sort((a,b) => a.data.timestamp.toDate() - b.data.timestamp.toDate());
            const cont = document.getElementById('history-list'); cont.innerHTML = ''; let curM = "";
            filtered.forEach(x => {
                if(curM !== x.data.machine) { curM = x.data.machine; cont.innerHTML += `<div id="g-${x.id}" style="margin-bottom:15px;"><div class="group-header-title">🏋️ ${curM.toUpperCase()}</div></div>`; }
                const val = exCats[x.data.machine] === "Cardio" ? `${x.data.weight}min | ${x.data.reps}km` : `${x.data.weight}kg x ${x.reps}`;
                document.getElementById(`g-${x.id}`).innerHTML += `<div class="set-item"><div>${val}</div><button style="background:none; border:none; color:var(--danger-color); cursor:pointer;" onclick="deleteSeries('${x.id}')">🗑️</button></div>`;
            });
        }

        window.deleteSeries = async (id) => {
            const ref = doc(db, "workouts", id); const snap = await getDoc(ref);
            if(snap.exists() && confirm("Corbeille ?")) {
                await addDoc(collection(db, "trash"), { ...snap.data(), deletedAt: new Date() });
                await deleteDoc(ref); loadWorkouts(); updateGhost();
            }
        };

        window.showTab = (id, btn) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active'); btn.classList.add('active');
            if(id === 'stats') loadStats(); if(id === 'calendar-tab') renderCalendar();
        };

        window.toggleTheme = () => { const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'; document.documentElement.setAttribute('data-theme', t); localStorage.setItem('theme', t); };
        window.openModal = () => document.getElementById('modal-add-machine').style.display='flex';
        window.closeModal = () => document.getElementById('modal-add-machine').style.display='none';
        function upCalc() { const m = document.getElementById('machine').value; if(exCats[m]==="Cardio") return; const rm = calc1RM(document.getElementById('weight').value, document.getElementById('reps').value); document.getElementById('one-rm-live').innerText = rm>0?`1RM: ${rm}kg`:'-'; }
        function adaptCardio() { const m = document.getElementById('machine').value; const c = exCats[m]==="Cardio"; document.getElementById('weight').placeholder = c?"Min":"Kg"; document.getElementById('reps').placeholder = c?"Km":"Reps"; }
        document.getElementById('workout-form').onsubmit = async (e) => {
            e.preventDefault(); await addDoc(collection(db, "workouts"), { machine: document.getElementById('machine').value, weight: Number(document.getElementById('weight').value), reps: Number(document.getElementById('reps').value), isWarmup: document.getElementById('is-warmup').checked, timestamp: new Date(document.getElementById('workout-date').value + "T12:00:00"), userId: auth.currentUser.uid });
            confetti({ particleCount: 50, spread: 60, origin: { y: 0.8 } }); loadWorkouts(); updateGhost();
        };
    </script>
</body>
</html>
