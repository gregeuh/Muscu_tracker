<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Muscu Pro Elite V95 - Master Edition</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2964/2964514.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        /* SYSTÈME DE DESIGN : LIQUID GLASS (GLASSMORPHISM) 
           Utilisation de flous de profondeur et de transparences.
        */
        :root {
            --bg-gradient: radial-gradient(at 0% 0%, #1c1c1e 0%, #000000 100%);
            --glass-bg: rgba(28, 28, 30, 0.7);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --accent-color: #0a84ff;
            --accent-soft: rgba(10, 132, 255, 0.15);
            --danger-color: #ff3b30;
            --pr-color: #34c759;
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            --blur: blur(20px);
            --font-impact: 'Bebas Neue', sans-serif;
            --font-main: 'Inter', sans-serif;
        }

        /* THÈME CLAIR ADAPTATIF */
        [data-theme="light"] {
            --bg-gradient: radial-gradient(at 0% 0%, #f8f9fc 0%, #e2e8f0 100%);
            --glass-bg: rgba(255, 255, 255, 0.5);
            --glass-border: rgba(255, 255, 255, 0.7);
            --text-main: #1c1c1e;
            --text-muted: #636366;
            --accent-color: #007aff;
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.08);
        }

        /* RÉGLAGES GÉNÉRAUX ET IPHONE SAFE AREA */
        html, body { 
            height: 100%; margin: 0; padding: 0; 
            background: var(--bg-gradient); 
            background-attachment: fixed;
            color: var(--text-main); font-family: var(--font-main); 
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.4s ease;
        }

        body { 
            display: flex; flex-direction: column; 
            /* Espacement spécifique pour éviter l'encoche iPhone et le dock */
            padding-top: calc(85px + env(safe-area-inset-top)); 
            padding-bottom: calc(115px + env(safe-area-inset-bottom)); 
            box-sizing: border-box; 
        }
        
        /* HEADER PREMIUM : Protection Safe Area Top */
        header { 
            position: fixed; top: 0; left: 0; right: 0; 
            height: calc(65px + env(safe-area-inset-top)); 
            background: var(--glass-bg); 
            backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
            border-bottom: 1px solid var(--glass-border); 
            display: flex; justify-content: space-between; 
            align-items: flex-end; 
            padding: 0 20px 12px 20px; 
            z-index: 4000; 
            box-sizing: border-box; 
        }

        .logo { font-family: var(--font-impact); font-size: 26px; letter-spacing: 1px; }
        .logo span { color: var(--accent-color); }
        .header-right { display: flex; align-items: center; gap: 18px; }
        .user-photo { width: 34px; height: 34px; border-radius: 50%; border: 2px solid var(--accent-color); object-fit: cover; cursor: pointer; }

        /* NAVIGATION : DOCK FLOTTANT IOS STYLE */
        nav { 
            position: fixed; 
            bottom: calc(25px + env(safe-area-inset-bottom)); 
            left: 50%; transform: translateX(-50%); 
            width: 92%; max-width: 420px; height: 72px; 
            background: var(--glass-bg); 
            backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--glass-border); border-radius: 36px; 
            display: flex; justify-content: space-around; align-items: center; 
            z-index: 4000; box-shadow: var(--shadow); 
        }
        
        .nav-btn { background: none; border: none; color: var(--text-muted); font-size: 10px; font-weight: 800; display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; transition: 0.3s; cursor: pointer; }
        .nav-btn.active { color: var(--accent-color); }
        .nav-btn span { font-size: 24px; transition: transform 0.2s; }
        .nav-btn.active span { transform: scale(1.2) translateY(-4px); }

        /* CONTENEURS D'ÉCRANS */
        #app-screen { display: none; width: 100%; max-width: 500px; margin: 0 auto; padding: 0 16px; box-sizing: border-box; }
        .tab-content { display: none; width: 100%; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        
        /* CARTES ET COMPOSANTS */
        .card { background: var(--glass-bg); backdrop-filter: var(--blur); padding: 25px; border-radius: 32px; margin-bottom: 25px; border: 1px solid var(--glass-border); box-shadow: var(--shadow); animation: fadeInUp 0.5s ease-out both; }
        h2 { font-family: var(--font-impact); font-size: 42px; margin: 10px 0 25px 0; text-transform: uppercase; letter-spacing: 1px; }
        h3.session-title { font-family: var(--font-impact); font-size: 22px; margin: 30px 0 15px 5px; color: var(--accent-color); display: flex; justify-content: space-between; align-items: center; }

        /* ÉLÉMENTS DE FORMULAIRE */
        input, select { width: 100%; padding: 18px; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); color: #fff; border-radius: 18px; font-size: 16px; margin-bottom: 15px; outline: none; -webkit-appearance: none; transition: 0.3s; }
        input:focus { border-color: var(--accent-color); background: rgba(255, 255, 255, 0.1); }
        
        .btn-primary { background: var(--accent-color); color: white; border: none; padding: 18px; font-family: var(--font-impact); font-size: 22px; border-radius: 22px; width: 100%; cursor: pointer; box-shadow: 0 5px 15px rgba(0, 122, 255, 0.3); transition: 0.2s; }
        .btn-primary:active { transform: scale(0.97); }
        .btn-danger-soft { background: rgba(255, 59, 48, 0.15); color: var(--danger-color); border: none; padding: 10px 18px; border-radius: 14px; font-family: var(--font-impact); cursor: pointer; }

        /* LISTES ET HISTORIQUE */
        .set-item { display: flex; justify-content: space-between; align-items: center; padding: 18px 22px; background: rgba(255, 255, 255, 0.03); border-radius: 25px; margin-bottom: 12px; border: 1px solid var(--glass-border); box-shadow: var(--shadow); }
        .group-header-title { font-family: var(--font-impact); font-size: 20px; color: var(--accent-color); margin: 0 0 12px 5px; text-transform: uppercase; }
        #last-workout-ghost { font-size: 12px; color: var(--text-muted); text-align: center; margin: 15px 0; min-height: 35px; background: rgba(255,255,255,0.02); padding: 10px; border-radius: 15px; font-weight: 600; }

        /* CALENDRIER INTERACTIF */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; text-align: center; }
        .day-label { font-size: 11px; font-weight: 800; color: var(--text-muted); padding: 8px 0; text-transform: uppercase; }
        .day-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; border-radius: 14px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
        .day-cell.has-data { background: var(--accent-soft); color: var(--accent-color); font-weight: 800; }
        .day-cell.selected { background: var(--accent-color) !important; color: white !important; box-shadow: 0 5px 15px rgba(0, 122, 255, 0.3); }

        /* TABLEAU RÉSUMÉ CARDIO */
        .cardio-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .cardio-table th { text-align: left; padding: 10px; color: var(--text-muted); font-size: 12px; border-bottom: 1px solid var(--glass-border); }
        .cardio-table td { padding: 15px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); font-weight: 700; font-size: 14px; }
        .cardio-val { color: var(--accent-color); font-family: var(--font-impact); font-size: 18px; }

        /* SYSTÈME DE MODALES */
        .modal-overlay { position: fixed !important; top: 0 !important; left: 0 !important; width: 100% !important; height: 100% !important; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); display: none; align-items: center; justify-content: center; z-index: 6000; padding: 20px; box-sizing: border-box; }
        .modal-card { width: 100%; max-width: 440px; background: var(--glass-bg); backdrop-filter: var(--blur); border-radius: 38px; padding: 35px; border: 1px solid var(--glass-border); box-shadow: 0 25px 60px rgba(0,0,0,0.5); max-height: 85vh; overflow-y: auto; }
        
        /* AUTHENTIFICATION */
        #auth-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg-gradient); z-index: 9000; text-align: center; padding: 40px; box-sizing: border-box; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header>
        <div class="logo">MUSCU<span>PRO</span></div>
        <div class="header-right">
            <button onclick="toggleTheme()" style="background:none; border:none; font-size:24px; cursor:pointer;">🌙</button>
            <button onclick="openTrash()" style="background:none; border:none; font-size:24px; cursor:pointer;">🗑️</button>
            <img id="user-photo" class="user-photo" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
        </div>
    </header>

    <div id="auth-screen">
        <h1 style="font-family: var(--font-impact); font-size: 70px; letter-spacing: 3px; margin-bottom: 50px;">MUSCU<span>PRO</span></h1>
        <button id="google-login-btn" class="btn-primary" style="background:white; color:#000; font-family:var(--font-main); font-size:16px; margin-bottom:30px;">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" style="vertical-align:middle; margin-right:10px;"> GOOGLE LOGIN
        </button>
        <div style="width:100%; max-width:320px; border-top:1px solid rgba(255,255,255,0.1); padding-top:35px;">
            <input type="email" id="auth-email" placeholder="Adresse Email">
            <input type="password" id="auth-password" placeholder="Mot de passe">
            <button id="auth-submit-btn" class="btn-primary" style="margin-top:10px;">CONNEXION / CRÉER COMPTE</button>
        </div>
    </div>

    <div id="app-screen">
        
        <section id="workout" class="tab-content active">
            <h2>MA SÉANCE</h2>
            <div class="card">
                <form id="workout-form">
                    <input type="date" id="workout-date" required>
                    <div style="display:flex; gap:12px;">
                        <select id="machine" required></select>
                        <button type="button" onclick="openModal()" style="width:60px; height:55px; border-radius:18px; background:var(--accent-color); color:white; border:none; font-size:30px; cursor:pointer;">+</button>
                    </div>
                    <div id="last-workout-ghost">Chargement historique...</div>
                    <div style="display:flex; gap:12px;">
                        <input type="number" id="weight" placeholder="Kg" required step="any">
                        <input type="number" id="reps" placeholder="Reps" required>
                    </div>
                    <div id="one-rm-live" style="font-family:var(--font-impact); text-align:center; color:var(--accent-color); margin-bottom:15px; font-size:20px;">1RM ESTIMÉ : -</div>
                    <label style="display:flex; align-items:center; gap:12px; justify-content:center; margin-bottom:20px; font-weight:700;">
                        <input type="checkbox" id="is-warmup" style="width:22px; height:22px;"> 🔥 ÉCHAUFFEMENT
                    </label>
                    <button type="submit" class="btn-primary">ENREGISTRER LA SÉRIE</button>
                </form>
            </div>
            <h3 class="session-title">SÉANCE DU JOUR <button class="btn-danger-soft" onclick="deleteAllSeries()">TOUT SUPPRIMER</button></h3>
            <div id="history-list"></div>
        </section>

        <section id="exercises-tab" class="tab-content">
            <h2>MES MACHINES</h2>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:35px;">
                <button class="btn-primary" onclick="openModal()">+ AJOUTER</button>
                <button class="btn-primary" style="background:var(--accent-soft); color:var(--accent-color); border:1px solid var(--glass-border);" onclick="importDefaults()">📚 CATALOGUE</button>
            </div>
            
            <h3 class="session-title">MES ROUTINES <button class="btn-primary" style="width:auto; padding:8px 18px; font-size:14px;" onclick="openRoutineModal()">+ CRÉER</button></h3>
            <div id="routines-list" style="margin-bottom:30px;"></div>
            
            <h3 class="session-title">LISTE PAR MUSCLE</h3>
            <div id="machine-grouped-list"></div>
        </section>

        <section id="calendar-tab" class="tab-content">
            <h2>CALENDRIER</h2>
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
                    <div id="month-display" style="font-family:var(--font-impact); font-size:28px; text-transform:uppercase;">Mois</div>
                    <div style="display:flex; gap:12px;">
                        <button onclick="changeMonth(-1)" style="background:none; border:1px solid var(--glass-border); color:white; border-radius:12px; width:45px; height:45px; cursor:pointer;">‹</button>
                        <button onclick="changeMonth(1)" style="background:none; border:1px solid var(--glass-border); color:white; border-radius:12px; width:45px; height:45px; cursor:pointer;">›</button>
                    </div>
                </div>
                <div class="calendar-grid" id="calendar-container"></div>
            </div>
            <div id="day-details" style="margin-top:20px;"></div>
        </section>

        <section id="stats" class="tab-content">
            <h2>MES STATS</h2>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:18px; margin-bottom:30px;">
                <div class="card" style="text-align:center; padding:20px;">
                    <h4 style="margin:0; font-size:12px; color:var(--text-muted); text-transform:uppercase;">SÉRIES</h4>
                    <p id="stat-series" style="font-size:42px; margin:0; color:var(--accent-color); font-family:var(--font-impact);">0</p>
                </div>
                <div class="card" style="text-align:center; padding:20px;">
                    <h4 style="margin:0; font-size:12px; color:var(--text-muted); text-transform:uppercase;">VOLUME</h4>
                    <p id="stat-volume" style="font-size:42px; margin:0; color:var(--pr-color); font-family:var(--font-impact);">0</p>
                </div>
            </div>
            
            <div class="card">
                <h4 style="font-family:var(--font-impact); margin-top:0; text-align:center;">🏃 RÉSUMÉ CARDIO</h4>
                <div id="cardio-summary-list"></div>
            </div>

            <div class="card">
                <h4 style="font-family:var(--font-impact); margin-top:0; text-align:center;">🔥 RÉPARTITION MUSCULAIRE</h4>
                <canvas id="muscleChart" height="280"></canvas>
            </div>
            
            <div class="card">
                <h4 style="font-family:var(--font-impact); margin-top:0; text-align:center;">🏆 TOP RECORDS (KG)</h4>
                <canvas id="statsChart" height="220"></canvas>
            </div>
        </section>
    </div>

    <nav id="bottom-nav">
        <button class="nav-btn active" onclick="showTab('workout', this)"><span>🏋️</span>SÉANCE</button>
        <button class="nav-btn" onclick="showTab('exercises-tab', this)"><span>⚙️</span>MACHINES</button>
        <button class="nav-btn" onclick="showTab('calendar-tab', this)"><span>📅</span>CALENDRIER</button>
        <button class="nav-btn" onclick="showTab('stats', this)"><span>📊</span>STATS</button>
    </nav>

    <div id="modal-trash" class="modal-overlay" onclick="this.style.display='none'">
        <div class="modal-card" onclick="event.stopPropagation()">
            <h2 style="color:var(--danger-color)">CORBEILLE</h2>
            <div id="trash-list" style="margin-bottom:25px; max-height: 400px; overflow-y: auto;"></div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                <button class="btn-primary" style="background:rgba(255,255,255,0.1); color:#fff;" onclick="document.getElementById('modal-trash').style.display='none'">FERMER</button>
                <button class="btn-primary" style="background:var(--danger-color);" onclick="emptyTrash()">VIDER TOUT</button>
            </div>
        </div>
    </div>

    <div id="modal-add-machine" class="modal-overlay">
        <div class="modal-card">
            <h2>MACHINE</h2>
            <input type="text" id="new-machine-name" placeholder="Nom de l'exercice">
            <select id="new-machine-category">
                <option>Pectoraux</option><option>Dos</option><option>Jambes</option>
                <option>Épaules</option><option>Bras</option><option>Abdos</option>
                <option value="Cardio">Cardio</option>
            </select>
            <button class="btn-primary" id="save-machine-btn">VALIDER</button>
            <button onclick="closeModal()" style="background:none; border:none; width:100%; margin-top:15px; color:var(--text-muted); cursor:pointer;">ANNULER</button>
        </div>
    </div>

    <div id="modal-routine" class="modal-overlay">
        <div class="modal-card">
            <h2>NOUVELLE ROUTINE</h2>
            <input type="text" id="routine-name" placeholder="Nom (ex: PUSH DAY)">
            <div id="routine-selection" style="max-height:300px; overflow-y:auto; margin-bottom:20px; border-radius:15px; background:rgba(255,255,255,0.02); padding:10px;"></div>
            <button class="btn-primary" onclick="saveRoutine()">ENREGISTRER</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, where, deleteDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";

        // CONFIGURATION FIREBASE
        const firebaseConfig = { 
            apiKey: "AIzaSyDqD_BnYDL6GwQPIsn3W8ffnoo9BwoKr1Q", 
            authDomain: "suivi-muscu-8dd6d.firebaseapp.com", 
            projectId: "suivi-muscu-8dd6d", 
            storageBucket: "suivi-muscu-8dd6d.firebasestorage.app", 
            messagingSenderId: "1011748268882", 
            appId: "G-P9TLE42VZ1" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        setPersistence(auth, browserLocalPersistence);

        // ÉTAT GLOBAL
        let curViewDate = new Date();
        let exCats = {}; 
        let muscleChart = null;
        let recordsChart = null;

        // --- 1. AUTHENTIFICATION ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-screen').style.display = 'block';
                if(user.photoURL) document.getElementById('user-photo').src = user.photoURL;
                initApp();
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('app-screen').style.display = 'none';
            }
        });

        document.getElementById('google-login-btn').onclick = () => signInWithPopup(auth, provider);
        
        document.getElementById('auth-submit-btn').onclick = async () => {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-password').value;
            if(!email || !pass) return alert("Veuillez remplir les identifiants.");
            try { 
                await signInWithEmailAndPassword(auth, email, pass); 
            } catch {
                try { await createUserWithEmailAndPassword(auth, email, pass); } catch(err) { alert("Erreur d'authentification"); }
            }
        };

        // --- 2. INITIALISATION DE L'APPLICATION ---
        async function initApp() {
            document.getElementById('workout-date').value = new Date().toISOString().split('T')[0];
            await loadExercises();
            loadWorkouts();
            loadRoutines();
            updateGhost();
            
            document.getElementById('weight').oninput = updateLive1RM;
            document.getElementById('reps').oninput = updateLive1RM;
            document.getElementById('machine').onchange = () => { 
                adaptCardioUI(); 
                updateGhost(); 
            };
        }

        // --- 3. MÉTIER : CALCULS ET UI ADAPTATIVE ---
        const calc1RM = (w, r) => (w && r > 0) ? Math.round(w / (1.0278 - (0.0278 * r))) : 0;
        
        function updateLive1RM() { 
            const machine = document.getElementById('machine').value;
            if (exCats[machine] === "Cardio") return;
            const rm = calc1RM(document.getElementById('weight').value, document.getElementById('reps').value);
            document.getElementById('one-rm-live').innerText = rm > 0 ? `1RM ESTIMÉ : ${rm} KG` : `1RM ESTIMÉ : -`; 
        }

        function adaptCardioUI() { 
            const machine = document.getElementById('machine').value;
            const isCardio = exCats[machine] === "Cardio";
            document.getElementById('weight').placeholder = isCardio ? "Minutes" : "Kg";
            document.getElementById('reps').placeholder = isCardio ? "Kilomètres" : "Reps";
            document.getElementById('one-rm-live').style.display = isCardio ? "none" : "block";
        }

        async function updateGhost() {
            const machine = document.getElementById('machine').value;
            const ghostDiv = document.getElementById('last-workout-ghost');
            if(!machine || !auth.currentUser) return;
            
            const q = query(collection(db, "workouts"), where("userId", "==", auth.currentUser.uid), where("machine", "==", machine));
            const snap = await getDocs(q);
            
            if(snap.empty) { ghostDiv.innerHTML = "PREMIÈRE FOIS SUR CET EXERCICE ! 💪"; return; }
            
            let all = snap.docs.map(d => d.data()).sort((a,b) => b.timestamp.toDate() - a.timestamp.toDate());
            const last = all[0];
            const valText = exCats[machine] === "Cardio" ? last.weight + "min | " + last.reps + "km" : last.weight + "kg x " + last.reps;
            ghostDiv.innerHTML = `DERNIER : <strong>${valText}</strong>`;
        }

        // --- 4. GESTION DES EXERCICES ET MACHINES ---
        async function loadExercises() {
            const snap = await getDocs(query(collection(db, "exercises"), where("userId", "==", auth.currentUser.uid)));
            let grouped = {}; exCats = {};
            
            snap.forEach(d => {
                const da = d.data();
                const cat = da.category || "Autre";
                if(!grouped[cat]) grouped[cat] = [];
                grouped[cat].push({id: d.id, name: da.name});
                exCats[da.name] = cat;
            });

            // Rendu Menu Déroulant
            let opts = "";
            Object.keys(grouped).sort().forEach(cat => {
                opts += `<optgroup label="${cat.toUpperCase()}">`;
                grouped[cat].sort((a,b) => a.name.localeCompare(b.name)).forEach(ex => {
                    opts += `<option value="${ex.name}">${ex.name}</option>`;
                });
                opts += `</optgroup>`;
            });
            document.getElementById('machine').innerHTML = opts;
            document.getElementById('machine').dispatchEvent(new Event('change'));

            // Rendu Liste de Gestion
            const listCont = document.getElementById('machine-grouped-list');
            listCont.innerHTML = "";
            Object.keys(grouped).sort().forEach(cat => {
                let html = `<h4 style="font-size:12px; color:var(--accent-color); margin:15px 0 5px 10px; text-transform:uppercase;">${cat}</h4><div class="card" style="padding:0; overflow:hidden; background:rgba(255,255,255,0.02);">`;
                grouped[cat].forEach(ex => {
                    html += `<div style="padding:18px 22px; border-bottom:1px solid var(--glass-border); display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-weight:700;">${ex.name}</span>
                        <button class="icon-btn" style="color:var(--danger-color); border:none; background:none;" onclick="deleteExo('${ex.id}')">🗑️</button>
                    </div>`;
                });
                listCont.innerHTML += html + "</div>";
            });
        }

        // --- 5. GESTION DES ROUTINES ---
        async function loadRoutines() {
            const snap = await getDocs(query(collection(db, "routines"), where("userId", "==", auth.currentUser.uid)));
            const cont = document.getElementById('routines-list');
            cont.innerHTML = "";
            snap.forEach(d => {
                const r = d.data();
                cont.innerHTML += `<div class="set-item">
                    <div><strong>${r.name}</strong><br><small style="color:var(--text-muted)">${r.exercises.length} exercices</small></div>
                    <button class="btn-primary" style="width:auto; padding:10px 20px; font-size:14px;" onclick="applyRoutine('${d.id}')">LANCER</button>
                </div>`;
            });
        }

        window.openRoutineModal = async () => {
            const snap = await getDocs(query(collection(db, "exercises"), where("userId", "==", auth.currentUser.uid)));
            const selection = document.getElementById('routine-selection');
            selection.innerHTML = "";
            snap.forEach(d => {
                selection.innerHTML += `<label style="display:flex; align-items:center; gap:12px; padding:14px; border-bottom:1px solid rgba(255,255,255,0.05); font-weight:600;">
                    <input type="checkbox" value="${d.data().name}" class="rout-ex-check" style="width:20px; height:20px;"> ${d.data().name}
                </label>`;
            });
            document.getElementById('modal-routine').style.display='flex';
        };

        window.saveRoutine = async () => {
            const name = document.getElementById('routine-name').value;
            const selected = Array.from(document.querySelectorAll('.rout-ex-check:checked')).map(cb => cb.value);
            if(!name || selected.length === 0) return alert("Nom et exercices requis.");
            await addDoc(collection(db, "routines"), { name: name, exercises: selected, userId: auth.currentUser.uid });
            document.getElementById('modal-routine').style.display='none';
            loadRoutines();
        };

        window.applyRoutine = async (id) => {
            const snap = await getDoc(doc(db, "routines", id));
            const routine = snap.data();
            let options = routine.exercises.map(name => `<option value="${name}">${name}</option>`).join('');
            document.getElementById('machine').innerHTML = options;
            showTab('workout', document.querySelectorAll('.nav-btn')[0]);
            adaptCardioUI();
            updateGhost();
        };

        // --- 6. GESTION DES SÉANCES (LOGGING) ---
        document.getElementById('workout-form').onsubmit = async (e) => {
            e.preventDefault();
            const machine = document.getElementById('machine').value;
            const data = {
                machine: machine,
                weight: Number(document.getElementById('weight').value),
                reps: Number(document.getElementById('reps').value),
                isWarmup: document.getElementById('is-warmup').checked,
                timestamp: new Date(document.getElementById('workout-date').value + "T12:00:00"),
                userId: auth.currentUser.uid
            };
            
            try {
                await addDoc(collection(db, "workouts"), data);
                confetti({ particleCount: 60, spread: 70, origin: { y: 0.8 }, colors: ['#0a84ff', '#34c759'] });
                loadWorkouts();
                updateGhost();
            } catch (err) { alert("Erreur lors de l'enregistrement."); }
        };

        async function loadWorkouts() {
            const ds = document.getElementById('workout-date').value;
            const snap = await getDocs(query(collection(db, "workouts"), where("userId", "==", auth.currentUser.uid)));
            const container = document.getElementById('history-list');
            container.innerHTML = ''; 
            
            let filtered = [];
            snap.forEach(d => { if(d.data().timestamp.toDate().toISOString().split('T')[0] === ds) filtered.push({id: d.id, data: d.data()}); });
            filtered.sort((a,b) => a.data.timestamp.toDate() - b.data.timestamp.toDate());
            
            let currentGroup = "";
            filtered.forEach(x => {
                if(currentGroup !== x.data.machine) {
                    currentGroup = x.data.machine;
                    container.innerHTML += `<div id="g-${x.id}" style="margin-top:20px;"><div class="group-header-title">🏋️ ${currentGroup.toUpperCase()}</div></div>`;
                }
                const isC = exCats[x.data.machine] === "Cardio";
                const text = isC ? `${x.data.weight} min | ${x.data.reps} km` : `${x.data.weight} kg x ${x.data.reps}`;
                document.getElementById(`g-${x.id}`).innerHTML += `<div class="set-item">
                    <div><strong>${text}</strong></div>
                    <button class="btn-danger-soft" onclick="deleteSeries('${x.id}')">🗑️</button>
                </div>`;
            });
        }

        // --- 7. STATISTIQUES ET MUSCLE HEATMAP ---
        async function loadStats() {
            const snap = await getDocs(query(collection(db, "workouts"), where("userId", "==", auth.currentUser.uid)));
            let vol = 0, count = 0, recs = {}, heat = {}, cardio = {};
            
            snap.forEach(d => {
                const x = d.data();
                const cat = exCats[x.machine] || "Autre";
                
                // Heatmap Data
                heat[cat] = (heat[cat] || 0) + 1;

                if(!x.isWarmup) {
                    count++;
                    if(cat === "Cardio") {
                        if(!cardio[x.machine]) cardio[x.machine] = { t: 0, k: 0 };
                        cardio[x.machine].t = Math.max(cardio[x.machine].t, x.weight);
                        cardio[x.machine].k = Math.max(cardio[x.machine].k, x.reps);
                    } else {
                        vol += (x.weight * x.reps);
                        if(!recs[x.machine] || x.weight > recs[x.machine]) recs[x.machine] = x.weight;
                    }
                }
            });

            document.getElementById('stat-series').innerText = count;
            document.getElementById('stat-volume').innerText = Math.round(vol) + " KG";
            
            // Cardio Table
            let cHtml = '<table class="cardio-table"><tr><th>MACHINE</th><th>⏱ MIN MAX</th><th>🏃 KM MAX</th></tr>';
            Object.keys(cardio).forEach(m => { 
                cHtml += `<tr><td>${m}</td><td class="cardio-val">${cardio[m].t}m</td><td class="cardio-val">${cardio[m].k}km</td></tr>`; 
            });
            document.getElementById('cardio-summary-list').innerHTML = Object.keys(cardio).length ? cHtml + '</table>' : "Pas de cardio.";

            // Heatmap Chart
            if(muscleChart) muscleChart.destroy();
            muscleChart = new Chart(document.getElementById('muscleChart'), {
                type: 'doughnut',
                data: { labels: Object.keys(heat), datasets: [{ data: Object.values(heat), backgroundColor: ['#0a84ff', '#34c759', '#ff9500', '#ff3b30', '#af52de', '#5856d6'], borderWidth: 0 }] },
                options: { plugins: { legend: { position: 'bottom', labels: { color: '#fff', font: { size: 11 } } } }, cutout: '75%' }
            });

            // Records Chart
            const top5 = Object.entries(recs).sort((a,b) => b[1]-a[1]).slice(0,5);
            if(recordsChart) recordsChart.destroy();
            recordsChart = new Chart(document.getElementById('statsChart'), {
                type: 'bar',
                data: { labels: top5.map(i => i[0].toUpperCase()), datasets: [{ label: 'KG', data: top5.map(i => i[1]), backgroundColor: '#0a84ff', borderRadius: 10 }] },
                options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } } } }
            });
        }

        // --- 8. CALENDRIER COMPLET ---
        async function renderCalendar() {
            const container = document.getElementById('calendar-container');
            container.innerHTML = '';
            const y = curViewDate.getFullYear(), m = curViewDate.getMonth();
            document.getElementById('month-display').innerText = new Intl.DateTimeFormat('fr-FR', { month: 'long', year: 'numeric' }).format(curViewDate);
            
            ['L','M','M','J','V','S','D'].forEach(d => container.innerHTML += `<div class="day-label">${d}</div>`);
            
            const first = (new Date(y, m, 1).getDay() + 6) % 7;
            const snap = await getDocs(query(collection(db, "workouts"), where("userId", "==", auth.currentUser.uid)));
            const active = new Set();
            snap.forEach(d => { if(d.data().timestamp.toDate().getMonth() === m && d.data().timestamp.toDate().getFullYear() === y) active.add(d.data().timestamp.toDate().getDate()); });

            for(let i=0; i<first; i++) container.appendChild(document.createElement('div'));
            for(let i=1; i<=new Date(y, m+1, 0).getDate(); i++) {
                const cell = document.createElement('div');
                cell.className = 'day-cell' + (active.has(i) ? ' has-data' : '');
                cell.innerText = i;
                cell.onclick = () => {
                    renderDayDetails(i);
                    document.querySelectorAll('.day-cell').forEach(c => c.classList.remove('selected'));
                    cell.classList.add('selected');
                };
                container.appendChild(cell);
            }
        }

        async function renderDayDetails(day) {
            const target = new Date(curViewDate.getFullYear(), curViewDate.getMonth(), day).toDateString();
            const snap = await getDocs(query(collection(db, "workouts"), where("userId", "==", auth.currentUser.uid)));
            let html = "";
            snap.forEach(d => {
                if(d.data().timestamp.toDate().toDateString() === target) {
                    const x = d.data();
                    const unit = exCats[x.machine] === "Cardio" ? "min | " + x.reps + "km" : x.weight + "kg x " + x.reps;
                    html += `<div class="set-item"><strong>${x.machine}</strong> : ${unit}</div>`;
                }
            });
            document.getElementById('day-details').innerHTML = html || `<div style="text-align:center; padding:20px; color:var(--text-muted);">AUCUNE SÉANCE.</div>`;
        }

        // --- 9. CORBEILLE ET RÉCUPÉRATION ---
        window.deleteSeries = async (id) => {
            if(!confirm("Envoyer à la corbeille ?")) return;
            const ref = doc(db, "workouts", id);
            const snap = await getDoc(ref);
            await addDoc(collection(db, "trash"), { ...snap.data(), deletedAt: new Date() });
            await deleteDoc(ref);
            loadWorkouts();
        };

        window.openTrash = async () => {
            document.getElementById('modal-trash').style.display = 'flex';
            const snap = await getDocs(query(collection(db, "trash"), where("userId", "==", auth.currentUser.uid)));
            const list = document.getElementById('trash-list');
            list.innerHTML = snap.empty ? '<p style="text-align:center;">VIDE.</p>' : "";
            snap.forEach(d => {
                list.innerHTML += `<div class="set-item"><div><strong>${d.data().machine}</strong></div><button class="btn-primary" style="width:auto; padding:8px 15px; font-size:12px;" onclick="restoreSeries('${d.id}')">🔄 RESTAURER</button></div>`;
            });
        };

        window.restoreSeries = async (id) => {
            const ref = doc(db, "trash", id);
            const snap = await getDoc(ref);
            const data = snap.data(); delete data.deletedAt;
            await addDoc(collection(db, "workouts"), data);
            await deleteDoc(ref);
            openTrash(); loadWorkouts();
        };

        // --- 10. NAVIGATION ET UTILS ---
        window.showTab = (id, btn) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
            if(id === 'stats') loadStats();
            if(id === 'calendar-tab') { renderCalendar(); document.getElementById('day-details').innerHTML = ""; }
        };

        window.toggleTheme = () => {
            const t = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', t);
        };

        window.changeMonth = (v) => { curViewDate.setMonth(curViewDate.getMonth() + v); renderCalendar(); };
        window.openModal = () => document.getElementById('modal-add-machine').style.display='flex';
        window.closeModal = () => document.getElementById('modal-add-machine').style.display='none';
        
        document.getElementById('save-machine-btn').onclick = async () => {
            const name = document.getElementById('new-machine-name').value;
            const cat = document.getElementById('new-machine-category').value;
            if(!name) return alert("Nom requis.");
            await addDoc(collection(db, "exercises"), { name, category: cat, userId: auth.currentUser.uid });
            closeModal(); loadExercises();
        };

        window.importDefaults = async () => {
            const ds = [{n:"Développé couché",c:"Pectoraux"}, {n:"Squat",c:"Jambes"}, {n:"Tapis",c:"Cardio"}];
            for (const x of ds) await addDoc(collection(db, "exercises"), { name: x.n, category: x.c, userId: auth.currentUser.uid });
            loadExercises();
        };
    </script>
</body>
</html>
