<!DOCTYPE html><html lang="fr"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Muscu Pro Ultra</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2964/2964514.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #f8f9fc; --panel-bg: rgba(255, 255, 255, 0.9); --card-bg: #ffffff;
            --text-main: #1c1c1e; --text-muted: #8e8e93; --accent-color: #007aff;
            --accent-hover: #0063cc; --accent-light: rgba(0, 122, 255, 0.1);
            --border-color: #f2f2f7; --danger-color: #ff3b30; --pr-color: #34c759;
            --shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
        }
        [data-theme="dark"] {
            --bg-color: #000000; --panel-bg: rgba(20, 20, 22, 0.9); --card-bg: #121212;
            --text-main: #ffffff; --text-muted: #8e8e93; --accent-color: #0a84ff;
            --accent-hover: #0070e0; --accent-light: rgba(10, 132, 255, 0.2);
            --border-color: #2c2c2e; --shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
        }
        html { background-color: var(--bg-color); }
        body { margin: 0; font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-main); padding-top: calc(80px + env(safe-area-inset-top, 0px)); padding-bottom: calc(100px + env(safe-area-inset-bottom, 20px)); -webkit-tap-highlight-color: transparent; }
        header { position: fixed; top: 0; left: 0; right: 0; height: 64px; background-color: var(--panel-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; padding-top: env(safe-area-inset-top); z-index: 1000; }
        .logo { font-size: 20px; font-weight: 800; }
        .logo span { color: var(--accent-color); }
        .header-right { display: flex; align-items: center; gap: 12px; }
        .theme-toggle { cursor: pointer; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; background: var(--accent-light); border-radius: 12px; font-size: 18px; border: 1px solid var(--border-color); }
        .theme-toggle .moon-icon, [data-theme="dark"] .theme-toggle .sun-icon { display: none; }
        [data-theme="dark"] .theme-toggle .moon-icon { display: block; }
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid var(--accent-color); padding: 2px; display: none; }
        #logout-btn { background: rgba(255, 59, 48, 0.1); border: none; color: var(--danger-color); font-size: 10px; font-weight: 800; cursor: pointer; padding: 6px 12px; border-radius: 20px; display: none; }
        #app-screen { display: none; padding: 0 16px; max-width: 500px; margin: 0 auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        h2 { font-size: 32px; font-weight: 800; margin: 10px 0 24px 0; letter-spacing: -1.5px; }
        .card { background-color: var(--card-bg); padding: 22px; border-radius: 28px; margin-bottom: 20px; border: 1px solid var(--border-color); box-shadow: var(--shadow); box-sizing: border-box; width: 100%; }
        input, select { width: 100%; max-width: 100%; padding: 16px; background-color: var(--bg-color); border: 1px solid var(--border-color); color: var(--text-main); border-radius: 16px; font-size: 16px; font-weight: 600; box-sizing: border-box; margin-bottom: 12px; font-family: inherit; display: block; }
        .date-input-wrapper { position: relative; width: 100%; box-sizing: border-box; }
        .date-input-wrapper input[type="date"] { padding-left: 45px; min-height: 54px; cursor: pointer; -webkit-appearance: none; }
        .calendar-icon { position: absolute; left: 14px; top: 17px; width: 18px; height: 18px; color: var(--accent-color); pointer-events: none; z-index: 2; }
        .btn-primary { background-color: var(--accent-color); color: white; border: none; padding: 16px; font-weight: 700; border-radius: 18px; width: 100%; cursor: pointer; font-size: 16px; transition: all 0.2s; }
        .btn-outline { background: var(--bg-color); color: var(--text-main); border: 1px solid var(--border-color); padding: 16px; font-weight: 700; border-radius: 18px; width: 100%; cursor: pointer; }
        .input-row { display: flex; gap: 10px; margin-bottom: 10px; width: 100%; box-sizing: border-box; }
        #add-machine-btn { border-radius: 16px; width: 56px; height: 56px; background: var(--accent-color); color: white; border: none; font-size: 24px; cursor: pointer; flex-shrink: 0; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        .modal-card { width: 100%; max-width: 380px; background: var(--card-bg); border-radius: 32px; padding: 28px; border: 1px solid var(--border-color); box-shadow: 0 20px 40px rgba(0,0,0,0.4); display: flex; flex-direction: column; box-sizing: border-box; }
        .history-group { background-color: var(--card-bg); border-radius: 26px; margin-bottom: 16px; border: 1px solid var(--border-color); overflow: hidden; width: 100%; box-sizing: border-box; }
        .group-header { background: var(--accent-light); color: var(--accent-color); padding: 16px 20px; font-weight: 800; display: flex; justify-content: space-between; align-items: center; }
        .set-item { padding: 14px 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .set-number { width: 22px; height: 22px; background: var(--bg-color); color: var(--text-muted); font-size: 10px; font-weight: 800; display: flex; align-items: center; justify-content: center; border-radius: 8px; margin-right: 10px; }
        .pr-badge { background: var(--pr-color); color: white; font-size: 10px; font-weight: 800; padding: 2px 6px; border-radius: 6px; margin-left: 6px; }
        nav { position: fixed; bottom: 0; left: 0; right: 0; height: 80px; background-color: var(--panel-bg); backdrop-filter: blur(25px); border-top: 1px solid var(--border-color); display: none; justify-content: space-around; padding-bottom: env(safe-area-inset-bottom); z-index: 1000; }
        .nav-btn { background: none; border: none; color: var(--text-muted); padding: 12px; font-size: 11px; font-weight: 700; flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .nav-btn.active { color: var(--accent-color); }
        #success-flash { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--accent-color); color: white; padding: 20px 40px; border-radius: 50px; font-weight: 800; font-size: 18px; z-index: 5000; display: none; }
    </style></head><body>
    <header id="main-header">
        <div class="logo">Muscu<span>Pro</span></div>
        <div class="header-right">
            <label class="theme-toggle"><input type="checkbox" id="theme-switch" style="display:none;"><span class="sun-icon">☀️</span><span class="moon-icon">🌙</span></label>
            <img id="user-photo" class="user-avatar" src="" alt="Profil">
            <button id="logout-btn">Ciao !</button>
        </div>
    </header>
    <div id="auth-screen" style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:80vh; padding:20px; text-align:center;">
        <h1 style="font-size: 44px; font-weight: 800; letter-spacing: -2.5px;">Muscu<span>Pro</span></h1>
        <button id="google-login-btn" class="btn-primary" style="width:auto; padding: 16px 32px;">Connexion Google</button>
    </div>
    <div id="app-screen">
        <section id="workout" class="tab-content active">
            <h2>Ma Séance</h2>
            <div class="card">
                <form id="workout-form">
                    <div class="date-input-wrapper">
                        <svg class="calendar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                        <input type="date" id="workout-date" required>
                    </div>
                    <div class="input-row"><select id="machine" required></select><button type="button" id="add-machine-btn">+</button></div>
                    <div class="input-row" style="margin-bottom:0;"><input type="number" id="weight" placeholder="Kg" inputmode="numeric" required onfocus="this.select()"><input type="number" id="reps" placeholder="Reps" inputmode="numeric" required onfocus="this.select()"></div>
                    <button type="submit" class="btn-primary" style="margin-top:15px;">Enregistrer la série</button>
                </form>
            </div>
            <div id="history-list"></div>
        </section>
        <section id="stats" class="tab-content">
            <h2>Stats Globales</h2>
            <div class="card"><canvas id="statsChart"></canvas></div>
        </section>
    </div>
    <div id="modal-add-machine" class="modal-overlay"><div class="modal-card"><h2>Nouvel exercice</h2><input type="text" id="new-machine-name" placeholder="Ex: Hack Squat"><div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;"><button class="btn-outline" onclick="document.getElementById('modal-add-machine').style.display='none'">Annuler</button><button class="btn-primary" id="save-machine-btn">Ajouter</button></div></div></div>
    <div id="success-flash">Série validée ! 💪</div>
    <nav id="bottom-nav"><button class="nav-btn active" onclick="showTab('workout', this)"><span>🏋️</span>Séance</button><button class="nav-btn" onclick="showTab('stats', this)"><span>📊</span>Stats</button></nav>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, where, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";
        import { getAuth, signInWithRedirect, getRedirectResult, GoogleAuthProvider, onAuthStateChanged, signOut, setPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
        
        const firebaseConfig = { apiKey: "AIzaSyDqD_BnYDL6GwQPIsn3W8ffnoo9BwoKr1Q", authDomain: "suivi-muscu-8dd6d.firebaseapp.com", projectId: "suivi-muscu-8dd6d", storageBucket: "suivi-muscu-8dd6d.firebasestorage.app", messagingSenderId: "1011748268882", appId: "G-P9TLE42VZ1" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        document.getElementById('workout-date').value = new Date().toISOString().split('T')[0];
        setPersistence(auth, browserSessionPersistence);

        // CONNEXION : MODE REDIRECT (Indispensable pour mobile)
        document.getElementById('google-login-btn').onclick = () => signInWithRedirect(auth, provider);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-screen').style.display = 'block';
                document.getElementById('bottom-nav').style.display = 'flex';
                loadExercises(); loadWorkouts();
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('app-screen').style.display = 'none';
                document.getElementById('bottom-nav').style.display = 'none';
            }
        });

        document.getElementById('logout-btn').onclick = () => signOut(auth);

        window.showTab = (tabId, btn) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active'); btn.classList.add('active');
            if(tabId === 'stats') loadStats();
        };

        async function loadExercises() {
            const select = document.getElementById('machine');
            const q = query(collection(db, "exercises"), where("userId", "==", auth.currentUser.uid));
            const snap = await getDocs(q); let opts = "";
            snap.forEach(d => { opts += `<option value="${d.data().name}">${d.data().name}</option>`; });
            select.innerHTML = opts;
        }

        async function loadWorkouts() {
            const q = query(collection(db, "workouts"), where("userId", "==", auth.currentUser.uid), orderBy("timestamp", "desc"));
            const snap = await getDocs(q); let today = document.getElementById('workout-date').value; let filtered = [];
            snap.forEach(d => { if(d.data().timestamp.toDate().toISOString().split('T')[0] === today) filtered.push({id: d.id, data: d.data()}); });
            renderGrouped(filtered);
        }

        function renderGrouped(arr) {
            const container = document.getElementById('history-list');
            container.innerHTML = ''; let groups = []; let cur = null;
            arr.forEach(x => { if(!cur || cur.machine !== x.data.machine) { cur = { machine: x.data.machine, sets: [] }; groups.push(cur); } cur.sets.push(x); });
            groups.forEach(g => {
                const groupDiv = document.createElement('div'); groupDiv.className = `history-group`;
                let html = `<div class="group-header"><span>🏋️ ${g.machine}</span></div>`;
                g.sets.reverse().forEach((s, i) => {
                    const d = s.data;
                    html += `<div class="set-item"><div><span class="set-number">${i+1}</span><strong>${d.weight}kg x ${d.reps}</strong></div><button style="background:none; border:none; color:var(--danger-color);" onclick="deleteSeries('${s.id}')">🗑️</button></div>`;
                });
                groupDiv.innerHTML = html; container.appendChild(groupDiv);
            });
        }

        document.getElementById('workout-form').onsubmit = async (e) => {
            e.preventDefault();
            await addDoc(collection(db, "workouts"), { machine: document.getElementById('machine').value, weight: parseInt(document.getElementById('weight').value), reps: parseInt(document.getElementById('reps').value), timestamp: new Date(document.getElementById('workout-date').value), userId: auth.currentUser.uid });
            const flash = document.getElementById('success-flash'); flash.style.display = 'block'; setTimeout(() => flash.style.display = 'none', 1500); loadWorkouts();
        };

        async function loadStats() {
            const q = query(collection(db, "workouts"), where("userId", "==", auth.currentUser.uid));
            const snap = await getDocs(q); let counts = {}; snap.forEach(d => { counts[d.data().machine] = (counts[d.data().machine] || 0) + 1; });
            const top = Object.entries(counts).sort((a,b) => b[1]-a[1]).slice(0,5);
            if(window.statChartInstance) window.statChartInstance.destroy();
            window.statChartInstance = new Chart(document.getElementById('statsChart'), { type: 'bar', data: { labels: top.map(m => m[0]), datasets: [{ label: 'Séries', data: top.map(m => m[1]), backgroundColor: '#0a84ff', borderRadius: 10 }] } });
        }

        document.getElementById('add-machine-btn').onclick = () => document.getElementById('modal-add-machine').style.display='flex';
        document.getElementById('save-machine-btn').onclick = async () => {
            const name = document.getElementById('new-machine-name').value.trim();
            if(name) { await addDoc(collection(db, "exercises"), {name, userId: auth.currentUser.uid}); loadExercises(); document.getElementById('modal-add-machine').style.display='none'; }
        };
        window.deleteSeries = async (id) => { if(confirm("Supprimer ?")) { await deleteDoc(doc(db, "workouts", id)); loadWorkouts(); } };
        const applyTheme = (dark) => { document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light'); document.getElementById('theme-switch').checked = dark; }; applyTheme(window.matchMedia("(prefers-color-scheme: dark)").matches); document.getElementById('theme-switch').onclick = (e) => applyTheme(e.target.checked);
        document.getElementById('workout-date').onchange = () => loadWorkouts();
    </script></body></html>
