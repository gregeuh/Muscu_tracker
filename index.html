<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Muscu Pro Elite V77</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2964/2964514.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --bg-color: #f8f9fc;
            --panel-bg: rgba(255, 255, 255, 0.85);
            --card-bg: #ffffff;
            --text-main: #1c1c1e;
            --text-muted: #8e8e93;
            --accent-color: #007aff;
            --border-color: #f2f2f7;
            --danger-color: #ff3b30;
            --pr-color: #34c759;
            --shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            --font-impact: 'Bebas Neue', sans-serif;
            --font-main: 'Inter', sans-serif;
        }

        [data-theme="dark"] {
            --bg-color: #000000;
            --panel-bg: rgba(28, 28, 30, 0.85);
            --card-bg: #121212;
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --accent-color: #0a84ff;
            --border-color: #2c2c2e;
            --shadow: 0 12px 40px rgba(0, 0, 0, 0.7);
        }

        /* Animations */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Base & Scroll */
        html, body { height: 100%; margin: 0; padding: 0; background-color: var(--bg-color); overflow-x: hidden; font-family: var(--font-main); color: var(--text-main); transition: 0.4s; }
        body { display: flex; flex-direction: column; padding-top: calc(70px + env(safe-area-inset-top, 0px)); padding-bottom: 130px; box-sizing: border-box; overflow-y: auto; }
        
        /* Header Fixe Premium */
        header { position: fixed; top: 0; left: 0; right: 0; height: 64px; background-color: var(--panel-bg); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; z-index: 1500; padding-top: env(safe-area-inset-top); }
        .logo { font-family: var(--font-impact); font-size: 26px; letter-spacing: 1px; }
        .logo span { color: var(--accent-color); }
        .header-right { display: flex; align-items: center; gap: 15px; }
        .user-photo { width: 34px; height: 34px; border-radius: 50%; border: 2px solid var(--accent-color); cursor: pointer; object-fit: cover; transition: 0.3s; }
        #logout-btn { position: absolute; top: 55px; right: 20px; background: var(--card-bg); border: 1px solid var(--border-color); color: var(--danger-color); font-size: 13px; font-weight: 800; padding: 12px 20px; border-radius: 16px; display: none; box-shadow: var(--shadow); z-index: 2000; }

        /* MIRE DE CONNEXION CENTRÉE */
        #auth-screen { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background-color: var(--bg-color); z-index: 6000; padding: 30px; box-sizing: border-box; text-align: center;
        }
        .google-btn { background: white; color: #1c1c1e; border: 1px solid #dcdcdc; padding: 16px 24px; border-radius: 16px; font-weight: 700; width: 100%; max-width: 340px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; font-size: 15px; box-shadow: var(--shadow); margin-bottom: 35px; }

        /* DOCK FLOTTANT (STYLE INSTAGRAM) */
        nav { 
            position: fixed; bottom: calc(25px + env(safe-area-inset-bottom)); 
            left: 50%; transform: translateX(-50%); width: 92%; max-width: 420px; height: 68px; 
            background-color: var(--panel-bg); backdrop-filter: blur(25px); border: 1px solid var(--border-color); 
            border-radius: 35px; display: flex; justify-content: space-around; align-items: center; 
            z-index: 4500; box-shadow: 0 15px 35px rgba(0,0,0,0.2); padding: 0 10px;
        }
        .nav-btn { background: none; border: none; color: var(--text-muted); font-size: 10px; font-weight: 800; display: flex; flex-direction: column; align-items: center; gap: 5px; flex: 1; transition: 0.3s; }
        .nav-btn span { font-size: 22px; transition: 0.2s; }
        .nav-btn.active { color: var(--accent-color); }
        .nav-btn.active span { transform: scale(1.2) translateY(-3px); }

        /* App Contents */
        #app-screen { display: none; width: 100%; max-width: 500px; margin: 0 auto; padding: 0 16px; box-sizing: border-box; }
        .tab-content { display: none; width: 100%; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        
        /* Design Cartes */
        .card { background-color: var(--card-bg); padding: 25px; border-radius: 32px; margin-bottom: 25px; border: 1px solid var(--border-color); box-shadow: var(--shadow); animation: fadeInUp 0.5s ease-out both; }
        h2 { font-family: var(--font-impact); font-size: 42px; margin: 10px 0 25px 0; letter-spacing: 1px; text-transform: uppercase; }
        h3.session-title { font-family: var(--font-impact); font-size: 22px; margin: 30px 0 15px 5px; color: var(--accent-color); text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; }

        input, select { width: 100%; padding: 18px; background-color: var(--bg-color); border: 1px solid var(--border-color); color: var(--text-main); border-radius: 18px; font-size: 16px; font-weight: 600; box-sizing: border-box; margin-bottom: 12px; outline: none; transition: 0.2s; }
        optgroup { font-family: var(--font-impact); color: var(--accent-color); text-transform: uppercase; letter-spacing: 1px; }

        .btn-primary { background-color: var(--accent-color); color: white; border: none; padding: 18px; font-family: var(--font-impact); font-size: 22px; border-radius: 20px; width: 100%; cursor: pointer; transition: 0.15s; }
        .btn-primary:active { transform: scale(0.97); }
        .btn-danger-soft { background: rgba(255, 59, 48, 0.1); color: var(--danger-color); border: none; padding: 10px 18px; border-radius: 14px; font-family: var(--font-impact); font-size: 15px; cursor: pointer; }

        /* Calendrier Grid (7 COLONNES) */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; text-align: center; width: 100%; }
        .day-label { font-size: 12px; font-weight: 800; color: var(--text-muted); padding: 8px 0; }
        .day-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; border-radius: 14px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
        .day-cell.has-data { background: rgba(0, 122, 255, 0.12); color: var(--accent-color); font-weight: 800; }
        .day-cell.selected { background: var(--accent-color) !important; color: white !important; box-shadow: 0 4px 15px rgba(0, 122, 255, 0.3); }

        /* Séance Cards */
        .history-group { margin-bottom: 30px; animation: fadeInUp 0.5s ease-out both; }
        .group-header-title { font-family: var(--font-impact); font-size: 19px; color: var(--accent-color); margin: 0 0 12px 5px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .set-item { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; background: var(--card-bg); border-radius: 22px; margin-bottom: 12px; border: 1px solid var(--border-color); box-shadow: var(--shadow); }

        /* Actions Icons */
        .icon-btn { width: 42px; height: 42px; border-radius: 14px; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; transition: 0.2s; }
        .btn-del { background: rgba(255, 59, 48, 0.1); color: var(--danger-color); }
        .btn-restore { background: rgba(52, 199, 89, 0.1); color: var(--pr-color); }

        /* Infos Ghost & Live */
        #last-workout-ghost { font-size: 12px; color: var(--text-muted); text-align: center; margin: 12px 0; min-height: 35px; font-weight: 600; line-height: 1.5; background: rgba(0,0,0,0.03); padding: 10px; border-radius: 15px; }
        #one-rm-live { font-family: var(--font-impact); font-size: 19px; color: var(--accent-color); text-align: center; margin-bottom: 15px; }

        /* Modales */
        .modal-overlay { position: fixed !important; top: 0 !important; left: 0 !important; width: 100% !important; height: 100% !important; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center; z-index: 6000; padding: 20px; box-sizing: border-box; }
        .modal-card { width: 100%; max-width: 440px; background: var(--card-bg); border-radius: 35px; padding: 30px; border: 1px solid var(--border-color); max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        .stat-badge { background: var(--bg-color); padding: 15px; border-radius: 18px; text-align: center; border: 1px solid var(--border-color); }
    </style>
</head>
<body>

    <header>
        <div class="logo">MUSCU<span>PRO</span></div>
        <div class="header-right">
            <button onclick="toggleTheme()" style="background:none; border:none; font-size:22px; cursor:pointer;">🌙</button>
            <button onclick="openTrash()" style="background:none; border:none; font-size:22px; cursor:pointer;">🗑️</button>
            <img id="user-photo" class="user-photo" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
        </div>
    </header>

    <div id="auth-screen">
        <h1 style="font-family: var(--font-impact); font-size: 65px; letter-spacing: 3px; margin-bottom: 45px;">MUSCU<span>PRO</span></h1>
        <button id="google-login-btn" class="google-btn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20"> CONTINUER AVEC GOOGLE
        </button>
        <div style="width:100%; max-width:340px; border-top:1px solid var(--border-color); padding-top:35px;">
            <input type="email" id="auth-email" placeholder="Adresse Email">
            <input type="password" id="auth-password" placeholder="Mot de passe">
            <button id="auth-submit-btn" class="btn-primary" style="margin-top:10px;">CONNEXION / CRÉATION</button>
        </div>
    </div>

    <div id="app-screen">
        <section id="workout" class="tab-content active">
            <h2>MA SÉANCE</h2>
            <div class="card">
                <form id="workout-form">
                    <input type="date" id="workout-date" required>
                    <div style="display:flex; gap:12px;"><select id="machine" required></select><button type="button" onclick="openModal()" style="width:60px; border-radius:18px; background:var(--accent-color); color:white; border:none; font-size:28px;">+</button></div>
                    <div id="last-workout-ghost">Chargement de l'historique...</div>
                    <div style="display:flex; gap:12px;"><input type="number" id="weight" placeholder="Kg" required step="any"><input type="number" id="reps" placeholder="Reps" required></div>
                    <div id="one-rm-live">1RM ESTIMÉ : -</div>
                    <label style="display:flex; align-items:center; gap:12px; justify-content:center; margin-bottom:18px; font-size:15px; font-weight:700;"><input type="checkbox" id="is-warmup" style="width:22px; height:22px;"> 🔥 ÉCHAUFFEMENT</label>
                    <button type="submit" class="btn-primary">ENREGISTRER LA SÉRIE</button>
                </form>
            </div>
            <h3 class="session-title">SÉANCE DU JOUR <button class="btn-danger-soft" onclick="deleteAllSeries()">TOUT SUPPRIMER</button></h3>
            <div id="history-list"></div>
        </section>

        <section id="exercises-tab" class="tab-content">
            <h2>MES MACHINES</h2>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:25px;"><button class="btn-primary" onclick="openModal()">+ AJOUTER</button><button class="btn-outline" onclick="importDefaults()">📚 CATALOGUE</button></div>
            <div id="routines-list"></div>
            <h3 class="session-title" style="margin-top:35px;">LISTE PAR MUSCLE</h3>
            <div id="machine-grouped-list"></div>
        </section>

        <section id="calendar-tab" class="tab-content">
            <h2>CALENDRIER</h2>
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px; font-family:var(--font-impact); font-size:26px;">
                    <div id="month-display">Mois</div>
                    <div style="display:flex; gap:12px;"><button class="btn-outline" onclick="changeMonth(-1)" style="width:50px;">‹</button><button class="btn-outline" onclick="changeMonth(1)" style="width:50px;">›</button></div>
                </div>
                <div class="calendar-grid" id="calendar-container"></div>
            </div>
            <div id="day-details" style="margin-top:25px;"></div>
        </section>

        <section id="stats" class="tab-content">
            <h2>MES STATS</h2>
            <select id="stats-time-filter" style="margin-bottom: 25px;">
                <option value="week">CETTE SEMAINE</option><option value="month" selected>CE MOIS</option><option value="year">CETTE ANNÉE</option><option value="all">TOUT</option>
            </select>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom:25px;">
                <div class="card" style="text-align:center; padding:18px;"><h4>SÉRIES</h4><p id="stat-series" style="font-size:38px; margin:0; color:var(--accent-color);">0</p></div>
                <div class="card" style="text-align:center; padding:18px;"><h4>VOLUME</h4><p id="stat-volume" style="font-size:38px; margin:0; color:var(--pr-color);">0</p></div>
            </div>
            <div class="card"><h4 style="margin-top:0;">TOP RECORDS (KG)</h4><canvas id="statsChart"></canvas></div>
        </section>
    </div>

    <div id="modal-trash" class="modal-overlay" onclick="this.style.display='none'"><div class="modal-card" onclick="event.stopPropagation()"><h2 style="color:var(--danger-color)">CORBEILLE</h2><div id="trash-list" style="margin-bottom:20px; max-height: 400px; overflow-y: auto;"></div><button class="btn-primary" onclick="emptyTrash()">VIDER</button></div></div>
    <div id="modal-add-machine" class="modal-overlay"><div class="modal-card"><h2>MACHINE</h2><input type="text" id="new-machine-name"><select id="new-machine-category"><option>Pectoraux</option><option>Dos</option><option>Jambes</option><option>Épaules</option><option>Bras</option><option>Abdos</option><option value="Cardio">Cardio</option></select><button class="btn-primary" id="save-machine-btn">VALIDER</button></div></div>

    <nav id="bottom-nav">
        <button class="nav-btn active" onclick="showTab('workout', this)"><span>🏋️</span>SÉANCE</button>
        <button class="nav-btn" onclick="showTab('exercises-tab', this)"><span>⚙️</span>MACHINES</button>
        <button class="nav-btn" onclick="showTab('calendar-tab', this)"><span>📅</span>CALENDRIER</button>
        <button class="nav-btn" onclick="showTab('stats', this)"><span>📊</span>STATS</button>
    </nav>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, where, limit, deleteDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyDqD_BnYDL6GwQPIsn3W8ffnoo9BwoKr1Q", authDomain: "suivi-muscu-8dd6d.firebaseapp.com", projectId: "suivi-muscu-8dd6d", storageBucket: "suivi-muscu-8dd6d.firebasestorage.app", messagingSenderId: "1011748268882", appId: "G-P9TLE42VZ1" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app); const auth = getAuth(app);
        const provider = new GoogleAuthProvider(); setPersistence(auth, browserLocalPersistence);

        let currentViewDate = new Date(); let timerSeconds = 0; 
        let historyChartInstance = null; let statChartInstance = null; 
        let activeCalendarDay = null; let exerciseCategories = {};

        // --- AUTH & LOGIN (PRIORITÉ) ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-screen').style.display = 'none'; document.getElementById('app-screen').style.display = 'block';
                if(user.photoURL) document.getElementById('user-photo').src = user.photoURL;
                initApp();
            } else { document.getElementById('auth-screen').style.display = 'flex'; }
        });

        document.getElementById('google-login-btn').onclick = () => signInWithPopup(auth, provider);
        document.getElementById('auth-submit-btn').onclick = async () => {
            const e = document.getElementById('auth-email').value, p = document.getElementById('auth-password').value;
            try { await signInWithEmailAndPassword(auth, e, p); } catch { try { await createUserWithEmailAndPassword(auth, e, p); } catch(err) { alert("Erreur Auth"); } }
        };

        // --- INITIALISATION ---
        async function initApp() {
            document.getElementById('workout-date').value = new Date().toISOString().split('T')[0];
            await loadExercises(); loadWorkouts(); updateGhost();
            document.getElementById('weight').oninput = updateLive1RM;
            document.getElementById('reps').oninput = updateLive1RM;
            document.getElementById('machine').onchange = () => { adaptInputsForCardio(); updateGhost(); };
        }

        // --- GESTION DES STATS (RESTAURATION) ---
        async function loadStats() {
            const filter = document.getElementById('stats-time-filter').value;
            const q = query(collection(db, "workouts"), where("userId", "==", auth.currentUser.uid));
            const snap = await getDocs(q);
            
            let limitDate = new Date();
            if(filter === 'week') limitDate.setDate(limitDate.getDate() - 7);
            else if(filter === 'month') limitDate.setDate(limitDate.getDate() - 30);
            else if(filter === 'year') limitDate.setFullYear(limitDate.getFullYear() - 1);
            else limitDate = new Date(0);

            let vol = 0, count = 0, records = {};
            snap.forEach(d => {
                const x = d.data(); const dDate = x.timestamp.toDate();
                if(dDate >= limitDate && !x.isWarmup) {
                    count++;
                    if(exerciseCategories[x.machine] !== "Cardio") {
                        vol += (x.weight * x.reps);
                        if(!records[x.machine] || x.weight > records[x.machine]) records[x.machine] = x.weight;
                    }
                }
            });
            document.getElementById('stat-series').innerText = count;
            document.getElementById('stat-volume').innerText = Math.round(vol) + "KG";
            renderStatsChart(records);
        }

        function renderStatsChart(recs) {
            const ctx = document.getElementById('statsChart').getContext('2d');
            const data = Object.entries(recs).sort((a,b) => b[1]-a[1]).slice(0,5);
            if(statChartInstance) statChartInstance.destroy();
            statChartInstance = new Chart(ctx, {
                type: 'bar',
                data: { labels: data.map(r => r[0]), datasets: [{ label: 'KG', data: data.map(r => r[1]), backgroundColor: '#0a84ff', borderRadius: 8 }] },
                options: { responsive: true, plugins: { legend: { display: false } } }
            });
        }

        // --- GESTION DU CALENDRIER (7 COLONNES) ---
        async function renderCalendar() {
            const container = document.getElementById('calendar-container');
            container.innerHTML = '';
            const y = currentViewDate.getFullYear(), m = currentViewDate.getMonth();
            document.getElementById('month-display').innerText = new Intl.DateTimeFormat('fr-FR', { month: 'long', year: 'numeric' }).format(currentViewDate).toUpperCase();
            
            ['L','M','M','J','V','S','D'].forEach(d => container.innerHTML += `<div class="day-label">${d}</div>`);
            
            const firstDay = new Date(y, m, 1).getDay();
            const offset = firstDay === 0 ? 6 : firstDay - 1;
            const snap = await getDocs(query(collection(db, "workouts"), where("userId", "==", auth.currentUser.uid)));
            const activeDays = new Set();
            snap.forEach(d => { if(d.data().timestamp.toDate().getMonth() === m) activeDays.add(d.data().timestamp.toDate().getDate()); });

            for(let i=0; i<offset; i++) container.appendChild(document.createElement('div'));
            for(let i=1; i<=new Date(y, m+1, 0).getDate(); i++) {
                const cell = document.createElement('div');
                cell.className = 'day-cell' + (activeDays.has(i) ? ' has-data' : '');
                if(i === activeCalendarDay) cell.classList.add('selected');
                cell.innerText = i;
                cell.onclick = () => { activeCalendarDay = i; renderCalendar(); loadDayDetails(i); };
                container.appendChild(cell);
            }
        }

        async function loadDayDetails(day) {
            const dateStr = new Date(currentViewDate.getFullYear(), currentViewDate.getMonth(), day).toDateString();
            const snap = await getDocs(query(collection(db, "workouts"), where("userId", "==", auth.currentUser.uid)));
            let cont = document.getElementById('day-details'); cont.innerHTML = '';
            snap.forEach(d => {
                if(d.data().timestamp.toDate().toDateString() === dateStr) {
                    const x = d.data();
                    cont.innerHTML += `<div class="set-item"><div><strong>${x.machine}</strong>: ${x.weight}${exerciseCategories[x.machine]==='Cardio'?'min':'kg'}</div></div>`;
                }
            });
        }

        // --- CORE BUSINESS (GHOST, 1RM, SUPPRESSION) ---
        const calc1RM = (w, r) => { const weight = Number(w); const reps = Number(r); if (!weight || !reps || reps <= 0) return 0; return reps === 1 ? weight : Math.round(weight / (1.0278 - (0.0278 * reps))); };
        
        async function updateGhost() {
            const m = document.getElementById('machine').value;
            const ghost = document.getElementById('last-workout-ghost');
            if(!m) return;
            const q = query(collection(db, "workouts"), where("userId", "==", auth.currentUser.uid), where("machine", "==", m));
            const snap = await getDocs(q);
            if(snap.empty) { ghost.innerHTML = "NOUVEAU ! 💪"; return; }
            let all = []; snap.forEach(d => all.push(d.data())); all.sort((a,b) => b.timestamp.toDate() - a.timestamp.toDate());
            const last = all[0]; const isC = exerciseCategories[m] === "Cardio";
            ghost.innerHTML = isC ? `DERNIER : ${last.weight}min | ${last.reps}km` : `DERNIER : ${last.weight}kg x ${last.reps} (${calc1RM(last.weight, last.reps)}kg)`;
        }

        async function loadWorkouts() {
            const dateStr = document.getElementById('workout-date').value;
            const snap = await getDocs(query(collection(db, "workouts"), where("userId", "==", auth.currentUser.uid)));
            const cont = document.getElementById('history-list'); cont.innerHTML = '';
            snap.forEach(d => {
                if(d.data().timestamp.toDate().toISOString().split('T')[0] === dateStr) {
                    const x = d.data();
                    cont.innerHTML += `<div class="set-item"><div><strong>${x.machine}</strong>: ${x.weight}${exerciseCategories[x.machine]==='Cardio'?'min':'kg'}</div><button class="icon-btn btn-del" onclick="deleteSeries('${d.id}')">🗑️</button></div>`;
                }
            });
        }

        window.deleteSeries = async (id) => {
            const docRef = doc(db, "workouts", id);
            const snap = await getDoc(docRef);
            if(snap.exists() && confirm("Corbeille ?")) {
                await addDoc(collection(db, "trash"), { ...snap.data(), deletedAt: new Date() });
                await deleteDoc(docRef); loadWorkouts(); updateGhost();
            }
        };

        window.showTab = (id, btn) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active'); btn.classList.add('active');
            if(id === 'stats') loadStats(); if(id === 'calendar-tab') renderCalendar();
        };

        // ... Autres fonctions (loadExercises, updateLive1RM, adaptInputsForCardio, changeMonth) ...
    </script>
</body>
