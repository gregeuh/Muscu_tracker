<!DOCTYPE html><html lang="fr"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Muscu Pro Ultimate</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2964/2964514.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #000000; --panel-bg: rgba(20, 20, 22, 0.9); --card-bg: #121212;
            --text-main: #ffffff; --text-muted: #8e8e93; --accent-color: #0a84ff;
            --border-color: #2c2c2e; --danger-color: #ff453a; --pr-color: #34c759;
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
        }
        html, body { background-color: var(--bg-color); margin: 0; font-family: 'Inter', sans-serif; color: var(--text-main); -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        body { padding-top: calc(80px + env(safe-area-inset-top, 0px)); padding-bottom: calc(100px + env(safe-area-inset-bottom, 20px)); }
        
        header { position: fixed; top: 0; left: 0; right: 0; height: 64px; background-color: var(--panel-bg); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; padding-top: env(safe-area-inset-top); z-index: 1000; }
        .logo { font-size: 20px; font-weight: 800; }
        .logo span { color: var(--accent-color); }
        #logout-btn { background: rgba(255, 69, 58, 0.15); border: none; color: var(--danger-color); font-size: 11px; font-weight: 800; padding: 8px 16px; border-radius: 20px; display: none; }

        /* AUTH SCREEN */
        #auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; padding: 20px; text-align: center; }
        #app-screen { display: none; padding: 0 16px; max-width: 500px; margin: 0 auto; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .card { background-color: var(--card-bg); padding: 22px; border-radius: 28px; margin-bottom: 20px; border: 1px solid var(--border-color); box-shadow: var(--shadow); box-sizing: border-box; }
        h2 { font-size: 32px; font-weight: 800; margin: 10px 0 24px 0; letter-spacing: -1.5px; }

        input, select { width: 100%; padding: 16px; background-color: #1c1c1e; border: 1px solid var(--border-color); color: white; border-radius: 16px; font-size: 16px; font-weight: 600; box-sizing: border-box; margin-bottom: 12px; font-family: inherit; }
        .btn-primary { background-color: var(--accent-color); color: white; border: none; padding: 16px; font-weight: 700; border-radius: 18px; width: 100%; cursor: pointer; font-size: 16px; }
        .btn-outline { background: #1c1c1e; color: white; border: 1px solid var(--border-color); padding: 12px; font-weight: 700; border-radius: 14px; cursor: pointer; }

        /* MODALS */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; box-sizing: border-box; }
        .modal-card { width: 100%; max-width: 380px; background: #1c1c1e; border-radius: 32px; padding: 28px; border: 1px solid var(--border-color); }

        /* HISTORY & GROUPS */
        .history-group { background-color: var(--card-bg); border-radius: 26px; margin-bottom: 16px; border: 1px solid var(--border-color); overflow: hidden; }
        .group-header { background: #1c1c1e; color: var(--accent-color); padding: 16px 20px; font-weight: 800; display: flex; justify-content: space-between; cursor: pointer; }
        .group-sets { display: block; }
        .history-group.collapsed .group-sets { display: none; }
        .set-item { padding: 14px 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .set-number { width: 22px; height: 22px; background: #1c1c1e; color: var(--text-muted); font-size: 10px; font-weight: 800; display: flex; align-items: center; justify-content: center; border-radius: 8px; margin-right: 10px; }
        .pr-badge { background: var(--pr-color); color: white; font-size: 10px; font-weight: 800; padding: 2px 6px; border-radius: 6px; margin-left: 6px; }

        /* TIMER & UTILS */
        #floating-timer { display: none; position: fixed; bottom: calc(90px + env(safe-area-inset-bottom, 0px)); left: 16px; right: 16px; background: var(--accent-color); color: white; padding: 16px 20px; border-radius: 20px; z-index: 999; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .day-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 600; border-radius: 14px; position: relative; cursor: pointer; }
        .day-cell.has-data::after { content: ''; position: absolute; bottom: 6px; width: 4px; height: 4px; background: var(--accent-color); border-radius: 50%; }
        .day-cell.today { border: 1px solid var(--accent-color); color: var(--accent-color); }
        .day-cell.selected { background: var(--accent-color); color: white; }

        nav { position: fixed; bottom: 0; left: 0; right: 0; height: 80px; background-color: var(--panel-bg); backdrop-filter: blur(25px); border-top: 1px solid var(--border-color); display: none; justify-content: space-around; padding-bottom: env(safe-area-inset-bottom); z-index: 1000; }
        .nav-btn { background: none; border: none; color: var(--text-muted); padding: 12px; font-size: 11px; font-weight: 700; flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .nav-btn.active { color: var(--accent-color); }

        .date-input-wrapper { position: relative; }
        .calendar-icon { position: absolute; left: 14px; top: 17px; width: 18px; height: 18px; color: var(--accent-color); pointer-events: none; }
        input[type="date"] { padding-left: 45px; }
        #success-flash { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--accent-color); color: white; padding: 20px 40px; border-radius: 50px; font-weight: 800; z-index: 5000; display: none; }
    </style></head><body>

    <header>
        <div class="logo">Muscu<span>Pro</span></div>
        <button id="logout-btn">Ciao !</button>
    </header>

    <div id="auth-screen">
        <h1 style="font-size: 44px; font-weight: 800; letter-spacing: -2.5px;">Muscu<span>Pro</span></h1>
        <p id="auth-title" style="color:var(--text-muted); margin-bottom:30px; font-weight:600;">Prêt pour tes PR ?</p>
        <input type="email" id="auth-email" placeholder="Email" autocomplete="off">
        <input type="password" id="auth-password" placeholder="Mot de passe" autocomplete="off">
        <button id="auth-submit-btn" class="btn-primary" style="margin-bottom:15px;">Se connecter</button>
        <button id="auth-toggle-btn" style="background:none; border:none; color:var(--accent-color); font-weight:700;">Créer un compte</button>
        <p id="auth-error" style="color:var(--danger-color); font-size:12px; margin-top:15px; display:none;"></p>
    </div>

    <div id="app-screen">
        <section id="workout" class="tab-content active">
            <h2>Ma Séance</h2>
            <div class="card">
                <form id="workout-form">
                    <div class="date-input-wrapper">
                        <svg class="calendar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                        <input type="date" id="workout-date" required>
                    </div>
                    <div style="display:flex; gap:10px;">
                        <select id="machine" required style="margin:0;"></select>
                        <button type="button" onclick="openModal()" style="width:56px; border-radius:16px; background:var(--accent-color); color:white; border:none; font-size:24px; flex-shrink:0;">+</button>
                    </div>
                    <div id="last-workout-ghost" style="font-size: 13px; color: var(--accent-color); text-align: center; margin: 10px 0; font-weight: 700;"></div>
                    <div style="display:flex; gap:10px;">
                        <input type="number" id="weight" placeholder="Kg" required inputmode="numeric">
                        <input type="number" id="reps" placeholder="Reps" required inputmode="numeric">
                    </div>
                    <label style="display:flex; align-items:center; gap:10px; justify-content:center; margin-bottom:15px; font-size:14px; font-weight:600; color:var(--text-muted);"><input type="checkbox" id="is-warmup" style="width:20px; height:20px; margin:0;"> 🔥 Échauffement</label>
                    <button type="submit" class="btn-primary">Enregistrer la série</button>
                </form>
            </div>
            <div id="history-list"></div>
        </section>

        <section id="calendar-tab" class="tab-content">
            <h2>Calendrier</h2>
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <div id="month-display" style="font-weight:800; text-transform:capitalize;">Mois</div>
                    <div style="display:flex; gap:10px;"><button class="btn-outline" onclick="changeMonth(-1)">‹</button><button class="btn-outline" onclick="changeMonth(1)">›</button></div>
                </div>
                <div class="calendar-grid" id="calendar-container"></div>
            </div>
            <div id="day-details" style="margin-top:20px;"></div>
        </section>

        <section id="stats" class="tab-content">
            <h2>Stats</h2>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-bottom:20px;">
                <div class="card" style="text-align:center; padding:15px;"><h4>Séries</h4><p id="stat-series" style="font-size:24px; font-weight:800; margin:0; color:var(--accent-color);">0</p></div>
                <div class="card" style="text-align:center; padding:15px;"><h4>Volume</h4><p id="stat-volume" style="font-size:24px; font-weight:800; margin:0; color:var(--pr-color);">0</p></div>
            </div>
            <div class="card"><canvas id="statsChart"></canvas></div>
        </section>
    </div>

    <div id="modal-add-machine" class="modal-overlay">
        <div class="modal-card">
            <h2>Nouvelle machine</h2>
            <input type="text" id="new-machine-name" placeholder="Ex: Développé Couché">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-top:10px;">
                <button class="btn-primary" style="background:#3a3a3c;" onclick="closeModal()">Annuler</button>
                <button class="btn-primary" id="save-machine-btn">Ajouter</button>
            </div>
        </div>
    </div>

    <div id="modal-timer-prompt" class="modal-overlay">
        <div class="modal-card" style="text-align:center;">
            <h2>Repos ? ⏳</h2>
            <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px; margin-bottom:20px;">
                <button class="btn-primary timer-btn" data-time="60">1:00</button>
                <button class="btn-primary timer-btn" data-time="90">1:30</button>
                <button class="btn-primary timer-btn" data-time="120">2:00</button>
            </div>
            <button class="btn-outline" style="width:100%;" onclick="closeModalTimer()">Passer</button>
        </div>
    </div>

    <div id="floating-timer"><div style="display:flex; justify-content:space-between; align-items:center; font-weight:800;"><span id="timer-display">00:00</span><button id="stop-timer-btn" style="background:white; border:none; color:var(--accent-color); padding:8px 12px; border-radius:10px; font-weight:800;">✕</button></div></div>
    
    <div id="success-flash">C'est noté ! 💪</div>

    <nav id="bottom-nav">
        <button class="nav-btn active" onclick="showTab('workout', this)"><span>🏋️</span>Séance</button>
        <button class="nav-btn" onclick="showTab('calendar-tab', this)"><span>📅</span>Calendrier</button>
        <button class="nav-btn" onclick="showTab('stats', this)"><span>📊</span>Stats</button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, where, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyDqD_BnYDL6GwQPIsn3W8ffnoo9BwoKr1Q", authDomain: "suivi-muscu-8dd6d.firebaseapp.com", projectId: "suivi-muscu-8dd6d", storageBucket: "suivi-muscu-8dd6d.firebasestorage.app", messagingSenderId: "1011748268882", appId: "G-P9TLE42VZ1" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app); const auth = getAuth(app);
        
        let isLoginMode = true; let currentViewDate = new Date(); let personalRecords = {}; let timerInterval = null;
        setPersistence(auth, browserLocalPersistence);

        const emailInput = document.getElementById('auth-email'); const passInput = document.getElementById('auth-password'); const errorMsg = document.getElementById('auth-error');

        // AUTH LOGIC
        document.getElementById('auth-toggle-btn').onclick = () => { isLoginMode = !isLoginMode; document.getElementById('auth-submit-btn').innerText = isLoginMode ? "Se connecter" : "Créer mon compte"; document.getElementById('auth-toggle-btn').innerText = isLoginMode ? "Créer un compte" : "Déjà inscrit ? Connexion"; };
        document.getElementById('auth-submit-btn').onclick = async () => { 
            errorMsg.style.display='none'; 
            try { if (isLoginMode) await signInWithEmailAndPassword(auth, emailInput.value, passInput.value); else await createUserWithEmailAndPassword(auth, emailInput.value, passInput.value); } 
            catch (err) { errorMsg.innerText = "Erreur : " + err.message; errorMsg.style.display = 'block'; } 
        };
        onAuthStateChanged(auth, (user) => {
            if (user) { document.getElementById('auth-screen').style.display = 'none'; document.getElementById('app-screen').style.display = 'block'; document.getElementById('bottom-nav').style.display = 'flex'; document.getElementById('logout-btn').style.display = 'block'; loadExercises(); loadWorkouts(); loadPRs(); }
            else { document.getElementById('auth-screen').style.display = 'flex'; document.getElementById('app-screen').style.display = 'none'; document.getElementById('bottom-nav').style.display = 'none'; document.getElementById('logout-btn').style.display = 'none'; emailInput.value = ""; passInput.value = ""; }
        });
        document.getElementById('logout-btn').onclick = () => signOut(auth);

        // NAVIGATION
        window.showTab = (tabId, btn) => { 
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active')); 
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active')); 
            document.getElementById(tabId).classList.add('active'); btn.classList.add('active'); 
            if(tabId === 'calendar-tab') renderCalendar(); if(tabId === 'stats') loadStats(); 
        };

        // EXERCICES & GHOST
        async function loadExercises() { 
            const select = document.getElementById('machine'); 
            const q = query(collection(db, "exercises"), where("userId", "==", auth.currentUser.uid)); 
            const snap = await getDocs(q); let opts = ""; 
            snap.forEach(d => { opts += `<option value="${d.data().name}">${d.data().name}</option>`; }); 
            select.innerHTML = opts; select.dispatchEvent(new Event('change'));
        }
        document.getElementById('machine').onchange = async (e) => {
            const m = e.target.value; const ghostDiv = document.getElementById('last-workout-ghost');
            const q = query(collection(db, "workouts"), where("userId", "==", auth.currentUser.uid), where("machine", "==", m), orderBy("timestamp", "desc"));
            const snap = await getDocs(q); let last = null; snap.forEach(d => { if(!last && !d.data().isWarmup) last = d.data(); });
            if(last) { ghostDiv.innerText = `Dernier : ${last.weight}kg x ${last.reps}`; document.getElementById('weight').value = last.weight; document.getElementById('reps').value = last.reps; } else { ghostDiv.innerText = ""; }
        };

        // PRs & WORKOUTS
        async function loadPRs() {
            const q = query(collection(db, "workouts"), where("userId", "==", auth.currentUser.uid));
            const snap = await getDocs(q); personalRecords = {};
            snap.forEach(d => { const data = d.data(); if(!data.isWarmup && (!personalRecords[data.machine] || data.weight > personalRecords[data.machine])) personalRecords[data.machine] = data.weight; });
        }
        async function loadWorkouts() { 
            const q = query(collection(db, "workouts"), where("userId", "==", auth.currentUser.uid), orderBy("timestamp", "desc")); 
            const snap = await getDocs(q); let today = document.getElementById('workout-date').value; let filtered = [];
            snap.forEach(d => { if(d.data().timestamp.toDate().toISOString().split('T')[0] === today) filtered.push({id: d.id, data: d.data()}); });
            renderGrouped(filtered, document.getElementById('history-list'));
        }
        function renderGrouped(arr, container) {
            container.innerHTML = ''; let groups = []; let cur = null;
            arr.forEach(x => { if(!cur || cur.machine !== x.data.machine) { cur = { machine: x.data.machine, sets: [] }; groups.push(cur); } cur.sets.push(x); });
            groups.forEach(g => {
                const div = document.createElement('div'); div.className = `history-group`;
                let html = `<div class="group-header">🏋️ ${g.machine}</div><div class="group-sets">`;
                g.sets.reverse().forEach((s, i) => {
                    const isPR = !s.data.isWarmup && s.data.weight >= (personalRecords[s.data.machine] || 0);
                    html += `<div class="set-item"><div><span class="set-number">${s.data.isWarmup?'🔥':i+1}</span><strong>${s.data.weight}kg x ${s.data.reps}</strong>${isPR?'<span class="pr-badge">🏆 PR</span>':''}</div><button style="background:none; border:none; color:var(--danger-color);" onclick="deleteSeries('${s.id}')">🗑️</button></div>`;
                });
                html += `</div>`; div.innerHTML = html; container.appendChild(div);
            });
        }

        document.getElementById('workout-form').onsubmit = async (e) => { 
            e.preventDefault(); 
            const data = { machine: document.getElementById('machine').value, weight: parseInt(document.getElementById('weight').value), reps: parseInt(document.getElementById('reps').value), isWarmup: document.getElementById('is-warmup').checked, timestamp: new Date(document.getElementById('workout-date').value), userId: auth.currentUser.uid };
            await addDoc(collection(db, "workouts"), data);
            document.getElementById('success-flash').style.display='block'; setTimeout(()=>document.getElementById('success-flash').style.display='none', 1500); 
            loadWorkouts(); document.getElementById('modal-timer-prompt').style.display = 'flex';
        };

        // CALENDAR & STATS
        window.changeMonth = (val) => { currentViewDate.setMonth(currentViewDate.getMonth() + val); renderCalendar(); };
        async function renderCalendar() {
            const container = document.getElementById('calendar-container'); container.innerHTML = '';
            document.getElementById('month-display').innerText = new Intl.DateTimeFormat('fr-FR', { month: 'long', year: 'numeric' }).format(currentViewDate);
            const daysInMonth = new Date(currentViewDate.getFullYear(), currentViewDate.getMonth() + 1, 0).getDate();
            const q = query(collection(db, "workouts"), where("userId", "==", auth.currentUser.uid));
            const snap = await getDocs(q); const activeDays = new Set();
            snap.forEach(d => { const dt = d.data().timestamp.toDate(); if(dt.getMonth() === currentViewDate.getMonth() && dt.getFullYear() === currentViewDate.getFullYear()) activeDays.add(dt.getDate()); });
            for (let i = 1; i <= daysInMonth; i++) {
                const cell = document.createElement('div'); cell.className = 'day-cell' + (activeDays.has(i)?' has-data':'');
                if(i === new Date().getDate() && currentViewDate.getMonth() === new Date().getMonth()) cell.classList.add('today');
                cell.innerText = i; cell.onclick = () => loadDayDetails(i); container.appendChild(cell);
            }
        }
        async function loadDayDetails(day) {
            const q = query(collection(db, "workouts"), where("userId", "==", auth.currentUser.uid), orderBy("timestamp", "desc"));
            const snap = await getDocs(q); let filtered = [];
            snap.forEach(d => { const dt = d.data().timestamp.toDate(); if(dt.getDate() === day && dt.getMonth() === currentViewDate.getMonth()) filtered.push({id: d.id, data: d.data()}); });
            renderGrouped(filtered, document.getElementById('day-details'));
        }
        async function loadStats() {
            const q = query(collection(db, "workouts"), where("userId", "==", auth.currentUser.uid));
            const snap = await getDocs(q); let counts = {}; let volume = 0; let totalSeries = 0;
            snap.forEach(d => { const data = d.data(); if(!data.isWarmup) { totalSeries++; volume += (data.weight * data.reps); counts[data.machine] = (counts[data.machine] || 0) + 1; }});
            document.getElementById('stat-series').innerText = totalSeries; document.getElementById('stat-volume').innerText = volume + 'kg';
            const top = Object.entries(counts).sort((a,b) => b[1]-a[1]).slice(0,5);
            if(window.statChartInstance) window.statChartInstance.destroy();
            window.statChartInstance = new Chart(document.getElementById('statsChart'), { type: 'bar', data: { labels: top.map(m => m[0]), datasets: [{ label: 'Séries', data: top.map(m => m[1]), backgroundColor: '#0a84ff', borderRadius: 10 }] } });
        }

        // CHRONO LOGIC
        document.querySelectorAll('.timer-btn').forEach(btn => btn.onclick = () => { startTimer(parseInt(btn.dataset.time)); closeModalTimer(); });
        function startTimer(sec) {
            clearInterval(timerInterval); document.getElementById('floating-timer').style.display = 'block';
            timerInterval = setInterval(() => {
                let m = Math.floor(sec/60), s = sec%60; document.getElementById('timer-display').innerText = `${m}:${s<10?'0'+s:s}`;
                if(sec <= 0) { clearInterval(timerInterval); document.getElementById('timer-display').innerText = "C'est reparti !"; if(navigator.vibrate) navigator.vibrate([100, 50, 100]); } sec--;
            }, 1000);
        }
        document.getElementById('stop-timer-btn').onclick = () => { clearInterval(timerInterval); document.getElementById('floating-timer').style.display = 'none'; };

        // MODALS
        window.openModal = () => document.getElementById('modal-add-machine').style.display='flex';
        window.closeModal = () => document.getElementById('modal-add-machine').style.display='none';
        window.closeModalTimer = () => document.getElementById('modal-timer-prompt').style.display = 'none';
        document.getElementById('save-machine-btn').onclick = async () => {
            const name = document.getElementById('new-machine-name').value.trim();
            if(name) { await addDoc(collection(db, "exercises"), {name, userId: auth.currentUser.uid}); loadExercises(); closeModal(); }
        };

        window.deleteSeries = async (id) => { if(confirm("Supprimer ?")) { await deleteDoc(doc(db, "workouts", id)); loadWorkouts(); } };
        document.getElementById('workout-date').value = new Date().toISOString().split('T')[0];
        document.getElementById('workout-date').onchange = () => loadWorkouts();
    </script></body></html>
