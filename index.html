<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Muscu Pro Elite V85 - Muscle Heatmap Edition</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2964/2964514.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        /* VARIABLES DE DESIGN (SYSTÈME DE THÈME)
           Permet de gérer le Liquid Glass et les couleurs en un seul endroit
        */
        :root {
            /* Palette Light Mode - Liquid Glass Soft */
            --bg-color: #f1f3f9;
            --bg-gradient: radial-gradient(at 0% 0%, #f8f9fc 0%, #e2e8f0 100%);
            --panel-bg: rgba(255, 255, 255, 0.7);
            --glass-bg: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(255, 255, 255, 0.8);
            --card-bg: #ffffff;
            --text-main: #1c1c1e;
            --text-muted: #8e8e93;
            --accent-color: #007aff;
            --accent-soft: rgba(0, 122, 255, 0.1);
            --border-color: #f2f2f7;
            --danger-color: #ff3b30;
            --pr-color: #34c759;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            --font-impact: 'Bebas Neue', sans-serif;
            --font-main: 'Inter', sans-serif;
            --blur: blur(15px);
        }

        [data-theme="dark"] {
            /* Palette Dark Mode - Liquid Glass Deep */
            --bg-color: #000000;
            --bg-gradient: radial-gradient(at 0% 0%, #1c1c1e 0%, #000000 100%);
            --panel-bg: rgba(28, 28, 30, 0.8);
            --glass-bg: rgba(44, 44, 46, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --card-bg: #1c1c1e;
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --accent-color: #0a84ff;
            --accent-soft: rgba(10, 132, 255, 0.2);
            --border-color: #2c2c2e;
            --shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
        }

        /* SYSTÈME D'ANIMATION 
        */
        @keyframes fadeInUp { 
            from { opacity: 0; transform: translateY(30px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        @keyframes fadeIn { 
            from { opacity: 0; } 
            to { opacity: 1; } 
        }

        /* STRUCTURE DE BASE DU SITE 
        */
        html, body { 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            background: var(--bg-gradient);
            background-attachment: fixed;
            overflow-x: hidden; 
            font-family: var(--font-main); 
            color: var(--text-main); 
            transition: background 0.5s ease;
        }

        body { 
            display: flex; 
            flex-direction: column; 
            /* On laisse de la place pour le header et le dock flottant */
            padding-top: calc(75px + env(safe-area-inset-top, 0px)); 
            padding-bottom: calc(110px + env(safe-area-inset-bottom, 20px)); 
            box-sizing: border-box; 
            overflow-y: auto; 
        }
        
        /* HEADER : NAVIGATION HAUTE 
        */
        header { 
            position: fixed; 
            top: 0; left: 0; right: 0; 
            height: 64px; 
            background: var(--panel-bg); 
            backdrop-filter: var(--blur); 
            -webkit-backdrop-filter: var(--blur);
            border-bottom: 1px solid var(--glass-border); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 0 20px; 
            z-index: 3000; 
            padding-top: env(safe-area-inset-top); 
        }

        .logo { font-family: var(--font-impact); font-size: 28px; letter-spacing: 1px; }
        .logo span { color: var(--accent-color); }
        
        .header-right { display: flex; align-items: center; gap: 15px; position: relative; }
        
        .user-photo { 
            width: 36px; height: 36px; 
            border-radius: 50%; 
            border: 2px solid var(--accent-color); 
            cursor: pointer; 
            object-fit: cover; 
            transition: transform 0.3s;
        }
        .user-photo:active { transform: scale(0.9); }

        #logout-btn { 
            position: absolute; 
            top: 60px; right: 0; 
            background: var(--card-bg); 
            border: 1px solid var(--glass-border); 
            color: var(--danger-color); 
            font-size: 13px; font-weight: 800; 
            padding: 12px 20px; 
            border-radius: 18px; 
            display: none; 
            box-shadow: var(--shadow); 
            z-index: 3100;
            white-space: nowrap;
        }

        /* MIRE DE CONNEXION : DESIGN CENTRÉ 
        */
        #auth-screen { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100vw; height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            background: var(--bg-gradient); 
            z-index: 9999; 
            padding: 40px; 
            box-sizing: border-box; 
            text-align: center; 
        }

        .google-btn { 
            background: rgba(255, 255, 255, 0.9); 
            color: #1c1c1e; 
            border: 1px solid #dcdcdc; 
            padding: 18px 28px; 
            border-radius: 18px; 
            font-weight: 700; 
            width: 100%; 
            max-width: 350px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 12px; 
            box-shadow: var(--shadow); 
            margin-bottom: 40px; 
            font-size: 16px;
            transition: 0.2s;
        }
        .google-btn:active { transform: scale(0.98); }

        /* DOCK FLOTTANT : NAVIGATION BASSE 
        */
        nav { 
            position: fixed; 
            bottom: calc(25px + env(safe-area-inset-bottom)); 
            left: 50%; 
            transform: translateX(-50%); 
            width: 90%; 
            max-width: 400px; 
            height: 70px; 
            background: var(--panel-bg); 
            backdrop-filter: var(--blur); 
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--glass-border); 
            border-radius: 35px; 
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            z-index: 5000; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.2); 
            padding: 0 10px;
        }

        .nav-btn { 
            background: none; 
            border: none; 
            color: var(--text-muted); 
            font-size: 10px; 
            font-weight: 800; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 4px; 
            flex: 1; 
            transition: 0.3s; 
        }

        .nav-btn span { font-size: 24px; transition: 0.2s; }
        .nav-btn.active { color: var(--accent-color); }
        .nav-btn.active span { transform: scale(1.2) translateY(-4px); }

        /* COMPOSANTS UI : CARTES ET TEXTES 
        */
        #app-screen { 
            display: none; 
            width: 100%; 
            max-width: 500px; 
            margin: 0 auto; 
            padding: 0 16px; 
            box-sizing: border-box; 
        }

        .tab-content { display: none; width: 100%; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        
        .card { 
            background: var(--glass-bg); 
            backdrop-filter: var(--blur); 
            -webkit-backdrop-filter: var(--blur);
            padding: 25px; 
            border-radius: 32px; 
            margin-bottom: 25px; 
            border: 1px solid var(--glass-border); 
            box-shadow: var(--shadow); 
            animation: fadeInUp 0.5s ease-out both; 
        }

        h2 { font-family: var(--font-impact); font-size: 40px; margin: 10px 0 25px 0; letter-spacing: 1px; text-transform: uppercase; }
        h3.session-title { 
            font-family: var(--font-impact); 
            font-size: 22px; 
            margin: 30px 0 15px 5px; 
            color: var(--accent-color); 
            text-transform: uppercase; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        /* INPUTS ET FORMULAIRES 
        */
        input, select { 
            width: 100%; 
            padding: 18px; 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid var(--glass-border); 
            color: var(--text-main); 
            border-radius: 18px; 
            font-size: 16px; 
            font-weight: 600; 
            box-sizing: border-box; 
            margin-bottom: 15px; 
            outline: none; 
            transition: 0.3s;
        }
        input:focus { border-color: var(--accent-color); background: rgba(255,255,255,0.1); }
        
        optgroup { font-family: var(--font-impact); color: var(--accent-color); text-transform: uppercase; letter-spacing: 1px; }

        .btn-primary { 
            background: var(--accent-color); 
            color: white; 
            border: none; 
            padding: 18px; 
            font-family: var(--font-impact); 
            font-size: 22px; 
            border-radius: 22px; 
            width: 100%; 
            cursor: pointer; 
            transition: 0.2s; 
            box-shadow: 0 5px 15px rgba(0, 122, 255, 0.3);
        }
        .btn-primary:active { transform: scale(0.97); }

        .btn-danger-soft { 
            background: rgba(255, 59, 48, 0.1); 
            color: var(--danger-color); 
            border: none; 
            padding: 10px 18px; 
            border-radius: 14px; 
            font-family: var(--font-impact); 
            font-size: 15px; 
            cursor: pointer; 
        }

        /* LISTES ET ITEMS DE SÉANCE 
        */
        .history-group { margin-bottom: 30px; animation: fadeInUp 0.5s ease-out both; }
        .group-header-title { 
            font-family: var(--font-impact); 
            font-size: 19px; 
            color: var(--accent-color); 
            margin: 0 0 12px 5px; 
            display: flex; align-items: center; gap: 10px; 
        }

        .set-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 18px 22px; 
            background: var(--glass-bg); 
            border-radius: 25px; 
            margin-bottom: 12px; 
            border: 1px solid var(--glass-border); 
            box-shadow: var(--shadow); 
        }

        .icon-btn { 
            width: 42px; height: 42px; 
            border-radius: 15px; 
            border: 1px solid var(--glass-border); 
            background: rgba(255, 255, 255, 0.05); 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; font-size: 18px; 
            transition: 0.2s; 
        }
        .btn-del { color: var(--danger-color); }
        .btn-restore { color: var(--pr-color); }

        /* CALENDRIER : GRILLE 7 COLONNES 
        */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; text-align: center; }
        .day-label { font-size: 11px; font-weight: 800; color: var(--text-muted); padding: 8px 0; text-transform: uppercase; }
        .day-cell { 
            aspect-ratio: 1; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 15px; font-weight: 700; 
            border-radius: 14px; 
            cursor: pointer; 
            transition: 0.2s; 
            border: 1px solid transparent;
        }
        .day-cell.has-data { background: var(--accent-soft); color: var(--accent-color); font-weight: 800; }
        .day-cell.selected { background: var(--accent-color) !important; color: white !important; box-shadow: 0 5px 15px rgba(0, 122, 255, 0.3); }

        /* INFOS GHOST ET 1RM 
        */
        #last-workout-ghost { 
            font-size: 12px; color: var(--text-muted); 
            text-align: center; margin: 15px 0; 
            min-height: 35px; font-weight: 600; 
            line-height: 1.5; background: rgba(0,0,0,0.03); 
            padding: 10px; border-radius: 15px; 
        }
        #one-rm-live { font-family: var(--font-impact); font-size: 19px; color: var(--accent-color); text-align: center; margin-bottom: 15px; }

        /* MODALES 
        */
        .modal-overlay { 
            position: fixed !important; top: 0 !important; left: 0 !important; 
            width: 100% !important; height: 100% !important; 
            background: rgba(0,0,0,0.85); 
            backdrop-filter: blur(12px); 
            display: none; align-items: center; justify-content: center; 
            z-index: 9000; padding: 20px; box-sizing: border-box; 
        }
        .modal-card { 
            width: 100%; max-width: 440px; 
            background: var(--glass-bg); 
            backdrop-filter: blur(25px);
            border-radius: 38px; padding: 35px; 
            border: 1px solid var(--glass-border); 
            box-shadow: 0 25px 60px rgba(0,0,0,0.4); 
            max-height: 85vh; overflow-y: auto; 
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">MUSCU<span>PRO</span></div>
        <div class="header-right">
            <button onclick="toggleTheme()" style="background:none; border:none; font-size:22px; cursor:pointer;">🌙</button>
            <button onclick="openTrash()" style="background:none; border:none; font-size:22px; cursor:pointer;">🗑️</button>
            <img id="user-photo" class="user-photo" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
            <button id="logout-btn">DÉCONNEXION</button>
        </div>
    </header>

    <div id="auth-screen">
        <h1 style="font-family: var(--font-impact); font-size: 70px; letter-spacing: 4px; margin-bottom: 50px;">MUSCU<span>PRO</span></h1>
        <button id="google-login-btn" class="google-btn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="22"> CONTINUER AVEC GOOGLE
        </button>
        <div style="width:100%; max-width:350px; border-top:1px solid var(--glass-border); padding-top:40px;">
            <input type="email" id="auth-email" placeholder="Adresse Email">
            <input type="password" id="auth-password" placeholder="Mot de passe">
            <button id="auth-submit-btn" class="btn-primary" style="margin-top:10px; font-size: 18px;">CONNEXION / CRÉATION</button>
        </div>
    </div>

    <div id="app-screen">
        
        <section id="workout" class="tab-content active">
            <h2>MA SÉANCE</h2>
            <div class="card">
                <form id="workout-form">
                    <input type="date" id="workout-date" required>
                    <div style="display:flex; gap:12px;">
                        <select id="machine" required></select>
                        <button type="button" onclick="openModal()" style="width:60px; border-radius:18px; background:var(--accent-color); color:white; border:none; font-size:28px;">+</button>
                    </div>
                    <div id="last-workout-ghost">Chargement...</div>
                    <div style="display:flex; gap:12px;">
                        <input type="number" id="weight" placeholder="Kg" required step="any">
                        <input type="number" id="reps" placeholder="Reps" required>
                    </div>
                    <div id="one-rm-live">1RM ESTIMÉ : -</div>
                    <label style="display:flex; align-items:center; gap:12px; justify-content:center; margin-bottom:20px; font-size:15px; font-weight:700;">
                        <input type="checkbox" id="is-warmup" style="width:22px; height:22px;"> 🔥 ÉCHAUFFEMENT
                    </label>
                    <button type="submit" class="btn-primary">ENREGISTRER LA SÉRIE</button>
                </form>
            </div>
            <h3 class="session-title">SÉANCE DU JOUR <button class="btn-danger-soft" onclick="deleteAllSeries()">TOUT SUPPRIMER</button></h3>
            <div id="history-list"></div>
        </section>

        <section id="exercises-tab" class="tab-content">
            <h2>MES MACHINES</h2>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-bottom:30px;">
                <button class="btn-primary" onclick="openModal()">+ AJOUTER</button>
                <button class="btn-primary" style="background:var(--accent-soft); color:var(--accent-color); border:1px solid var(--glass-border);" onclick="importDefaults()">📚 CATALOGUE</button>
            </div>
            <h3 class="session-title">LISTE PAR MUSCLE</h3>
            <div id="machine-grouped-list"></div>
        </section>

        <section id="calendar-tab" class="tab-content">
            <h2>CALENDRIER</h2>
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px; font-family:var(--font-impact); font-size:26px;">
                    <div id="month-display">Mois</div>
                    <div style="display:flex; gap:12px;">
                        <button class="icon-btn" onclick="changeMonth(-1)">‹</button>
                        <button class="icon-btn" onclick="changeMonth(1)">›</button>
                    </div>
                </div>
                <div class="calendar-grid" id="calendar-container"></div>
            </div>
            <div id="day-details"></div>
        </section>

        <section id="stats" class="tab-content">
            <h2>MES STATS</h2>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:18px; margin-bottom:30px;">
                <div class="card" style="text-align:center; padding:20px;">
                    <h4 style="margin:0; font-family: var(--font-impact);">SÉRIES</h4>
                    <p id="stat-series" style="font-size:42px; margin:0; color:var(--accent-color); font-family:var(--font-impact);">0</p>
                </div>
                <div class="card" style="text-align:center; padding:20px;">
                    <h4 style="margin:0; font-family: var(--font-impact);">VOLUME</h4>
                    <p id="stat-volume" style="font-size:42px; margin:0; color:var(--pr-color); font-family:var(--font-impact);">0</p>
                </div>
            </div>
            
            <div class="card">
                <h4 style="font-family:var(--font-impact); margin-top:0; text-align:center;">🔥 RÉPARTITION MUSCULAIRE</h4>
                <div style="height: 250px; position: relative;">
                    <canvas id="muscleChart"></canvas>
                </div>
            </div>
            
            <div class="card">
                <h4 style="font-family:var(--font-impact); margin-top:0; text-align:center;">🏆 TOP RECORDS (KG)</h4>
                <canvas id="statsChart"></canvas>
            </div>
        </section>
    </div>

    <nav id="bottom-nav">
        <button class="nav-btn active" onclick="showTab('workout', this)"><span>🏋️</span>SÉANCE</button>
        <button class="nav-btn" onclick="showTab('exercises-tab', this)"><span>⚙️</span>MACHINES</button>
        <button class="nav-btn" onclick="showTab('calendar-tab', this)"><span>📅</span>CALENDRIER</button>
        <button class="nav-btn" onclick="showTab('stats', this)"><span>📊</span>STATS</button>
    </nav>

    <div id="modal-trash" class="modal-overlay" onclick="this.style.display='none'">
        <div class="modal-card" onclick="event.stopPropagation()">
            <h2 style="color:var(--danger-color)">CORBEILLE</h2>
            <div id="trash-list" style="margin-bottom:25px; max-height: 400px; overflow-y: auto;"></div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                <button class="btn-primary" style="background:rgba(0,0,0,0.1); color:var(--text-main);" onclick="document.getElementById('modal-trash').style.display='none'">FERMER</button>
                <button class="btn-primary" style="background:var(--danger-color);" onclick="emptyTrash()">VIDER</button>
            </div>
        </div>
    </div>

    <div id="modal-add-machine" class="modal-overlay">
        <div class="modal-card">
            <h2>MACHINE</h2>
            <input type="text" id="new-machine-name" placeholder="Nom de l'exercice">
            <select id="new-machine-category">
                <option>Pectoraux</option><option>Dos</option><option>Jambes</option>
                <option>Épaules</option><option>Bras</option><option>Abdos</option>
                <option value="Cardio">Cardio</option>
            </select>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
                <button class="btn-primary" style="background:rgba(0,0,0,0.1); color:var(--text-main);" onclick="closeModal()">ANNULER</button>
                <button class="btn-primary" id="save-machine-btn">VALIDER</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, where, limit, deleteDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";

        // CONFIGURATION FIREBASE
        const firebaseConfig = { 
            apiKey: "AIzaSyDqD_BnYDL6GwQPIsn3W8ffnoo9BwoKr1Q", 
            authDomain: "suivi-muscu-8dd6d.firebaseapp.com", 
            projectId: "suivi-muscu-8dd6d", 
            storageBucket: "suivi-muscu-8dd6d.firebasestorage.app", 
            messagingSenderId: "1011748268882", 
            appId: "G-P9TLE42VZ1" 
        };

        // INITIALISATION
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        setPersistence(auth, browserLocalPersistence);

        // ÉTAT GLOBAL
        let currentViewDate = new Date();
        let activeCalendarDay = null;
        let exerciseCategories = {};
        let muscleChartInstance = null;
        let statsChartInstance = null;

        // --- 1. AUTHENTIFICATION ---

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-screen').style.display = 'none'; 
                document.getElementById('app-screen').style.display = 'block';
                if(user.photoURL) document.getElementById('user-photo').src = user.photoURL;
                initApp();
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('app-screen').style.display = 'none';
            }
        });

        document.getElementById('google-login-btn').onclick = () => signInWithPopup(auth, provider);
        
        document.getElementById('auth-submit-btn').onclick = async () => {
            const e = document.getElementById('auth-email').value;
            const p = document.getElementById('auth-password').value;
            if(!e || !p) return alert("Veuillez remplir les champs.");
            try { 
                await signInWithEmailAndPassword(auth, e, p); 
            } catch (error) {
                try { await createUserWithEmailAndPassword(auth, e, p); } catch(err) { alert("Erreur identifiants."); }
            }
        };

        const uPhoto = document.getElementById('user-photo');
        const logoutBtn = document.getElementById('logout-btn');
        uPhoto.onclick = (e) => { e.stopPropagation(); logoutBtn.style.display = (logoutBtn.style.display === 'block') ? 'none' : 'block'; };
        window.onclick = () => logoutBtn.style.display = 'none';
        logoutBtn.onclick = () => signOut(auth);

        // --- 2. INITIALISATION ---

        async function initApp() {
            document.getElementById('workout-date').value = new Date().toISOString().split('T')[0];
            await loadExercises(); 
            loadWorkouts(); 
            updateGhost();
            
            document.getElementById('weight').oninput = updateLive1RM;
            document.getElementById('reps').oninput = updateLive1RM;
            document.getElementById('machine').onchange = () => { 
                handleMachineChange(); 
            };
        }

        // --- 3. LOGIQUE MÉTIER (GHOST, 1RM, CARDIO) ---

        const calc1RM = (w, r) => { 
            const weight = Number(w); const reps = Number(r);
            if (!weight || !reps || reps <= 0) return 0; 
            return reps === 1 ? weight : Math.round(weight / (1.0278 - (0.0278 * reps))); 
        };

        function updateLive1RM() { 
            const m = document.getElementById('machine').value;
            if (exerciseCategories[m] === "Cardio") return;
            const w = document.getElementById('weight').value;
            const r = document.getElementById('reps').value;
            const rm = calc1RM(w, r); 
            document.getElementById('one-rm-live').innerText = rm > 0 ? `1RM ESTIMÉ : ${rm} KG` : `1RM ESTIMÉ : -`; 
        }

        function handleMachineChange() {
            const m = document.getElementById('machine').value;
            const cat = exerciseCategories[m];
            const wi = document.getElementById('weight');
            const ri = document.getElementById('reps');
            const orm = document.getElementById('one-rm-live');
            
            if (cat === "Cardio") {
                wi.placeholder = "Minutes"; ri.placeholder = "Kilomètres"; 
                orm.style.display = "none";
            } else {
                wi.placeholder = "Poids (kg)"; ri.placeholder = "Reps"; 
                orm.style.display = "block"; updateLive1RM();
            }
            updateGhost();
        }

        async function updateGhost() {
            const m = document.getElementById('machine').value;
            const ghostDiv = document.getElementById('last-workout-ghost');
            if (!m || !auth.currentUser) return;

            const q = query(collection(db, "workouts"), where("userId", "==", auth.currentUser.uid), where("machine", "==", m));
            const snap = await getDocs(q);
            
            if (snap.empty) { ghostDiv.innerHTML = "AUCUN HISTORIQUE : C'EST LE MOMENT DE BRILLER ! 💪"; return; }
            
            let all = []; snap.forEach(d => all.push(d.data()));
            all.sort((a, b) => b.timestamp.toDate() - a.timestamp.toDate());
            
            const last = all[0];
            const isC = exerciseCategories[m] === "Cardio";
            
            if (isC) {
                ghostDiv.innerHTML = `DERNIER : <strong>${last.weight}min | ${last.reps}km</strong>`;
            } else {
                const rm = calc1RM(last.weight, last.reps);
                ghostDiv.innerHTML = `DERNIER : <strong>${last.weight}kg x ${last.reps}</strong> (1RM : ${rm}kg)`;
            }
        }

        // --- 4. GESTION DES EXERCICES ---

        async function loadExercises() {
            const snap = await getDocs(query(collection(db, "exercises"), where("userId", "==", auth.currentUser.uid)));
            let grouped = {}; exerciseCategories = {};
            
            snap.forEach(d => { 
                const da = d.data(); const cat = da.category || "Autre"; 
                if(!grouped[cat]) grouped[cat] = []; 
                grouped[cat].push({id: d.id, name: da.name}); 
                exerciseCategories[da.name] = cat; 
            });

            // Menu déroulant par muscle
            let opts = "";
            Object.keys(grouped).sort().forEach(cat => {
                opts += `<optgroup label="${cat.toUpperCase()}">`;
                grouped[cat].sort((a,b) => a.name.localeCompare(b.name)).forEach(ex => {
                    opts += `<option value="${ex.name}">${ex.name}</option>`;
                });
                opts += `</optgroup>`;
            });
            document.getElementById('machine').innerHTML = opts;
            document.getElementById('machine').dispatchEvent(new Event('change'));
            
            // Liste de gestion
            const cont = document.getElementById('machine-grouped-list');
            cont.innerHTML = "";
            Object.keys(grouped).sort().forEach(cat => {
                let html = `<h4 class="session-title" style="font-size:14px; margin-left:10px;">${cat.toUpperCase()}</h4><div style="background:rgba(255,255,255,0.03); border-radius:22px; border:1px solid var(--glass-border); overflow:hidden; margin-bottom:20px;">`;
                grouped[cat].forEach(ex => {
                    html += `<div style="padding:16px 20px; border-bottom:1px solid var(--glass-border); display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-weight:700;">${ex.name}</span>
                        <button class="icon-btn btn-del" onclick="deleteExo('${ex.id}')">🗑️</button>
                    </div>`;
                });
                cont.innerHTML += html + "</div>";
            });
        }

        // --- 5. GESTION DE LA SÉANCE ---

        document.getElementById('workout-form').onsubmit = async (e) => {
            e.preventDefault();
            const machine = document.getElementById('machine').value;
            const weight = Number(document.getElementById('weight').value);
            const reps = Number(document.getElementById('reps').value);
            const isWarmup = document.getElementById('is-warmup').checked;
            const dateStr = document.getElementById('workout-date').value;

            try {
                await addDoc(collection(db, "workouts"), {
                    machine: machine, weight: weight, reps: reps, isWarmup: isWarmup,
                    timestamp: new Date(dateStr + "T12:00:00"),
                    userId: auth.currentUser.uid
                });
                confetti({ particleCount: 60, spread: 70, origin: { y: 0.8 }, colors: ['#007aff', '#34c759'] });
                loadWorkouts(); updateGhost();
            } catch (err) { alert("Erreur lors de l'enregistrement."); }
        };

        async function loadWorkouts() {
            const ds = document.getElementById('workout-date').value;
            const snap = await getDocs(query(collection(db, "workouts"), where("userId", "==", auth.currentUser.uid)));
            
            let filtered = [];
            snap.forEach(d => { if(d.data().timestamp.toDate().toISOString().split('T')[0] === ds) filtered.push({id: d.id, data: d.data()}); });
            filtered.sort((a,b) => a.data.timestamp.toDate() - b.data.timestamp.toDate());
            
            const cont = document.getElementById('history-list');
            cont.innerHTML = ''; let currentM = "";

            filtered.forEach(x => {
                if(currentM !== x.data.machine) {
                    currentM = x.data.machine;
                    cont.innerHTML += `<div class="history-group" id="grp-${x.id}"><div class="group-header-title">🏋️ ${currentM.toUpperCase()}</div></div>`;
                }
                const isC = exerciseCategories[x.data.machine] === "Cardio";
                const val = isC ? `<strong>${x.data.weight} min | ${x.data.reps} km</strong>` : `<strong>${x.data.weight} kg x ${x.data.reps}</strong>`;
                
                document.getElementById(`grp-${x.id}`).innerHTML += `
                    <div class="set-item">
                        <div>${val}</div>
                        <button class="icon-btn btn-del" onclick="deleteSeries('${x.id}')">🗑️</button>
                    </div>`;
            });
        }

        // --- 6. STATS & MUSCLE HEATMAP ---

        async function loadStats() {
            const filter = document.getElementById('stats-time-filter').value;
            const snap = await getDocs(query(collection(db, "workouts"), where("userId", "==", auth.currentUser.uid)));
            
            let limitDate = new Date();
            if(filter === 'week') limitDate.setDate(limitDate.getDate() - 7);
            else if(filter === 'month') limitDate.setDate(limitDate.getDate() - 30);
            else limitDate = new Date(0);

            let vol = 0, count = 0, records = {}, heatmap = {};

            snap.forEach(d => {
                const x = d.data();
                if(x.timestamp.toDate() < limitDate) return;

                const cat = exerciseCategories[x.machine] || "Autre";
                heatmap[cat] = (heatmap[cat] || 0) + 1;

                if(!x.isWarmup) {
                    count++;
                    if(cat !== "Cardio") {
                        vol += (x.weight * x.reps);
                        if(!records[x.machine] || x.weight > records[x.machine]) records[x.machine] = x.weight;
                    }
                }
            });

            document.getElementById('stat-series').innerText = count;
            document.getElementById('stat-volume').innerText = Math.round(vol) + " KG";
            
            renderMuscleChart(heatmap);
            renderRecordsChart(records);
        }

        function renderMuscleChart(heatmap) {
            const ctx = document.getElementById('muscleChart').getContext('2d');
            if(muscleChartInstance) muscleChartInstance.destroy();
            
            const labels = Object.keys(heatmap);
            const data = Object.values(heatmap);
            
            muscleChartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: ['#007aff', '#34c759', '#ff9500', '#ff3b30', '#af52de', '#5856d6', '#ff2d55'],
                        borderWidth: 0,
                        hoverOffset: 10
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom', labels: { color: '#8e8e93', font: { family: 'Inter', size: 10 } } }
                    },
                    cutout: '70%'
                }
            });
        }

        function renderRecordsChart(records) {
            const ctx = document.getElementById('statsChart').getContext('2d');
            if(statsChartInstance) statsChartInstance.destroy();
            
            const sorted = Object.entries(records).sort((a,b) => b[1]-a[1]).slice(0,5);
            
            statsChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: sorted.map(r => r[0].toUpperCase()),
                    datasets: [{
                        label: 'KG',
                        data: sorted.map(r => r[1]),
                        backgroundColor: '#0a84ff',
                        borderRadius: 10
                    }]
                },
                options: { 
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true } }
                }
            });
        }

        // --- 7. CALENDRIER ---

        async function renderCalendar() {
            const container = document.getElementById('calendar-container');
            container.innerHTML = '';
            const y = currentViewDate.getFullYear(), m = currentViewDate.getMonth();
            
            document.getElementById('month-display').innerText = new Intl.DateTimeFormat('fr-FR', { month: 'long', year: 'numeric' }).format(currentViewDate).toUpperCase();
            
            ['L','M','M','J','V','S','D'].forEach(d => container.innerHTML += `<div class="day-label">${d}</div>`);
            
            const first = (new Date(y, m, 1).getDay() + 6) % 7;
            const snap = await getDocs(query(collection(db, "workouts"), where("userId", "==", auth.currentUser.uid)));
            const active = new Set();
            snap.forEach(d => { if(d.data().timestamp.toDate().getMonth() === m) active.add(d.data().timestamp.toDate().getDate()); });

            for(let i=0; i<first; i++) container.appendChild(document.createElement('div'));
            for(let i=1; i<=new Date(y, m+1, 0).getDate(); i++) {
                const cell = document.createElement('div');
                cell.className = 'day-cell' + (active.has(i) ? ' has-data' : '');
                if(i === activeCalendarDay) cell.classList.add('selected');
                cell.innerText = i;
                cell.onclick = () => { activeCalendarDay = i; renderCalendar(); loadDayDetails(i); };
                container.appendChild(cell);
            }
        }

        async function loadDayDetails(day) {
            const ds = new Date(currentViewDate.getFullYear(), currentViewDate.getMonth(), day).toDateString();
            const snap = await getDocs(query(collection(db, "workouts"), where("userId", "==", auth.currentUser.uid)));
            let cont = document.getElementById('day-details');
            cont.innerHTML = '';
            snap.forEach(d => {
                if(d.data().timestamp.toDate().toDateString() === ds) {
                    const x = d.data();
                    cont.innerHTML += `<div class="set-item"><div><strong>${x.machine}</strong> : ${x.weight}kg</div></div>`;
                }
            });
        }

        // --- 8. CORBEILLE & SUPPRESSION ---

        window.deleteSeries = async (id) => {
            const ref = doc(db, "workouts", id);
            const snap = await getDoc(ref);
            if (snap.exists() && confirm("Envoyer à la corbeille ?")) {
                await addDoc(collection(db, "trash"), { ...snap.data(), deletedAt: new Date() });
                await deleteDoc(ref);
                loadWorkouts(); updateGhost();
            }
        };

        window.openTrash = async () => {
            document.getElementById('modal-trash').style.display = 'flex';
            const snap = await getDocs(query(collection(db, "trash"), where("userId", "==", auth.currentUser.uid), orderBy("deletedAt", "desc")));
            const list = document.getElementById('trash-list');
            list.innerHTML = snap.empty ? '<p style="text-align:center;">Corbeille vide.</p>' : '';
            snap.forEach(d => {
                const x = d.data();
                list.innerHTML += `<div class="set-item">
                    <div style="font-size:12px;"><strong>${x.machine}</strong><br>${x.weight}kg x ${x.reps}</div>
                    <button class="icon-btn btn-restore" onclick="restoreSeries('${d.id}')">🔄</button>
                </div>`;
            });
        };

        window.restoreSeries = async (id) => {
            const ref = doc(db, "trash", id);
            const snap = await getDoc(ref);
            if (snap.exists()) {
                const data = snap.data(); delete data.deletedAt;
                await addDoc(collection(db, "workouts"), data);
                await deleteDoc(ref);
                openTrash(); loadWorkouts();
            }
        };

        window.emptyTrash = async () => {
            if(!confirm("Vider définitivement ?")) return;
            const snap = await getDocs(query(collection(db, "trash"), where("userId", "==", auth.currentUser.uid)));
            for(const d of snap.docs) await deleteDoc(doc(db, "trash", d.id));
            openTrash();
        };

        // --- 9. HELPERS UI ---

        window.showTab = (id, btn) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
            if(id === 'stats') loadStats();
            if(id === 'calendar-tab') renderCalendar();
            if(id === 'exercises-tab') loadExercises();
        };

        window.toggleTheme = () => {
            const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', t);
            localStorage.setItem('theme', t);
        };
        document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');

        window.changeMonth = (v) => { currentViewDate.setMonth(currentViewDate.getMonth() + v); renderCalendar(); };
        window.openModal = () => document.getElementById('modal-add-machine').style.display='flex';
        window.closeModal = () => document.getElementById('modal-add-machine').style.display='none';
        
        document.getElementById('save-machine-btn').onclick = async () => {
            const n = document.getElementById('new-machine-name').value;
            const c = document.getElementById('new-machine-category').value;
            if(!n) return alert("Nom requis.");
            await addDoc(collection(db, "exercises"), { name: n, category: c, userId: auth.currentUser.uid });
            closeModal(); loadExercises();
        };

        window.importDefaults = async () => {
            const ds = [
                {n: "Développé couché", c: "Pectoraux"}, {n: "Squat", c: "Jambes"},
                {n: "Tractions", c: "Dos"}, {n: "Tapis", c: "Cardio"}
            ];
            for (const x of ds) await addDoc(collection(db, "exercises"), { name: x.n, category: x.c, userId: auth.currentUser.uid });
            loadExercises();
        };

    </script>
</body>
</html>
