<!DOCTYPE html><html lang="fr"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Muscu Pro Elite</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2964/2964514.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #f8f9fc; --panel-bg: rgba(255, 255, 255, 0.9); --card-bg: #ffffff;
            --text-main: #1c1c1e; --text-muted: #8e8e93; --accent-color: #007aff;
            --accent-hover: #0063cc; --accent-light: rgba(0, 122, 255, 0.1);
            --border-color: #f2f2f7; --danger-color: #ff3b30; --pr-color: #34c759;
            --shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
        }
        [data-theme="dark"] {
            --bg-color: #000000; --panel-bg: rgba(20, 20, 22, 0.9); --card-bg: #121212;
            --text-main: #ffffff; --text-muted: #8e8e93; --accent-color: #0a84ff;
            --accent-hover: #0070e0; --accent-light: rgba(10, 132, 255, 0.2);
            --border-color: #2c2c2e; --shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
        }

        html { background-color: var(--bg-color); }
        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background-color: var(--bg-color); color: var(--text-main);
            transition: background-color 0.4s;
            padding-top: calc(80px + env(safe-area-inset-top, 0px));
            padding-bottom: calc(100px + env(safe-area-inset-bottom, 20px)); 
            -webkit-tap-highlight-color: transparent; overflow-x: hidden;
        }

        /* TRANSITIONS FLUIDES */
        .tab-content { 
            display: none; opacity: 0; 
            transform: translateX(10px); 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .tab-content.active { display: block; opacity: 1; transform: translateX(0); }

        header {
            position: fixed; top: 0; left: 0; right: 0; height: 64px;
            background-color: var(--panel-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; padding-top: env(safe-area-inset-top); z-index: 1000;
        }
        .logo { font-size: 20px; font-weight: 800; }
        .logo span { color: var(--accent-color); }
        
        .header-right { display: flex; align-items: center; gap: 12px; }
        .theme-toggle { cursor: pointer; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; background: var(--accent-light); border-radius: 12px; font-size: 18px; border: 1px solid var(--border-color); }
        .theme-toggle .moon-icon, [data-theme="dark"] .theme-toggle .sun-icon { display: none; }
        [data-theme="dark"] .theme-toggle .moon-icon { display: block; }

        .user-avatar { width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid var(--accent-color); padding: 2px; display: none; }
        #logout-btn { background: rgba(255, 59, 48, 0.1); border: none; color: var(--danger-color); font-size: 10px; font-weight: 800; cursor: pointer; padding: 6px 12px; border-radius: 20px; display: none; }

        #app-screen { display: none; padding: 0 16px; max-width: 500px; margin: 0 auto; }
        h2 { font-size: 32px; font-weight: 800; margin: 10px 0 24px 0; letter-spacing: -1.5px; }
        .card { background-color: var(--card-bg); padding: 22px; border-radius: 28px; margin-bottom: 20px; border: 1px solid var(--border-color); box-shadow: var(--shadow); box-sizing: border-box; }

        /* INPUTS & UTILS */
        input, select { width: 100%; padding: 16px; background-color: var(--bg-color); border: 1px solid var(--border-color); color: var(--text-main); border-radius: 16px; font-size: 16px; font-weight: 600; box-sizing: border-box; margin-bottom: 12px; }
        
        .btn-primary { background-color: var(--accent-color); color: white; border: none; padding: 16px; font-weight: 700; border-radius: 18px; width: 100%; cursor: pointer; font-size: 16px; transition: all 0.2s; }
        .btn-outline { background: var(--bg-color); color: var(--text-main); border: 1px solid var(--border-color); padding: 16px; font-weight: 700; border-radius: 18px; width: 100%; cursor: pointer; }

        .input-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .plate-calc-btn { width: 56px; height: 56px; background: var(--accent-light); color: var(--accent-color); border: 1px solid var(--border-color); border-radius: 16px; font-size: 20px; cursor: pointer; flex-shrink: 0; }

        /* SKELETON LOADER */
        .skeleton { background: linear-gradient(90deg, var(--border-color) 25%, var(--bg-color) 50%, var(--border-color) 75%); background-size: 200% 100%; animation: loading 1.5s infinite; border-radius: 16px; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .skeleton-card { height: 100px; margin-bottom: 15px; }

        /* PLATE CALC MODAL */
        #plate-display { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 20px 0; }
        .plate { padding: 8px 12px; border-radius: 10px; font-weight: 800; color: white; min-width: 45px; text-align: center; }
        .p20 { background: #ff3b30; } .p10 { background: #007aff; } .p5 { background: #34c759; } .p2 { background: #ff9500; }

        /* HISTORIQUE ET PR */
        .history-group { background-color: var(--card-bg); border-radius: 26px; margin-bottom: 16px; border: 1px solid var(--border-color); overflow: hidden; }
        .group-header { background: var(--accent-light); color: var(--accent-color); padding: 16px 20px; font-weight: 800; display: flex; justify-content: space-between; align-items: center; }
        .set-item { padding: 14px 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .pr-diff { font-size: 10px; font-weight: 800; color: var(--pr-color); margin-left: 5px; }

        /* NAVIGATION BASSE */
        nav { position: fixed; bottom: 0; left: 0; right: 0; height: 80px; background-color: var(--panel-bg); backdrop-filter: blur(25px); border-top: 1px solid var(--border-color); display: none; justify-content: space-around; padding-bottom: env(safe-area-inset-bottom); z-index: 1000; }
        .nav-btn { background: none; border: none; color: var(--text-muted); padding: 12px; font-size: 11px; font-weight: 700; flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .nav-btn.active { color: var(--accent-color); }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        .modal-card { width: 100%; max-width: 380px; background: var(--card-bg); border-radius: 32px; padding: 28px; border: 1px solid var(--border-color); box-shadow: 0 20px 40px rgba(0,0,0,0.4); display: flex; flex-direction: column; box-sizing: border-box; }
    </style></head><body>

    <header id="main-header">
        <div class="logo">Muscu<span>Pro</span></div>
        <div class="header-right">
            <label class="theme-toggle"><input type="checkbox" id="theme-switch" style="display:none;"><span class="sun-icon">☀️</span><span class="moon-icon">🌙</span></label>
            <img id="user-photo" class="user-avatar" src="" alt="Profil">
            <button id="logout-btn">Ciao !</button>
        </div>
    </header>

    <div id="auth-screen" style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:80vh; padding:20px; text-align:center;">
        <h1 style="font-size: 44px; font-weight: 800; letter-spacing: -2.5px;">Muscu<span>Pro</span></h1>
        <button id="google-login-btn" class="btn-primary" style="width:auto; padding: 16px 32px;">Connexion Google</button>
    </div>

    <div id="app-screen">
        <section id="workout" class="tab-content active">
            <h2>Ma Séance</h2>
            <div class="card">
                <form id="workout-form">
                    <input type="date" id="workout-date" required>
                    <div class="input-row"><select id="machine" required></select><button type="button" onclick="openAddMachine()" class="plate-calc-btn">+</button></div>
                    <div class="input-row" style="margin-bottom:0;">
                        <input type="number" id="weight" placeholder="Kg" inputmode="numeric" required onfocus="this.select()">
                        <button type="button" class="plate-calc-btn" onclick="openPlateCalc()">💿</button>
                        <input type="number" id="reps" placeholder="Reps" inputmode="numeric" required onfocus="this.select()">
                    </div>
                    <div id="last-workout-ghost" style="font-size:12px; color:var(--accent-color); text-align:center; margin: 10px 0; font-weight:700;"></div>
                    <input type="text" id="series-note" placeholder="Note (facultatif)">
                    <label style="display:flex; align-items:center; gap:10px; justify-content:center; margin-bottom:20px; font-size:14px; font-weight:600;"><input type="checkbox" id="is-warmup" style="width:20px; height:20px;"> 🔥 Échauffement</label>
                    <button type="submit" class="btn-primary">Enregistrer</button>
                </form>
            </div>
            <div id="history-loading" style="display:none;"><div class="skeleton skeleton-card"></div><div class="skeleton skeleton-card"></div></div>
            <div id="history-list"></div>
        </section>

        <section id="calendar" class="tab-content">
            <h2>Calendrier</h2>
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <div id="month-display" style="font-weight:800;">Mois</div>
                    <div style="display:flex; gap:10px;"><button class="theme-toggle" onclick="changeMonth(-1)">‹</button><button class="theme-toggle" onclick="changeMonth(1)">›</button></div>
                </div>
                <div id="calendar-container" style="display:grid; grid-template-columns:repeat(7, 1fr); gap:6px;"></div>
            </div>
            <div id="day-details"></div>
        </section>

        <section id="stats" class="tab-content">
            <h2>Analyses</h2>
            <div class="card"><h3>Répartition Musculaire</h3><canvas id="muscleRadar"></canvas></div>
            <div class="card"><h3>Volume Hebdo (kg)</h3><canvas id="weeklyVolumeChart"></canvas></div>
        </section>
    </div>

    <div id="modal-add-machine" class="modal-overlay"><div class="modal-card">
        <h2>Nouvel exercice</h2>
        <input type="text" id="new-machine-name" placeholder="Ex: Développé couché">
        <select id="new-machine-cat">
            <option value="Pectoraux">Pectoraux</option>
            <option value="Dos">Dos</option>
            <option value="Jambes">Jambes</option>
            <option value="Épaules">Épaules</option>
            <option value="Bras">Bras</option>
            <option value="Abdos">Abdos</option>
        </select>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
            <button class="btn-outline" onclick="closeModal('modal-add-machine')">Annuler</button>
            <button class="btn-primary" id="save-machine-btn">Ajouter</button>
        </div>
    </div></div>

    <div id="modal-plate-calc" class="modal-overlay"><div class="modal-card">
        <h2>Calculateur (Barre 20kg)</h2>
        <div id="plate-display"></div>
        <button class="btn-primary" onclick="closeModal('modal-plate-calc')">Ok</button>
    </div></div>

    <nav id="bottom-nav">
        <button class="nav-btn active" onclick="showTab('workout', this)"><span>🏋️</span>Séance</button>
        <button class="nav-btn" onclick="showTab('calendar', this)"><span>📅</span>Calendrier</button>
        <button class="nav-btn" onclick="showTab('stats', this)"><span>📊</span>Stats</button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, where, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, setPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyDqD_BnYDL6GwQPIsn3W8ffnoo9BwoKr1Q", authDomain: "suivi-muscu-8dd6d.firebaseapp.com", projectId: "suivi-muscu-8dd6d", storageBucket: "suivi-muscu-8dd6d.firebasestorage.app", messagingSenderId: "1011748268882", appId: "G-P9TLE42VZ1" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let exercisesCache = {};
        let personalRecords = {};
        let currentViewDate = new Date();

        document.getElementById('workout-date').value = new Date().toISOString().split('T')[0];
        setPersistence(auth, browserSessionPersistence);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                const photoImg = document.getElementById('user-photo');
                if (user.photoURL) { photoImg.src = user.photoURL; photoImg.style.display = 'block'; }
                document.getElementById('logout-btn').style.display = 'block';
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-screen').style.display = 'block';
                document.getElementById('bottom-nav').style.display = 'flex';
                loadExercises(); loadPRs(); loadWorkouts();
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('app-screen').style.display = 'none';
                document.getElementById('bottom-nav').style.display = 'none';
            }
        });

        document.getElementById('google-login-btn').onclick = () => signInWithPopup(auth, provider);
        document.getElementById('logout-btn').onclick = () => signOut(auth);

        window.showTab = (tabId, btn) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active'); btn.classList.add('active');
            if(tabId === 'calendar') renderCalendar();
            if(tabId === 'stats') loadStats();
        };

        // CALCULATEUR DE PLAQUES
        window.openPlateCalc = () => {
            const weight = parseFloat(document.getElementById('weight').value) || 0;
            const container = document.getElementById('plate-display');
            container.innerHTML = '';
            if(weight <= 20) { container.innerHTML = "Barre vide !"; }
            else {
                let sideWeight = (weight - 20) / 2;
                const availablePlates = [20, 15, 10, 5, 2.5, 1.25, 0.5];
                availablePlates.forEach(p => {
                    while(sideWeight >= p) {
                        container.innerHTML += `<div class="plate p${Math.floor(p)}">${p}kg</div>`;
                        sideWeight -= p;
                    }
                });
            }
            document.getElementById('modal-plate-calc').style.display = 'flex';
        };

        async function loadExercises() {
            const select = document.getElementById('machine');
            const q = query(collection(db, "exercises"), where("userId", "==", auth.currentUser.uid));
            const snap = await getDocs(q);
            exercisesCache = {};
            let options = "";
            snap.forEach(d => {
                const data = d.data();
                exercisesCache[data.name] = data.category || "Autre";
                options += `<option value="${data.name}">${data.name}</option>`;
            });
            select.innerHTML = options;
            select.dispatchEvent(new Event('change'));
        }

        async function loadPRs() {
            const q = query(collection(db, "workouts"), where("userId", "==", auth.currentUser.uid));
            const snap = await getDocs(q);
            personalRecords = {};
            snap.forEach(d => {
                const data = d.data();
                if(!data.isWarmup && (!personalRecords[data.machine] || data.weight > personalRecords[data.machine])) {
                    personalRecords[data.machine] = data.weight;
                }
            });
        }

        function renderGrouped(arr, container) {
            container.innerHTML = '';
            let groups = []; let cur = null;
            arr.forEach(x => { if(!cur || cur.machine !== x.data.machine) { cur = { machine: x.data.machine, sets: [] }; groups.push(cur); } cur.sets.push(x); });
            groups.forEach(g => {
                const groupDiv = document.createElement('div');
                groupDiv.className = 'history-group';
                let html = `<div class="group-header"><span>🏋️ ${g.machine}</span><span style="font-size:10px; opacity:0.6;">${exercisesCache[g.machine] || ''}</span></div>`;
                g.sets.reverse().forEach((s, i) => {
                    const d = s.data;
                    const isPR = !d.isWarmup && d.weight >= personalRecords[d.machine];
                    const diffHtml = (isPR && personalRecords[d.machine] > 0) ? `<span class="pr-diff">🏆 NEW PR</span>` : '';
                    html += `<div class="set-item"><div><span class="set-number">${d.isWarmup?'🔥':i+1}</span><strong>${d.weight}kg x ${d.reps}</strong>${diffHtml}</div><button onclick="deleteSeries('${s.id}')" style="background:none; border:none; color:var(--danger-color); cursor:pointer;">🗑️</button></div>`;
                });
                groupDiv.innerHTML = html; container.appendChild(groupDiv);
            });
        }

        document.getElementById('workout-form').onsubmit = async (e) => {
            e.preventDefault();
            const weight = parseInt(document.getElementById('weight').value);
            const machine = document.getElementById('machine').value;
            await addDoc(collection(db, "workouts"), {
                machine, weight, reps: parseInt(document.getElementById('reps').value),
                isWarmup: document.getElementById('is-warmup').checked, note: document.getElementById('series-note').value,
                timestamp: new Date(document.getElementById('workout-date').value), userId: auth.currentUser.uid
            });
            loadWorkouts();
        };

        async function loadWorkouts() {
            document.getElementById('history-loading').style.display = 'block';
            const q = query(collection(db, "workouts"), where("userId", "==", auth.currentUser.uid), orderBy("timestamp", "desc"));
            const snap = await getDocs(q);
            document.getElementById('history-loading').style.display = 'none';
            let today = document.getElementById('workout-date').value;
            let filtered = []; snap.forEach(d => { 
                if(d.data().timestamp.toDate().toISOString().split('T')[0] === today) filtered.push({id: d.id, data: d.data()}); 
            });
            renderGrouped(filtered, document.getElementById('history-list'));
        }

        // STATS : RADAR ET VOLUME
        let radarChart = null; let volumeChart = null;
        async function loadStats() {
            const q = query(collection(db, "workouts"), where("userId", "==", auth.currentUser.uid));
            const snap = await getDocs(q);
            const muscleData = {}; const weeklyVolume = {};
            
            snap.forEach(d => {
                const data = d.data();
                if(data.isWarmup) return;
                // Radar logic
                const cat = exercisesCache[data.machine] || "Autre";
                muscleData[cat] = (muscleData[cat] || 0) + 1;
                // Volume logic
                const date = data.timestamp.toDate();
                const week = getWeekNumber(date);
                weeklyVolume[week] = (weeklyVolume[week] || 0) + (data.weight * data.reps);
            });

            if(radarChart) radarChart.destroy();
            radarChart = new Chart(document.getElementById('muscleRadar'), {
                type: 'radar',
                data: { labels: Object.keys(muscleData), datasets: [{ data: Object.values(muscleData), backgroundColor: 'rgba(0,122,255,0.2)', borderColor: '#007aff' }] },
                options: { plugins: { legend: { display: false } } }
            });

            if(volumeChart) volumeChart.destroy();
            volumeChart = new Chart(document.getElementById('weeklyVolumeChart'), {
                type: 'line',
                data: { labels: Object.keys(weeklyVolume), datasets: [{ data: Object.values(weeklyVolume), borderColor: '#34c759', tension: 0.4 }] }
            });
        }

        function getWeekNumber(d) {
            d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7));
            var yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
            var weekNo = Math.ceil(( ( (d - yearStart) / 86400000) + 1)/7);
            return weekNo;
        }

        window.openAddMachine = () => document.getElementById('modal-add-machine').style.display='flex';
        window.closeModal = (id) => document.getElementById(id).style.display='none';
        
        document.getElementById('save-machine-btn').onclick = async () => {
            const name = document.getElementById('new-machine-name').value.trim();
            const cat = document.getElementById('new-machine-cat').value;
            if(name) {
                await addDoc(collection(db, "exercises"), { name, category: cat, userId: auth.currentUser.uid });
                loadExercises(); closeModal('modal-add-machine');
            }
        };

        window.changeMonth = (val) => { currentViewDate.setMonth(currentViewDate.getMonth() + val); renderCalendar(); };
        async function renderCalendar() {
            const container = document.getElementById('calendar-container'); container.innerHTML = '';
            document.getElementById('month-display').innerText = new Intl.DateTimeFormat('fr-FR', { month: 'long', year: 'numeric' }).format(currentViewDate);
            const daysInMonth = new Date(currentViewDate.getFullYear(), currentViewDate.getMonth() + 1, 0).getDate();
            const q = query(collection(db, "workouts"), where("userId", "==", auth.currentUser.uid));
            const snap = await getDocs(q);
            const activeDays = new Set(); snap.forEach(d => { if(d.data().timestamp.toDate().getMonth() === currentViewDate.getMonth()) activeDays.add(d.data().timestamp.toDate().getDate()); });
            for (let i = 1; i <= daysInMonth; i++) {
                const cell = document.createElement('div'); cell.className = 'day-cell' + (activeDays.has(i)?' has-data':'');
                cell.innerText = i; container.appendChild(cell);
            }
        }

        window.deleteSeries = async (id) => { if(confirm("Supprimer ?")) { await deleteDoc(doc(db, "workouts", id)); loadWorkouts(); } };
        const applyTheme = (dark) => { document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light'); document.getElementById('theme-switch').checked = dark; };
        applyTheme(window.matchMedia("(prefers-color-scheme: dark)").matches);
        document.getElementById('theme-switch').onclick = (e) => applyTheme(e.target.checked);
    </script></body></html>
