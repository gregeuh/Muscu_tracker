<!DOCTYPE html><html lang="fr"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Muscu Pro Elite</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #f8f9fc; --panel-bg: rgba(255, 255, 255, 0.9); --card-bg: #ffffff;
            --text-main: #1c1c1e; --text-muted: #8e8e93; --accent-color: #007aff;
            --border-color: #f2f2f7; --danger-color: #ff3b30; --pr-color: #34c759;
            --shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
        }
        [data-theme="dark"] {
            --bg-color: #000000; --panel-bg: rgba(20, 20, 22, 0.9); --card-bg: #121212;
            --text-main: #ffffff; --text-muted: #8e8e93; --accent-color: #0a84ff;
            --border-color: #2c2c2e; --shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
        }
        html { background-color: var(--bg-color); }
        body { margin: 0; font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-main); padding-top: calc(80px + env(safe-area-inset-top, 0px)); padding-bottom: calc(100px + env(safe-area-inset-bottom, 20px)); -webkit-tap-highlight-color: transparent; }
        header { position: fixed; top: 0; left: 0; right: 0; height: 64px; background-color: var(--panel-bg); backdrop-filter: blur(25px); border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; padding-top: env(safe-area-inset-top); z-index: 1000; }
        .logo { font-size: 20px; font-weight: 800; }
        .logo span { color: var(--accent-color); }
        #logout-btn { background: rgba(255, 59, 48, 0.1); border: none; color: var(--danger-color); font-size: 11px; font-weight: 800; padding: 8px 12px; border-radius: 20px; display: none; }
        #app-screen { display: none; padding: 0 16px; max-width: 500px; margin: 0 auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        h2 { font-size: 32px; font-weight: 800; margin: 10px 0 24px 0; letter-spacing: -1.5px; }
        .card { background-color: var(--card-bg); padding: 22px; border-radius: 28px; margin-bottom: 20px; border: 1px solid var(--border-color); box-shadow: var(--shadow); box-sizing: border-box; }
        input, select { width: 100%; padding: 16px; background-color: var(--bg-color); border: 1px solid var(--border-color); color: var(--text-main); border-radius: 16px; font-size: 16px; font-weight: 600; box-sizing: border-box; margin-bottom: 12px; font-family: inherit; }
        .date-input-wrapper { position: relative; width: 100%; box-sizing: border-box; }
        .date-input-wrapper input[type="date"] { padding-left: 45px; min-height: 54px; -webkit-appearance: none; }
        .calendar-icon { position: absolute; left: 14px; top: 17px; width: 18px; height: 18px; color: var(--accent-color); pointer-events: none; z-index: 2; }
        .btn-primary { background-color: var(--accent-color); color: white; border: none; padding: 16px; font-weight: 700; border-radius: 18px; width: 100%; cursor: pointer; font-size: 16px; }
        .btn-outline { background: var(--bg-color); color: var(--text-main); border: 1px solid var(--border-color); padding: 8px 16px; font-weight: 700; border-radius: 12px; cursor: pointer; }
        .history-group { background-color: var(--card-bg); border-radius: 26px; margin-bottom: 16px; border: 1px solid var(--border-color); overflow: hidden; }
        .group-header { background: var(--accent-light); color: var(--accent-color); padding: 16px 20px; font-weight: 800; }
        .set-item { padding: 14px 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        
        /* CALENDRIER STYLES */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .day-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 600; border-radius: 14px; position: relative; cursor: pointer; }
        .day-cell.has-data::after { content: ''; position: absolute; bottom: 6px; width: 4px; height: 4px; background-color: var(--accent-color); border-radius: 50%; }
        .day-cell.today { background: var(--accent-light); color: var(--accent-color); border: 1px solid var(--accent-color); }
        .day-cell.selected { background: var(--accent-color); color: white; }

        nav { position: fixed; bottom: 0; left: 0; right: 0; height: 80px; background-color: var(--panel-bg); backdrop-filter: blur(25px); border-top: 1px solid var(--border-color); display: none; justify-content: space-around; padding-bottom: env(safe-area-inset-bottom); z-index: 1000; }
        .nav-btn { background: none; border: none; color: var(--text-muted); padding: 12px; font-size: 11px; font-weight: 700; flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .nav-btn.active { color: var(--accent-color); }
        #success-flash { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--accent-color); color: white; padding: 20px 40px; border-radius: 50px; font-weight: 800; z-index: 5000; display: none; }
    </style></head><body>
    <header>
        <div class="logo">Muscu<span>Pro</span></div>
        <button id="logout-btn">Ciao !</button>
    </header>

    <div id="auth-screen" style="display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:80vh; padding:20px; text-align:center;">
        <h1 style="font-size: 44px; font-weight: 800; letter-spacing: -2.5px;">Muscu<span>Pro</span></h1>
        <p id="auth-title" style="color:var(--text-muted); margin-bottom:30px; font-weight:600;">Connectez-vous pour suivre vos PR</p>
        <input type="email" id="auth-email" placeholder="Email">
        <input type="password" id="auth-password" placeholder="Mot de passe">
        <button id="auth-submit-btn" class="btn-primary" style="margin-bottom:15px;">Se connecter</button>
        <button id="auth-toggle-btn" style="background:none; border:none; color:var(--accent-color); font-weight:700;">Créer un compte</button>
        <p id="auth-error" style="color:var(--danger-color); font-size:12px; margin-top:15px; display:none;"></p>
    </div>

    <div id="app-screen">
        <section id="workout" class="tab-content active">
            <h2>Ma Séance</h2>
            <div class="card">
                <form id="workout-form">
                    <div class="date-input-wrapper">
                        <svg class="calendar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                        <input type="date" id="workout-date" required>
                    </div>
                    <div style="display:flex; gap:10px; margin-bottom:10px;"><select id="machine" required style="margin:0;"></select><button type="button" id="add-machine-btn" style="width:56px; border-radius:16px; background:var(--accent-color); color:white; border:none; font-size:24px;">+</button></div>
                    <div style="display:flex; gap:10px;"><input type="number" id="weight" placeholder="Kg" required><input type="number" id="reps" placeholder="Reps" required></div>
                    <button type="submit" class="btn-primary" style="margin-top:15px;">Enregistrer la série</button>
                </form>
            </div>
            <div id="history-list"></div>
        </section>

        <section id="calendar-tab" class="tab-content">
            <h2>Calendrier</h2>
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <div id="month-display" style="font-weight:800; font-size:18px;">Mois</div>
                    <div style="display:flex; gap:10px;"><button class="btn-outline" onclick="changeMonth(-1)">‹</button><button class="btn-outline" onclick="changeMonth(1)">›</button></div>
                </div>
                <div class="calendar-grid" id="calendar-container"></div>
            </div>
            <div id="day-details"></div>
        </section>

        <section id="stats" class="tab-content">
            <h2>Mes Stats</h2>
            <div class="card"><canvas id="statsChart"></canvas></div>
        </section>
    </div>

    <div id="modal-add-machine" class="modal-overlay"><div class="modal-card"><h2>Nouvel exercice</h2><input type="text" id="new-machine-name" placeholder="Ex: Leg Press"><div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;"><button class="btn-outline" onclick="document.getElementById('modal-add-machine').style.display='none'">Annuler</button><button class="btn-primary" id="save-machine-btn">Ajouter</button></div></div></div>

    <div id="success-flash">Série validée ! 💪</div>

    <nav id="bottom-nav">
        <button class="nav-btn active" onclick="showTab('workout', this)"><span>🏋️</span>Séance</button>
        <button class="nav-btn" onclick="showTab('calendar-tab', this)"><span>📅</span>Calendrier</button>
        <button class="nav-btn" onclick="showTab('stats', this)"><span>📊</span>Stats</button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, where, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyDqD_BnYDL6GwQPIsn3W8ffnoo9BwoKr1Q", authDomain: "suivi-muscu-8dd6d.firebaseapp.com", projectId: "suivi-muscu-8dd6d", storageBucket: "suivi-muscu-8dd6d.firebasestorage.app", messagingSenderId: "1011748268882", appId: "G-P9TLE42VZ1" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app); const auth = getAuth(app);
        
        let isLoginMode = true; let currentViewDate = new Date();
        setPersistence(auth, browserLocalPersistence);

        // AUTH LOGIC
        const emailInput = document.getElementById('auth-email'); const passInput = document.getElementById('auth-password'); const errorMsg = document.getElementById('auth-error');
        document.getElementById('auth-toggle-btn').onclick = () => { isLoginMode = !isLoginMode; document.getElementById('auth-submit-btn').innerText = isLoginMode ? "Se connecter" : "Créer mon compte"; document.getElementById('auth-toggle-btn').innerText = isLoginMode ? "Créer un compte" : "Déjà inscrit ? Connexion"; };
        document.getElementById('auth-submit-btn').onclick = async () => { errorMsg.style.display='none'; try { if (isLoginMode) await signInWithEmailAndPassword(auth, emailInput.value, passInput.value); else await createUserWithEmailAndPassword(auth, emailInput.value, passInput.value); } catch (err) { errorMsg.innerText = err.message; errorMsg.style.display = 'block'; } };
        
        onAuthStateChanged(auth, (user) => {
            if (user) { document.getElementById('auth-screen').style.display = 'none'; document.getElementById('app-screen').style.display = 'block'; document.getElementById('bottom-nav').style.display = 'flex'; document.getElementById('logout-btn').style.display = 'block'; loadExercises(); loadWorkouts(); }
            else { document.getElementById('auth-screen').style.display = 'flex'; document.getElementById('app-screen').style.display = 'none'; document.getElementById('bottom-nav').style.display = 'none'; document.getElementById('logout-btn').style.display = 'none'; }
        });
        document.getElementById('logout-btn').onclick = () => signOut(auth);

        // TAB LOGIC
        window.showTab = (tabId, btn) => { 
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active')); 
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active')); 
            document.getElementById(tabId).classList.add('active'); btn.classList.add('active'); 
            if(tabId === 'calendar-tab') renderCalendar(); 
            if(tabId === 'stats') loadStats(); 
        };

        // WORKOUT LOGIC
        async function loadExercises() { const select = document.getElementById('machine'); const q = query(collection(db, "exercises"), where("userId", "==", auth.currentUser.uid)); const snap = await getDocs(q); let opts = ""; snap.forEach(d => { opts += `<option value="${d.data().name}">${d.data().name}</option>`; }); select.innerHTML = opts; }
        
        async function loadWorkouts() { 
            const q = query(collection(db, "workouts"), where("userId", "==", auth.currentUser.uid), orderBy("timestamp", "desc")); 
            const snap = await getDocs(q); let today = document.getElementById('workout-date').value; let filtered = [];
            snap.forEach(d => { if(d.data().timestamp.toDate().toISOString().split('T')[0] === today) filtered.push({id: d.id, data: d.data()}); });
            renderGrouped(filtered, document.getElementById('history-list'));
        }

        function renderGrouped(arr, container) {
            container.innerHTML = ''; let groups = []; let cur = null;
            arr.forEach(x => { if(!cur || cur.machine !== x.data.machine) { cur = { machine: x.data.machine, sets: [] }; groups.push(cur); } cur.sets.push(x); });
            groups.forEach(g => {
                const div = document.createElement('div'); div.className = `history-group`;
                let html = `<div class="group-header"><span>🏋️ ${g.machine}</span></div>`;
                g.sets.reverse().forEach((s, i) => { html += `<div class="set-item"><div><strong>${s.data.weight}kg x ${s.data.reps}</strong></div><button style="background:none; border:none; color:var(--danger-color);" onclick="deleteSeries('${s.id}')">🗑️</button></div>`; });
                div.innerHTML = html; container.appendChild(div);
            });
        }

        document.getElementById('workout-form').onsubmit = async (e) => { e.preventDefault(); await addDoc(collection(db, "workouts"), { machine: document.getElementById('machine').value, weight: parseInt(document.getElementById('weight').value), reps: parseInt(document.getElementById('reps').value), timestamp: new Date(document.getElementById('workout-date').value), userId: auth.currentUser.uid }); document.getElementById('success-flash').style.display='block'; setTimeout(()=>document.getElementById('success-flash').style.display='none', 1500); loadWorkouts(); };

        // CALENDAR LOGIC
        window.changeMonth = (val) => { currentViewDate.setMonth(currentViewDate.getMonth() + val); renderCalendar(); };
        async function renderCalendar() {
            const container = document.getElementById('calendar-container'); container.innerHTML = '';
            document.getElementById('month-display').innerText = new Intl.DateTimeFormat('fr-FR', { month: 'long', year: 'numeric' }).format(currentViewDate);
            const daysInMonth = new Date(currentViewDate.getFullYear(), currentViewDate.getMonth() + 1, 0).getDate();
            const q = query(collection(db, "workouts"), where("userId", "==", auth.currentUser.uid));
            const snap = await getDocs(q); const activeDays = new Set();
            snap.forEach(d => { const dt = d.data().timestamp.toDate(); if(dt.getMonth() === currentViewDate.getMonth() && dt.getFullYear() === currentViewDate.getFullYear()) activeDays.add(dt.getDate()); });
            for (let i = 1; i <= daysInMonth; i++) {
                const cell = document.createElement('div'); cell.className = 'day-cell' + (activeDays.has(i)?' has-data':'');
                if(i === new Date().getDate() && currentViewDate.getMonth() === new Date().getMonth()) cell.classList.add('today');
                cell.innerText = i; cell.onclick = () => loadDayDetails(i); container.appendChild(cell);
            }
        }

        async function loadDayDetails(day) {
            const q = query(collection(db, "workouts"), where("userId", "==", auth.currentUser.uid));
            const snap = await getDocs(q); let filtered = [];
            snap.forEach(d => { const dt = d.data().timestamp.toDate(); if(dt.getDate() === day && dt.getMonth() === currentViewDate.getMonth()) filtered.push({id: d.id, data: d.data()}); });
            renderGrouped(filtered, document.getElementById('day-details'));
        }

        // STATS LOGIC
        async function loadStats() {
            const q = query(collection(db, "workouts"), where("userId", "==", auth.currentUser.uid));
            const snap = await getDocs(q); let counts = {}; snap.forEach(d => { counts[d.data().machine] = (counts[d.data().machine] || 0) + 1; });
            const top = Object.entries(counts).sort((a,b) => b[1]-a[1]).slice(0,5);
            if(window.statChartInstance) window.statChartInstance.destroy();
            window.statChartInstance = new Chart(document.getElementById('statsChart'), { type: 'bar', data: { labels: top.map(m => m[0]), datasets: [{ label: 'Séries', data: top.map(m => m[1]), backgroundColor: '#0a84ff', borderRadius: 10 }] } });
        }

        document.getElementById('add-machine-btn').onclick = () => document.getElementById('modal-add-machine').style.display='flex';
        document.getElementById('save-machine-btn').onclick = async () => { const name = document.getElementById('new-machine-name').value.trim(); if(name) { await addDoc(collection(db, "exercises"), {name, userId: auth.currentUser.uid}); loadExercises(); document.getElementById('modal-add-machine').style.display='none'; } };
        window.deleteSeries = async (id) => { if(confirm("Supprimer ?")) { await deleteDoc(doc(db, "workouts", id)); loadWorkouts(); } };
        
        document.getElementById('workout-date').value = new Date().toISOString().split('T')[0];
        document.getElementById('workout-date').onchange = () => loadWorkouts();
        // Force dark theme for AMOLED
        document.documentElement.setAttribute('data-theme', 'dark');
    </script></body></html>
