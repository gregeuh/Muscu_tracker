<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Muscu Pro Elite V76</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2964/2964514.png">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --bg-color: #f8f9fc; --panel-bg: rgba(255, 255, 255, 0.85); --card-bg: #ffffff;
            --text-main: #1c1c1e; --text-muted: #8e8e93; --accent-color: #007aff;
            --border-color: #f2f2f7; --danger-color: #ff3b30; --pr-color: #34c759;
            --shadow: 0 8px 24px rgba(0, 0, 0, 0.05); --font-impact: 'Bebas Neue', sans-serif;
            --font-main: 'Inter', sans-serif;
        }
        [data-theme="dark"] {
            --bg-color: #000000; --panel-bg: rgba(28, 28, 30, 0.85); --card-bg: #121212;
            --text-main: #ffffff; --text-muted: #8e8e93; --accent-color: #0a84ff;
            --border-color: #2c2c2e; --shadow: 0 12px 40px rgba(0, 0, 0, 0.7);
        }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        html, body { height: 100%; margin: 0; padding: 0; background-color: var(--bg-color); overflow-x: hidden; font-family: var(--font-main); color: var(--text-main); transition: 0.4s; }
        body { display: flex; flex-direction: column; padding-top: calc(75px + env(safe-area-inset-top, 0px)); padding-bottom: 130px; box-sizing: border-box; overflow-y: auto; }
        
        header { position: fixed; top: 0; left: 0; right: 0; height: 64px; background-color: var(--panel-bg); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; z-index: 1500; padding-top: env(safe-area-inset-top); }
        .logo { font-family: var(--font-impact); font-size: 28px; letter-spacing: 1px; }
        .logo span { color: var(--accent-color); }
        .header-right { display: flex; align-items: center; gap: 15px; position: relative; }
        .user-photo { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--accent-color); cursor: pointer; object-fit: cover; }
        #logout-btn { position: absolute; top: 65px; right: 0; background: var(--card-bg); border: 1px solid var(--border-color); color: var(--danger-color); font-size: 13px; font-weight: 800; padding: 12px 20px; border-radius: 18px; display: none; box-shadow: var(--shadow); z-index: 2000; }

        #auth-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: var(--bg-color); z-index: 6000; padding: 40px; box-sizing: border-box; text-align: center; }
        .google-btn { background: white; color: #1c1c1e; border: 1px solid #dcdcdc; padding: 18px 28px; border-radius: 18px; font-weight: 700; width: 100%; max-width: 350px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; font-size: 16px; box-shadow: var(--shadow); margin-bottom: 40px; }

        nav { position: fixed; bottom: calc(25px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); width: 92%; max-width: 420px; height: 70px; background-color: var(--panel-bg); backdrop-filter: blur(30px); border: 1px solid var(--border-color); border-radius: 35px; display: flex; justify-content: space-around; align-items: center; z-index: 4500; box-shadow: 0 15px 40px rgba(0,0,0,0.25); }
        .nav-btn { background: none; border: none; color: var(--text-muted); font-size: 10px; font-weight: 800; display: flex; flex-direction: column; align-items: center; gap: 5px; flex: 1; transition: 0.3s; }
        .nav-btn span { font-size: 24px; }
        .nav-btn.active { color: var(--accent-color); }

        #app-screen { display: none; width: 100%; max-width: 500px; margin: 0 auto; padding: 0 16px; box-sizing: border-box; }
        .tab-content { display: none; } .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        .card { background-color: var(--card-bg); padding: 25px; border-radius: 32px; margin-bottom: 25px; border: 1px solid var(--border-color); box-shadow: var(--shadow); animation: fadeInUp 0.5s ease-out both; }
        h2 { font-family: var(--font-impact); font-size: 44px; margin: 10px 0 25px 0; letter-spacing: 1px; text-transform: uppercase; }
        
        input, select { width: 100%; padding: 18px; background-color: var(--bg-color); border: 1px solid var(--border-color); color: var(--text-main); border-radius: 18px; font-size: 16px; font-weight: 600; box-sizing: border-box; margin-bottom: 12px; outline: none; }
        .btn-primary { background-color: var(--accent-color); color: white; border: none; padding: 18px; font-family: var(--font-impact); font-size: 22px; border-radius: 22px; width: 100%; cursor: pointer; }
        .btn-danger-soft { background: rgba(255, 59, 48, 0.1); color: var(--danger-color); border: none; padding: 10px 18px; border-radius: 14px; font-family: var(--font-impact); font-size: 15px; }

        .history-group { margin-bottom: 30px; }
        .group-header-title { font-family: var(--font-impact); font-size: 20px; color: var(--accent-color); margin: 0 0 12px 5px; }
        .set-item { display: flex; justify-content: space-between; align-items: center; padding: 18px 22px; background: var(--card-bg); border-radius: 24px; margin-bottom: 12px; border: 1px solid var(--border-color); box-shadow: var(--shadow); }
        .icon-btn { width: 42px; height: 42px; border-radius: 15px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-del { background: rgba(255, 59, 48, 0.1); color: var(--danger-color); }
        
        #last-workout-ghost { font-size: 12px; color: var(--text-muted); text-align: center; margin: 15px 0; background: rgba(0,0,0,0.04); padding: 12px; border-radius: 16px; }
        #one-rm-live { font-family: var(--font-impact); font-size: 20px; color: var(--accent-color); text-align: center; margin-bottom: 15px; }

        .modal-overlay { position: fixed !important; top: 0 !important; left: 0 !important; width: 100% !important; height: 100% !important; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); display: none; align-items: center; justify-content: center; z-index: 6000; padding: 20px; box-sizing: border-box; }
        .modal-card { width: 100%; max-width: 450px; background: var(--card-bg); border-radius: 38px; padding: 35px; border: 1px solid var(--border-color); max-height: 85vh; overflow-y: auto; }
    </style>
</head>
<body>
    <header>
        <div class="logo">MUSCU<span>PRO</span></div>
        <div class="header-right">
            <button onclick="toggleTheme()" style="background:none; border:none; font-size:24px; cursor:pointer;">🌙</button>
            <button onclick="openTrash()" style="background:none; border:none; font-size:24px; cursor:pointer;">🗑️</button>
            <img id="user-photo" class="user-photo" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
            <button id="logout-btn">CIAO ! 👋</button>
        </div>
    </header>

    <div id="auth-screen">
        <h1 style="font-family: var(--font-impact); font-size: 70px; letter-spacing: 4px; margin-bottom: 50px;">MUSCU<span>PRO</span></h1>
        <button id="google-login-btn" class="google-btn"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="22"> CONTINUER AVEC GOOGLE</button>
        <div style="width:100%; max-width:350px; border-top:1px solid var(--border-color); padding-top:40px;">
            <input type="email" id="auth-email" placeholder="Email">
            <input type="password" id="auth-password" placeholder="Pass">
            <button id="auth-submit-btn" class="btn-primary" style="font-size:18px;">CONNEXION / CRÉER</button>
        </div>
    </div>

    <div id="app-screen">
        <section id="workout" class="tab-content active">
            <h2>MA SÉANCE</h2>
            <div class="card">
                <form id="workout-form">
                    <input type="date" id="workout-date" required>
                    <div style="display:flex; gap:12px;"><select id="machine" required></select><button type="button" onclick="openModal()" style="width:65px; border-radius:20px; background:var(--accent-color); color:white; border:none; font-size:30px;">+</button></div>
                    <div id="last-workout-ghost">Chargement...</div>
                    <div style="display:flex; gap:12px;"><input type="number" id="weight" placeholder="Kg" required step="any"><input type="number" id="reps" placeholder="Reps" required></div>
                    <div id="one-rm-live">1RM ESTIMÉ : -</div>
                    <label style="display:flex; align-items:center; gap:12px; justify-content:center; margin-bottom:20px; font-size:16px; font-weight:700;"><input type="checkbox" id="is-warmup" style="width:24px; height:24px;"> 🔥 ÉCHAUFFEMENT</label>
                    <button type="submit" class="btn-primary">ENREGISTRER LA SÉRIE</button>
                </form>
            </div>
            <h3 class="session-title" style="display:flex; justify-content:space-between;">SÉANCE DU JOUR <button class="btn-danger-soft" onclick="deleteAllSeries()">TOUT SUPPRIMER</button></h3>
            <div id="history-list"></div>
        </section>

        <section id="exercises-tab" class="tab-content">
            <h2>MES MACHINES</h2>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-bottom:30px;"><button class="btn-primary" onclick="openModal()">+ AJOUTER</button><button class="btn-outline" onclick="importDefaults()">📚 CATALOGUE</button></div>
            <h3 class="session-title">MES ROUTINES</h3>
            <div id="routines-list"></div>
            <h3 class="session-title" style="margin-top:40px;">LISTE PAR MUSCLE</h3>
            <div id="machine-grouped-list"></div>
        </section>

        <section id="calendar-tab" class="tab-content">
            <h2>CALENDRIER</h2>
            <div class="card"><div id="calendar-container"></div></div>
            <div id="day-details"></div>
        </section>

        <section id="stats" class="tab-content">
            <h2>MES STATS</h2>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:18px; margin-bottom:30px;">
                <div class="card" style="text-align:center;"><h4>SÉRIES</h4><p id="stat-series" style="font-size:42px; color:var(--accent-color);">0</p></div>
                <div class="card" style="text-align:center;"><h4>VOLUME</h4><p id="stat-volume" style="font-size:42px; color:var(--pr-color);">0</p></div>
            </div>
            <div class="card"><canvas id="statsChart"></canvas></div>
        </section>
    </div>

    <div id="modal-trash" class="modal-overlay" onclick="this.style.display='none'"><div class="modal-card" onclick="event.stopPropagation()"><h2 style="color:var(--danger-color)">CORBEILLE</h2><div id="trash-list" style="max-height:400px; overflow-y:auto;"></div><button class="btn-primary" onclick="emptyTrash()">VIDER</button></div></div>
    <div id="modal-add-machine" class="modal-overlay"><div class="modal-card"><h2>MACHINE</h2><input type="text" id="new-machine-name"><select id="new-machine-category"><option>Pectoraux</option><option>Dos</option><option>Jambes</option><option>Épaules</option><option>Bras</option><option>Abdos</option><option value="Cardio">Cardio</option></select><button class="btn-primary" id="save-machine-btn">VALIDER</button><button class="btn-outline" onclick="closeModal()">ANNULER</button></div></div>

    <nav id="bottom-nav">
        <button class="nav-btn active" onclick="showTab('workout', this)"><span>🏋️</span>SÉANCE</button>
        <button class="nav-btn" onclick="showTab('exercises-tab', this)"><span>⚙️</span>MACHINES</button>
        <button class="nav-btn" onclick="showTab('calendar-tab', this)"><span>📅</span>CALENDRIER</button>
        <button class="nav-btn" onclick="showTab('stats', this)"><span>📊</span>STATS</button>
    </nav>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, where, limit, deleteDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyDqD_BnYDL6GwQPIsn3W8ffnoo9BwoKr1Q", authDomain: "suivi-muscu-8dd6d.firebaseapp.com", projectId: "suivi-muscu-8dd6d", storageBucket: "suivi-muscu-8dd6d.firebasestorage.app", messagingSenderId: "1011748268882", appId: "G-P9TLE42VZ1" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app); const auth = getAuth(app);
        const provider = new GoogleAuthProvider(); setPersistence(auth, browserLocalPersistence);

        // --- 1. LOGIQUE DE CONNEXION (PRIORITÉ HAUTE) ---
        
        // Bouton Google
        document.getElementById('google-login-btn').onclick = () => signInWithPopup(auth, provider).catch(e => alert(e.message));

        // Formulaire Email
        document.getElementById('auth-submit-btn').onclick = async () => {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-password').value;
            if(!email || !pass) return alert("Champs vides");
            try { 
                await signInWithEmailAndPassword(auth, email, pass); 
            } catch (error) {
                try { await createUserWithEmailAndPassword(auth, email, pass); } catch(err) { alert("Erreur: " + err.message); }
            }
        };

        // Observateur d'état
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-screen').style.display = 'block';
                if(user.photoURL) document.getElementById('user-photo').src = user.photoURL;
                initApp();
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('app-screen').style.display = 'none';
            }
        });

        // Déconnexion
        const uPhoto = document.getElementById('user-photo');
        const outBtn = document.getElementById('logout-btn');
        uPhoto.onclick = (e) => { e.stopPropagation(); outBtn.style.display = (outBtn.style.display === 'block') ? 'none' : 'block'; };
        window.onclick = () => outBtn.style.display = 'none';
        outBtn.onclick = () => signOut(auth);

        // --- 2. LOGIQUE DE L'APPLICATION ---

        let exerciseCategories = {};
        const calc1RM = (w, r) => { const weight = Number(w); const reps = Number(r); if (!weight || !reps || reps <= 0) return 0; return reps === 1 ? weight : Math.round(weight / (1.0278 - (0.0278 * reps))); };

        async function initApp() {
            document.getElementById('workout-date').value = new Date().toISOString().split('T')[0];
            await loadExercises(); loadWorkouts(); updateGhost();
            document.getElementById('weight').oninput = updateLive1RM;
            document.getElementById('reps').oninput = updateLive1RM;
            document.getElementById('machine').onchange = () => { adaptInputsForCardio(); updateGhost(); };
        }

        async function loadExercises() {
            const snap = await getDocs(query(collection(db, "exercises"), where("userId", "==", auth.currentUser.uid)));
            let grouped = {}; exerciseCategories = {};
            snap.forEach(d => { 
                const da = d.data(); const cat = da.category || "Autre";
                if(!grouped[cat]) grouped[cat] = []; grouped[cat].push(da.name); exerciseCategories[da.name] = cat;
            });
            let opts = "";
            Object.keys(grouped).sort().forEach(cat => {
                opts += `<optgroup label="${cat.toUpperCase()}">`;
                grouped[cat].sort().forEach(n => opts += `<option value="${n}">${n}</option>`);
                opts += `</optgroup>`;
            });
            document.getElementById('machine').innerHTML = opts;
            document.getElementById('machine').dispatchEvent(new Event('change'));
        }

        async function updateGhost() {
            const m = document.getElementById('machine').value;
            const ghost = document.getElementById('last-workout-ghost');
            if(!m) return;
            const q = query(collection(db, "workouts"), where("userId", "==", auth.currentUser.uid), where("machine", "==", m));
            const snap = await getDocs(q);
            if(snap.empty) { ghost.innerHTML = "PREMIÈRE FOIS ! 💪"; return; }
            let all = []; snap.forEach(d => all.push(d.data()));
            all.sort((a,b) => b.timestamp.toDate() - a.timestamp.toDate());
            const last = all[0];
            const isC = exerciseCategories[m] === "Cardio";
            ghost.innerHTML = isC ? `DERNIER : <strong>${last.weight}min | ${last.reps}km</strong>` : `DERNIER : <strong>${last.weight}kg x ${last.reps}</strong> (${calc1RM(last.weight, last.reps)}kg)`;
        }

        document.getElementById('workout-form').onsubmit = async (e) => {
            e.preventDefault();
            await addDoc(collection(db, "workouts"), {
                machine: document.getElementById('machine').value,
                weight: Number(document.getElementById('weight').value),
                reps: Number(document.getElementById('reps').value),
                isWarmup: document.getElementById('is-warmup').checked,
                timestamp: new Date(document.getElementById('workout-date').value + "T12:00:00"),
                userId: auth.currentUser.uid
            });
            loadWorkouts(); updateGhost();
            confetti({ particleCount: 40, spread: 50, origin: { y: 0.8 } });
        };

        async function loadWorkouts() {
            const ds = document.getElementById('workout-date').value;
            const snap = await getDocs(query(collection(db, "workouts"), where("userId", "==", auth.currentUser.uid)));
            let filtered = []; snap.forEach(d => { if(d.data().timestamp.toDate().toISOString().split('T')[0] === ds) filtered.push({id: d.id, data: d.data()}); });
            filtered.sort((a,b) => a.data.timestamp.toDate() - b.data.timestamp.toDate());
            const cont = document.getElementById('history-list'); cont.innerHTML = '';
            let curM = "";
            filtered.forEach(x => {
                if(curM !== x.data.machine) {
                    curM = x.data.machine;
                    cont.innerHTML += `<div class="history-group" id="g-${x.id}"><div class="group-header-title">🏋️ ${curM.toUpperCase()}</div></div>`;
                }
                const isC = exerciseCategories[x.data.machine] === "Cardio";
                const val = isC ? `${x.data.weight}min | ${x.data.reps}km` : `${x.data.weight}kg x ${x.data.reps}`;
                document.getElementById(`g-${x.id}`).innerHTML += `<div class="set-item"><div>${val}</div><button class="icon-btn btn-del" onclick="deleteSeries('${x.id}')">🗑️</button></div>`;
            });
        }

        window.showTab = (id, btn) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active'); btn.classList.add('active');
        };

        window.toggleTheme = () => {
            const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', t); localStorage.setItem('theme', t);
        };
        document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');

        window.deleteSeries = async (id) => {
            const docRef = doc(db, "workouts", id);
            const snap = await getDoc(docRef);
            if (snap.exists() && confirm("Corbeille ?")) {
                await addDoc(collection(db, "trash"), { ...snap.data(), deletedAt: new Date() });
                await deleteDoc(docRef); loadWorkouts(); updateGhost();
            }
        };

        function adaptInputsForCardio() {
            const m = document.getElementById('machine').value; const c = exerciseCategories[m];
            const wi = document.getElementById('weight'), ri = document.getElementById('reps'), orm = document.getElementById('one-rm-live');
            if (c === "Cardio") { wi.placeholder = "Min"; ri.placeholder = "Km"; orm.style.display = "none"; }
            else { wi.placeholder = "Kg"; ri.placeholder = "Reps"; orm.style.display = "block"; updateLive1RM(); }
        }

        function updateLive1RM() { 
            const m = document.getElementById('machine').value; if (exerciseCategories[m] === "Cardio") return;
            const rm = calc1RM(document.getElementById('weight').value, document.getElementById('reps').value); 
            document.getElementById('one-rm-live').innerText = rm > 0 ? `1RM ESTIMÉ : ${rm} KG` : `1RM ESTIMÉ : -`; 
        }

        window.openModal = () => document.getElementById('modal-add-machine').style.display='flex';
        window.closeModal = () => document.getElementById('modal-add-machine').style.display='none';
    </script>
</body>
</html>
